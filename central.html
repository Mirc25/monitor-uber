<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MAESTRA IA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000; border-bottom: 1px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 40px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 5px; overflow-y: auto; background: #111; }
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 320px; position: relative; transition: 0.3s; }
        .alerta-ia { border: 5px solid #f00 !important; box-shadow: 0 0 25px #f00; animation: parpadeo-ia 0.4s infinite alternate; z-index: 1000; cursor: pointer; }
        @keyframes parpadeo-ia { 0% { background: #000; transform: scale(1); } 100% { background: #400; transform: scale(0.98); } }
        .unit-header { background: #1a1a1a; font-size: 10px; padding: 2px; text-align: center; color: #0f0; }
        .video-box { height: 110px; background: #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; padding: 2px; background: #000; border-top: 1px solid #0f0; }
        .btn-ctrl { font-size: 9px; padding: 4px 0; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; user-select: none; }
        .btn-block { background: #ffc107; color: #000; }
        .btn-active { background: #0f0 !important; color: #000 !important; }
        .btn-talking { background: #f0f !important; color: #fff !important; }
        .mini-map { flex: 1; background: #333; border-top: 1px solid #333; pointer-events: none; }
        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        #mainMap { height: 280px; border-bottom: 2px solid #0f0; background: #111; }
        .tools-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start; }
        .btn-tool { background: #aaa; color: #000; font-weight: bold; padding: 12px; width: 100%; border-radius: 4px; text-transform: uppercase; font-size: 1.1rem; border: none; cursor: pointer; }
        .fuchsia-car { filter: invert(19%) sepia(87%) saturate(6011%) hue-rotate(296deg) brightness(101%) contrast(110%); }
        .sos-car { filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7403%) hue-rotate(359deg) brightness(97%) contrast(116%); }
        #agendaModal, #blackFolderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 25px; }
        .modal-container { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #0f0; padding: 20px; border-radius: 8px; color: #0f0; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY CENTRAL MASTER</b></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="toggleAgenda(true)">📂 ABRIR AGENDA Y TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div class="side-panel">
        <div id="mainMap"></div>
        <div class="tools-area">
            <button class="btn-tool" onclick="toggleCarpetaNegra(true)">carpeta negra</button>
            <div id="ia-toggle" style="width:70px; height:30px; background:#444; border-radius:20px; margin:10px auto; position:relative; cursor:pointer;" onclick="toggleIA()">
                <div id="ia-dot" style="position:absolute; left:5px; top:4px; width:22px; height:22px; background:#ddd; border-radius:50%; transition: 0.3s;"></div>
            </div>
            <div id="ia-text" style="font-weight:bold; font-size:13px; color:#555;">IA DESACTIVADA</div>
        </div>
    </div>
</div>

<script>
    let peer, mainMap, dbIndexed, iaActiva = false;
    let localStream = null; // Micrófono de la central
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmAudio.loop = true;

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [25, 25], className: 'fuchsia-car' });
    const sosIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'sos-car' });

    async function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        
        // Pedir permiso de micrófono de central al iniciar
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch(e) { console.log("Micrófono de central no disponible"); }

        conectarCentral();
        setInterval(escanearIA, 2000); 
    }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            units[conn.peer] = units[conn.peer] || {};
            units[conn.peer].conn = conn;
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { 
                    v.srcObject = s; 
                    // Por defecto el video llega mudo, se activa con el botón ESCUCHAR
                    v.muted = true; 
                    v.play(); 
                }
            });
        });
    }

    // --- REPARACIÓN BOTÓN HABLAR (PTT) ---
    function iniciarHabla(pid) {
        if(!localStream) return alert("Micro central no activo");
        const btn = document.getElementById('btn-hablar-' + pid);
        btn.classList.add('btn-talking');
        // Llamamos al celular enviando nuestro audio
        units[pid].currentCall = peer.call(pid, localStream);
    }

    function detenerHabla(pid) {
        const btn = document.getElementById('btn-hablar-' + pid);
        if(btn) btn.classList.remove('btn-talking');
        if(units[pid].currentCall) {
            units[pid].currentCall.close();
            units[pid].currentCall = null;
        }
    }

    // --- REPARACIÓN BOTÓN ESCUCHAR (INTERRUPTOR) ---
    function toggleEscucha(pid) {
        const v = document.getElementById('v-' + pid);
        const btn = document.getElementById('btn-escuchar-' + pid);
        
        if (v.muted) {
            v.muted = false; // Activamos el audio en el monitor
            btn.classList.add('btn-active');
            btn.innerText = "🔊 ESCUCHANDO";
        } else {
            v.muted = true; // Silenciamos el monitor
            btn.classList.remove('btn-active');
            btn.innerText = "🔈 ESCUCHAR";
        }
    }

    function bloquearPantalla(pid) {
        if(units[pid].conn) units[pid].conn.send({ tipo: 'bloquear_pantalla' });
    }

    function crearOActualizarCelda(pid, nombre) {
        if(document.getElementById('card-' + pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + pid;
        card.onclick = function() { if(this.classList.contains('alerta-ia')) pararAlerta(pid); };

        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box"><video id="v-${pid}" autoplay playsinline muted crossorigin="anonymous"></video></div>
            <div class="unit-actions">
                <button id="btn-hablar-${pid}" class="btn-ctrl" 
                    onmousedown="iniciarHabla('${pid}')" onmouseup="detenerHabla('${pid}')" 
                    onmouseleave="detenerHabla('${pid}')" ontouchstart="iniciarHabla('${pid}')" 
                    ontouchend="detenerHabla('${pid}')">🎙️ Hablar</button>
                <button id="btn-escuchar-${pid}" class="btn-ctrl" onclick="event.stopPropagation(); toggleEscucha('${pid}')">🔈 Escuchar</button>
                <button class="btn-ctrl btn-block" onclick="event.stopPropagation(); bloquearPantalla('${pid}')">🔒 Bloquear</button>
                <button class="btn-ctrl" style="color:red" onclick="event.stopPropagation(); pararAlerta('${pid}')">STOP SOS</button>
            </div>
            <div id="m-${pid}" class="mini-map"></div>`;
        grid.prepend(card);
        const m = L.map('m-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        units[pid] = units[pid] || {};
        units[pid].miniMap = m; units[pid].miniMarker = L.marker([0,0]).addTo(m);
    }

    // Funciones de apoyo (IA, GPS, Login) se mantienen igual
    function actualizarPosicionGlobal(pid, lat, lng) {
        const pos = [lat, lng];
        if (!units[pid]) units[pid] = {};
        if (!units[pid].mainMarker) {
            units[pid].mainMarker = L.marker(pos, {icon: carIcon}).addTo(mainMap).bindPopup(pid.replace('PABLO-U-', ''));
        } else { units[pid].mainMarker.setLatLng(pos); }
        if (units[pid].miniMap) {
            units[pid].miniMap.setView(pos);
            if (units[pid].miniMarker) units[pid].miniMarker.setLatLng(pos);
        }
    }
    function manejarLogin(conn, data) {
        units[conn.peer] = units[conn.peer] || {};
        units[conn.peer].conn = conn;
        crearOActualizarCelda(conn.peer, data.nombre);
        conn.send({ tipo: 'auth_ok' });
    }
    window.onload = init;
</script>
</body>
</html>
