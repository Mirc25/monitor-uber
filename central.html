<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MONITOR MAESTRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .btn-agenda { background: #0f0; color: #000; font-weight: bold; padding: 6px 15px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* CUADRICULA FIJA AL 25% (4 COLUMNAS) */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; padding: 10px; overflow-y: auto; align-content: start;
        }
        
        .unit-card { background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; height: 280px; position: relative; display: flex; flex-direction: column; }
        .unit-header { background: #1a1a1a; font-size: 11px; padding: 5px; text-align: center; border-bottom: 1px solid #0f0; color: #0f0; font-weight: bold; }
        
        .video-box { height: 140px; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ALERTAS SOS */
        .sos-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.5); z-index: 10; animation: blink 0.5s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        .btn-stop-sos { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; background: #fff; color: #f00; border: none; font-weight: bold; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .mini-map { height: 90px; border-top: 1px solid #222; filter: grayscale(1); }
        #mainMap { width: 280px; height: 200px; border: 1px solid #0f0; position: fixed; bottom: 15px; right: 15px; z-index: 30; border-radius: 8px; opacity: 0.8; }

        /* MODAL AGENDA */
        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; }
        .agenda-container { max-width: 1000px; margin: 0 auto; background: #0a0a0a; border: 1px solid #0f0; padding: 25px; border-radius: 10px; }
        .user-row { background: #111; border-left: 4px solid #0f0; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: #0f0; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small>SISTEMA DE MONITOREO</small></div>
    <button class="btn-agenda" onclick="toggleAgenda(true)">📂 GESTIONAR AGENDA</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-container">
        <div class="d-flex justify-content-between mb-3 border-bottom border-success pb-2 text-success">
            <h4>AGENDA: CONTROL DE TIEMPOS Y TOKENS</h4>
            <button class="btn btn-sm btn-outline-danger" onclick="toggleAgenda(false)">_ CERRAR</button>
        </div>
        
        <div class="row g-2 mb-4 bg-dark p-3 rounded">
            <div class="col-md-5"><input type="text" id="regNombre" placeholder="ID MÓVIL" class="form-control bg-black text-success border-success"></div>
            <div class="col-md-3">
                <select id="regTiempo" class="form-select bg-black text-success border-success">
                    <option value="24">24 HORAS</option>
                    <option value="168">7 DÍAS</option>
                    <option value="720">30 DÍAS</option>
                </select>
            </div>
            <div class="col-md-4"><button class="btn btn-success w-100 fw-bold" onclick="crearAbonado()">+ GENERAR ALTA</button></div>
        </div>

        <input type="text" id="busquedaAbonado" class="form-control bg-dark text-info mb-3" placeholder="🔎 BUSCAR CONDUCTOR..." onkeyup="renderAgenda()">
        <div id="agendaContenido" style="max-height: 450px; overflow-y: auto; padding-right: 10px;"></div>
    </div>
</div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmSound = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');

    function init() {
        mainMap = L.map('mainMap', {zoomControl: false}).setView([-31.5375, -68.5364], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
        setInterval(renderAgenda, 60000); // Mantiene el tiempo actualizado en la agenda cada minuto
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarEntrada(conn, data);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') activarSOS(conn.peer);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function manejarEntrada(conn, data) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        
        if(user && Date.now() < user.vence) {
            conn.send({ tipo: 'auth_ok', vence: user.vence });
            crearOActualizarCelda(conn.peer, user.nombre);
        } else {
            conn.send({ tipo: 'error', msg: 'ACCESO VENCIDO' });
        }
    }

    function crearOActualizarCelda(pid, nombre) {
        let ex = document.querySelector(`[data-u="${nombre}"]`);
        if(ex) {
            const oldPid = ex.id.replace('card-', '');
            if(units[oldPid]) units[oldPid].markerGen.remove();
            ex.remove();
        }

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.setAttribute('data-u', nombre);
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box">
                <div id="sos-over-${pid}" class="sos-overlay"></div>
                <button id="sos-btn-${pid}" class="btn-stop-sos" onclick="detenerSOS('${pid}')">PARAR SOS</button>
                <video id="v-${pid}" autoplay playsinline muted></video>
            </div>
            <div id="m-i-${pid}" class="mini-map"></div>
        `;
        grid.prepend(card);
        
        const mi = L.map('m-i-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { 
            mi, 
            markerInd: L.marker([0,0]).addTo(mi), 
            markerGen: L.marker([0,0], {icon: L.divIcon({className: 'bg-danger rounded-circle', iconSize:[10,10]})}).addTo(mainMap).bindPopup(nombre)
        };
    }

    function activarSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'block';
        document.getElementById('sos-btn-' + pid).style.display = 'block';
        alarmSound.loop = true;
        alarmSound.play();
    }

    function detenerSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'none';
        document.getElementById('sos-btn-' + pid).style.display = 'none';
        alarmSound.pause();
        alarmSound.currentTime = 0;
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    function crearAbonado() {
        const nombre = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if(!nombre) return;
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        db.push({ 
            nombre, 
            token: Math.floor(1000 + Math.random() * 8999).toString(), 
            vence: Date.now() + (horas * 3600000) 
        });
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
        document.getElementById('regNombre').value = "";
    }

    function renderAgenda() {
        const cont = document.getElementById('agendaContenido');
        const filtro = document.getElementById('busquedaAbonado').value.toUpperCase();
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        cont.innerHTML = "";

        db.filter(u => u.nombre.includes(filtro)).forEach(u => {
            const dif = u.vence - Date.now();
            const h = Math.max(0, Math.floor(dif / 3600000));
            const m = Math.max(0, Math.floor((dif % 3600000) / 60000));
            
            cont.innerHTML += `
                <div class="user-row">
                    <div>
                        <b>${u.nombre}</b><br>
                        <small>TOKEN: ${u.token}</small>
                    </div>
                    <div class="text-end">
                        <span class="badge ${h < 2 ? 'bg-danger' : 'bg-success'}">${h}h ${m}m restante</span>
                        <button class="btn btn-sm btn-outline-danger ms-2" onclick="borrarAbonado('${u.nombre}')">X</button>
                    </div>
                </div>`;
        });
    }

    function borrarAbonado(nombre) {
        if(confirm("¿Eliminar abonado?")) {
            let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
            db = db.filter(u => u.nombre !== nombre);
            localStorage.setItem('pablo_agenda', JSON.stringify(db));
            renderAgenda();
        }
    }

    window.onload = init;
</script>
</body>
</html>
