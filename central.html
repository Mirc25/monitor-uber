<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .navbar-security { border-bottom: 2px solid #0f0; background: #0a0a0a; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .codigo-vivo { background: #1a1a1a; border: 2px dashed #0f0; padding: 10px 20px; border-radius: 8px; color: #fff; font-size: 1.5rem; font-weight: bold; }
        .monitor-video { width: 100%; height: 70vh; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .panel-lateral { background: #0a0a0a; border-left: 1px solid #0f0; height: 100vh; padding: 20px; }
        .alerta-panic { background: red; color: white; padding: 20px; border-radius: 10px; display: none; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<nav class="navbar-security">
    <div><strong>PABLO SECURITY</strong> | CENTRAL V.2.1</div>
    <div class="d-flex align-items: center;">
        <span class="me-3 mt-2 text-secondary">CÓDIGO DE ENLACE:</span>
        <div id="numCodigo" class="codigo-vivo">------</div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-9 p-4">
            <div class="monitor-video">
                <video id="videoApp" autoplay playsinline></video>
                <div id="esperaTxt" style="position: absolute;">ESPERANDO CONEXIÓN...</div>
            </div>
            <div id="sosAlert" class="alerta-panic mt-3 text-center"><h1>🚨 BOTÓN DE PÁNICO ACTIVADO 🚨</h1></div>
        </div>
        <div class="col-md-3 panel-lateral">
            <h5 class="border-bottom pb-2">ESTADO UNIDAD</h5>
            <div class="mt-3">
                <p>MÓVIL: <strong id="txtNombre" class="text-white">---</strong></p>
                <p>GPS: <strong id="txtGps" class="text-white">---</strong></p>
                <p>ESTADO: <span id="txtStatus" class="text-warning">APAGADO</span></p>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Generar código AL INSTANTE
    const miCodigo = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('numCodigo').innerText = miCodigo;

    // 2. Iniciar Peer con ese código
    const peer = new Peer('pablo-' + miCodigo);

    peer.on('open', () => {
        document.getElementById('txtStatus').innerText = "ESPERANDO CHOFER";
    });

    // Recibir Video
    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (stream) => {
            const v = document.getElementById('videoApp');
            v.srcObject = stream;
            v.play();
            document.getElementById('esperaTxt').style.display = 'none';
            document.getElementById('txtStatus').innerText = "EN VIVO 🔴";
            document.getElementById('txtStatus').className = "text-danger";
        });
    });

    // Recibir Datos
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.tipo === 'nombre') document.getElementById('txtNombre').innerText = data.valor.toUpperCase();
            if(data.tipo === 'gps') document.getElementById('txtGps').innerText = data.lat + ", " + data.lng;
            if(data.tipo === 'alerta') {
                document.getElementById('sosAlert').style.display = 'block';
                new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
            }
        });
    });
</script>
</body>
</html>
