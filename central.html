<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL PRO v9</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        
        /* Grilla ajustada para que las tarjetas no se estiren */
        .grid-fleet { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 320px); /* Ancho fijo por tarjeta */
            gap: 20px; 
            padding: 20px; 
            height: calc(100vh - 70px); 
            overflow-y: auto;
            justify-content: center;
        }

        /* Tarjeta compacta: Todo tiene el mismo ancho (320px) */
        .unit-card { 
            background: #050505; 
            border: 1px solid #333; 
            border-radius: 12px; 
            width: 320px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            transition: 0.3s;
        }
        
        .unit-header { background: #111; padding: 5px; font-size: 12px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; }

        /* Video: Proporción 4:3 para ver bien la cabina */
        .video-box { width: 320px; height: 240px; background: #000; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; } 
        
        /* Mapa: Mismo ancho que el video */
        .map-box { width: 320px; height: 180px; border-top: 1px solid #222; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* Botones alineados y compactos */
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 5px; 
            padding: 8px; 
            background: #0a0a0a;
        }
        .btn-pablo { 
            font-size: 10px; 
            font-weight: 900; 
            padding: 10px 2px; 
            border: 1px solid #0f0; 
            background: transparent; 
            color: #0f0; 
            border-radius: 4px; 
            text-transform: uppercase;
        }
        .btn-hablar:active { background: #0f0 !important; color: #000 !important; }

        /* SOS con el mismo ancho */
        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(200,0,0,0.95); display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Maximizado */
        .max-card { position: fixed !important; top:0; left:0; width:100vw !important; height:100vh !important; z-index: 500; background: #000; }
        .max-card .video-box { width: 100%; height: 80vh; }
        .max-card .map-box, .max-card .controls { width: 100%; height: 20vh; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong>PABLO SECURITY</strong></div>
    <div class="text-center">
        <small class="text-secondary">CÓDIGO:</small>
        <div id="tokenDisplay" class="badge bg-dark border border-success fs-4" style="color: #0f0;">----</div>
    </div>
    <button class="btn btn-outline-success btn-sm fw-bold" onclick="generarToken()">GENERAR CÓDIGO</button>
</div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    let currentToken;
    let peer;
    const units = {};

    function generarToken() {
        currentToken = Math.floor(1000 + Math.random() * 9999).toString();
        document.getElementById('tokenDisplay').innerText = currentToken;
        if(peer) peer.destroy();
        peer = new Peer('PABLO-CENTRAL-' + currentToken);
        
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); }
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
                if(data.tipo === 'gps') actualizarGPS(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') toggleSOS(conn.peer, true);
            });
        });
    }

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}">
                <h2 class="text-white fw-bold">🚨 SOS 🚨</h2>
                <button class="btn btn-light btn-sm fw-bold" onclick="toggleSOS('${id}', false)">CERRAR SOS</button>
            </div>
            <div class="unit-header text-success">${nombre.toUpperCase()}</div>
            <div class="video-box" onclick="this.parentElement.classList.toggle('max-card')">
                <video id="v-${id}" autoplay playsinline muted></video>
            </div>
            <div id="map-${id}" class="map-box"></div>
            <div class="controls">
                <button class="btn-pablo" id="aud-${id}" onclick="toggleAudio('${id}')">ESCUCHAR</button>
                <button class="btn-pablo btn-hablar" 
                    onmousedown="iniciarHablar('${id}')" 
                    onmouseup="detenerHablar()" 
                    ontouchstart="iniciarHablar('${id}')" 
                    ontouchend="detenerHablar()">HABLAR (PTT)</button>
            </div>
        `;
        grid.appendChild(card);
        units[id] = { map: L.map('map-' + id, { zoomControl: false, attributionControl: false }).setView([0,0], 17), marker: null, callPTT: null };
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(units[id].map);
    }

    async function iniciarHablar(uId) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            units[uId].callPTT = peer.call(uId, stream);
        } catch (e) { console.log("Permiso micro denegado"); }
    }

    function detenerHablar() {
        Object.keys(units).forEach(id => {
            if(units[id].callPTT) { units[id].callPTT.close(); units[id].callPTT = null; }
        });
    }

    function toggleSOS(id, on) {
        document.getElementById('sos-'+id).style.display = on ? 'flex' : 'none';
        if(on) {
            let a = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            a.loop = true; a.id = "s-"+id; a.play();
        } else {
            let a = document.getElementById("s-"+id); if(a) { a.pause(); a.remove(); }
        }
    }

    function actualizarGPS(id, lat, lng) {
        if(!units[id]) return;
        units[id].map.setView([lat, lng]);
        if(units[id].marker) units[id].marker.setLatLng([lat, lng]);
        else units[id].marker = L.marker([lat, lng]).addTo(units[id].map);
    }

    function toggleAudio(id) {
        const v = document.getElementById('v-'+id);
        v.muted = !v.muted;
        document.getElementById('aud-'+id).style.background = v.muted ? 'transparent' : '#0f0';
        document.getElementById('aud-'+id).style.color = v.muted ? '#0f0' : '#000';
    }

    generarToken();
</script>
</body>
</html>
