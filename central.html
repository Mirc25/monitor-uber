<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MAESTRA IA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000; border-bottom: 1px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 40px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 5px; overflow-y: auto; background: #111; }
        
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 320px; position: relative; transition: 0.3s; }
        
        .alerta-ia { 
            border: 5px solid #f00 !important; 
            box-shadow: 0 0 25px #f00;
            animation: parpadeo-ia 0.4s infinite alternate; 
            z-index: 1000; 
            cursor: pointer;
        }
        @keyframes parpadeo-ia { 
            0% { background: #000; transform: scale(1); } 
            100% { background: #400; transform: scale(0.98); } 
        }

        .unit-header { background: #1a1a1a; font-size: 10px; padding: 2px; text-align: center; color: #0f0; }
        .video-box { height: 110px; background: #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Ajuste de botones para que quepan 4 */
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; padding: 2px; background: #000; border-top: 1px solid #0f0; }
        .btn-ctrl { font-size: 9px; padding: 4px 0; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-block { background: #ffc107; color: #000; } /* Amarillo para bloqueo */
        
        .mini-map { flex: 1; background: #333; border-top: 1px solid #333; pointer-events: none; }
        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        #mainMap { height: 280px; border-bottom: 2px solid #0f0; background: #111; }
        .tools-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start; }
        .btn-tool { background: #aaa; color: #000; font-weight: bold; padding: 12px; width: 100%; border-radius: 4px; text-transform: uppercase; font-size: 1.1rem; border: none; cursor: pointer; }
        .fuchsia-car { filter: invert(19%) sepia(87%) saturate(6011%) hue-rotate(296deg) brightness(101%) contrast(110%); }
        .sos-car { filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7403%) hue-rotate(359deg) brightness(97%) contrast(116%); }
        #agendaModal, #blackFolderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 25px; }
        .modal-container { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #0f0; padding: 20px; border-radius: 8px; color: #0f0; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY CENTRAL CHIMBAS</b></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="toggleAgenda(true)">📂 ABRIR AGENDA Y TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div class="side-panel">
        <div id="mainMap"></div>
        <div class="tools-area">
            <button class="btn-tool" onclick="toggleCarpetaNegra(true)">carpeta negra</button>
            <button class="btn-tool" id="btn-ia-status">IA DESACTIVADA</button>
            <div style="text-align:center; color:#fff; margin-top:20px;">
                <div>ia reconocimiento facial</div>
                <div id="ia-toggle" style="width:70px; height:30px; background:#444; border-radius:20px; margin:10px auto; position:relative; cursor:pointer;" onclick="toggleIA()">
                    <div id="ia-dot" style="position:absolute; left:5px; top:4px; width:22px; height:22px; background:#ddd; border-radius:50%; transition: 0.3s;"></div>
                </div>
                <div id="ia-text" style="font-weight:bold; font-size:13px; color:#555;">DESACTIVADA</div>
            </div>
        </div>
    </div>
</div>

<div id="blackFolderModal">
    <div class="modal-container" style="border-color: #f00;">
        <div class="d-flex justify-content-between mb-3 border-bottom border-danger pb-2">
            <h4>CARPETA NEGRA</h4>
            <button class="btn btn-sm btn-outline-danger" onclick="toggleCarpetaNegra(false)">CERRAR</button>
        </div>
        <div class="row g-2 mb-4 bg-dark p-2 rounded">
            <div class="col-md-5"><input type="file" id="fotoDelincuente" class="form-control bg-black text-danger border-danger" accept="image/*"></div>
            <div class="col-md-4"><input type="text" id="nombreDelincuente" class="form-control bg-black text-danger border-danger" placeholder="ALIAS"></div>
            <div class="col-md-3"><button class="btn btn-danger w-100 fw-bold" onclick="guardarDelincuente()">AÑADIR</button></div>
        </div>
        <div id="listaNegra" class="row g-2" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    let peer, mainMap, dbIndexed, iaActiva = false;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmAudio.loop = true;

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [25, 25], className: 'fuchsia-car' });
    const sosIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'sos-car' });

    const request = indexedDB.open("PabloSecurity_Folder", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("delincuentes", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = (e) => { dbIndexed = e.target.result; cargarListaNegraVisual(); };

    async function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        try {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            console.log("IA LISTA");
        } catch(e) { console.error("Error modelos"); }
        conectarCentral();
        setInterval(escanearIA, 2000); 
    }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play().catch(()=>{}); }
            });
        });
    }

    function actualizarPosicionGlobal(pid, lat, lng) {
        const pos = [lat, lng];
        if (!units[pid]) units[pid] = {};
        if (!units[pid].mainMarker) {
            units[pid].mainMarker = L.marker(pos, {icon: carIcon}).addTo(mainMap).bindPopup(pid.replace('PABLO-U-', ''));
        } else { units[pid].mainMarker.setLatLng(pos); }
        if (units[pid].miniMap) {
            units[pid].miniMap.setView(pos);
            if (units[pid].miniMarker) units[pid].miniMarker.setLatLng(pos);
        }
    }

    function manejarLogin(conn, data) {
        crearOActualizarCelda(conn.peer, data.nombre);
        units[conn.peer].conn = conn; // Guardar conexión para comandos
        conn.send({ tipo: 'auth_ok' });
    }

    function crearOActualizarCelda(pid, nombre) {
        if(document.getElementById('card-' + pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + pid;
        
        // El clic en la tarjeta SOLO para desactivar alerta si está activa
        card.onclick = function() { if(this.classList.contains('alerta-ia')) pararAlerta(pid); };

        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box"><video id="v-${pid}" autoplay muted playsinline crossorigin="anonymous"></video></div>
            <div class="unit-actions">
                <button class="btn-ctrl" onclick="event.stopPropagation(); hablar('${pid}')">Hablar</button>
                <button class="btn-ctrl" onclick="event.stopPropagation(); escuchar('${pid}')">Escuchar</button>
                <button class="btn-ctrl btn-block" onclick="event.stopPropagation(); confirmarBloqueo('${pid}', '${nombre}')">Bloquear</button>
                <button class="btn-ctrl" style="color:red" onclick="event.stopPropagation(); pararAlerta('${pid}')">STOP SOS</button>
            </div>
            <div id="m-${pid}" class="mini-map"></div>`;
        grid.prepend(card);
        const m = L.map('m-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        if(!units[pid]) units[pid] = {};
        units[pid].miniMap = m; units[pid].miniMarker = L.marker([0,0]).addTo(m);
    }

    // NUEVAS FUNCIONES DE BOTONES
    function confirmarBloqueo(pid, nombre) {
        const resp = confirm(`¿Estás seguro que quieres bloquear la pantalla de ${nombre}?`);
        if(resp) {
            console.log("Bloqueando unidad:", pid);
            if(units[pid].conn) units[pid].conn.send({ tipo: 'bloquear_pantalla' });
            alert("Comando de bloqueo enviado.");
        }
    }

    function hablar(pid) { console.log("Iniciando habla a:", pid); alert("Micrófono abierto para: " + pid); }
    function escuchar(pid) { console.log("Iniciando escucha de:", pid); alert("Escuchando audio de: " + pid); }

    function toggleCarpetaNegra(s) { document.getElementById('blackFolderModal').style.display = s ? 'block' : 'none'; }

    async function guardarDelincuente() {
        const nom = document.getElementById('nombreDelincuente').value;
        const file = document.getElementById('fotoDelincuente').files[0];
        if(!nom || !file) return;
        try {
            const img = await faceapi.bufferToImage(file);
            const detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceDescriptor();
            if(!detections) return alert("IA no detectó rostro");
            const tx = dbIndexed.transaction(["delincuentes"], "readwrite");
            tx.objectStore("delincuentes").add({ nombre: nom.toUpperCase(), descriptor: Array.from(detections.descriptor), foto: await toBase64(file) });
            tx.oncomplete = () => { cargarListaNegraVisual(); alert("GUARDADO"); };
        } catch(e) { alert("Error IA"); }
    }

    function cargarListaNegraVisual() {
        const cont = document.getElementById('listaNegra'); if(!cont) return;
        cont.innerHTML = "";
        dbIndexed.transaction("delincuentes", "readonly").objectStore("delincuentes").openCursor().onsuccess = (e) => {
            const c = e.target.result; if(c) {
                cont.innerHTML += `<div class="col-4 col-md-3 mb-2 text-center"><div class="card bg-black border-danger p-1"><img src="${c.value.foto}" style="height:80px; object-fit:cover; border-radius:4px;"><div class="small text-danger mt-1">${c.value.nombre}</div><button class="btn btn-danger btn-sm w-100 mt-1" onclick="eliminarSospechoso(${c.value.id})">BORRAR</button></div></div>`;
                c.continue();
            }
        };
    }

    function eliminarSospechoso(id) {
        const tx = dbIndexed.transaction(["delincuentes"], "readwrite");
        tx.objectStore("delincuentes").delete(id);
        tx.oncomplete = () => cargarListaNegraVisual();
    }

    function toggleIA() {
        iaActiva = !iaActiva;
        document.getElementById('ia-dot').style.left = iaActiva ? "40px" : "5px";
        document.getElementById('ia-toggle').style.background = iaActiva ? "#0f0" : "#444";
        document.getElementById('ia-text').innerText = iaActiva ? "ACTIVA" : "DESACTIVADA";
        document.getElementById('btn-ia-status').innerText = iaActiva ? "IA ESCANEANDO" : "IA DESACTIVADA";
    }

    async function escanearIA() {
        if(!iaActiva) return;
        const vids = document.querySelectorAll('video');
        const dbList = await new Promise(res => {
            const list = [];
            dbIndexed.transaction("delincuentes", "readonly").objectStore("delincuentes").openCursor().onsuccess = (e) => {
                const c = e.target.result; if(c) { list.push(c.value); c.continue(); } else res(list);
            };
        });
        if(dbList.length === 0) return;

        for(let v of vids) {
            if(v.paused || v.ended || v.readyState < 3) continue;
            try {
                const detections = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptors();
                for(let det of detections) {
                    for(let del of dbList) {
                        if(faceapi.euclideanDistance(det.descriptor, new Float32Array(del.descriptor)) < 0.6) dispararAlerta(v.id.replace('v-', ''));
                    }
                }
            } catch(e) {}
        }
    }

    function dispararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        if(c && !c.classList.contains('alerta-ia')) {
            c.classList.add('alerta-ia');
            if(units[pid].mainMarker) units[pid].mainMarker.setIcon(sosIcon);
            alarmAudio.play().catch(()=>{});
        }
    }

    function pararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        if(c && c.classList.contains('alerta-ia')) {
            c.classList.remove('alerta-ia'); 
            if(units[pid].mainMarker) units[pid].mainMarker.setIcon(carIcon); 
            if(document.querySelectorAll('.alerta-ia').length === 0) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }
    }

    function toBase64(f) { return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }); }
    function toggleAgenda(s) { /* Se mantiene igual */ }
    window.onload = init;
</script>
</body>
</html>
