<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL RADAR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        
        /* DISEÑO DE PANTALLA DIVIDIDA */
        .main-layout { display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; }

        /* MAPA CUADRADO TÁCTICO */
        #map-container { width: 450px; padding: 10px; background: #050505; border-right: 2px solid #0f0; display: flex; flex-direction: column; align-items: center; }
        #mainMap { width: 400px; height: 400px; border: 2px solid #0f0; border-radius: 10px; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* PANEL DE VIDEOS */
        .grid-fleet { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fill, 300px); gap: 15px; padding: 15px; overflow-y: auto; background: #000; }

        /* TARJETAS */
        .unit-card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; width: 300px; position: relative; overflow: hidden; height: fit-content; }
        .unit-header { background: #111; padding: 6px; font-size: 12px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; color: #0f0; }
        .video-box { width: 300px; height: 170px; background: #000; }
        video { width: 100%; height: 100%; object-fit: fill; } 

        /* ALERTA ZONA ROJA */
        .zona-roja-alert { border: 4px solid red !important; animation: blinker 0.6s linear infinite; }
        @keyframes blinker { 50% { border-color: transparent; box-shadow: 0 0 20px red; } }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px; }
        .btn-pablo { font-size: 10px; font-weight: bold; padding: 8px 0; border: 1px solid #0f0; background: transparent; color: #0f0; border-radius: 4px; text-transform: uppercase; cursor: pointer; }
        .btn-pablo:active { background: #0f0; color: #000; }
        
        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.8); display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="fw-bold">PABLO SECURITY - CENTRAL PRO</div>
    <div id="tokenDisplay" class="badge bg-dark border border-success fs-5">----</div>
    <div>
        <button class="btn btn-danger btn-sm me-2" onclick="activarModoDibujo()">📍 DIBUJAR ZONA</button>
        <button class="btn btn-success btn-sm" onclick="generarToken()">NUEVO CÓDIGO</button>
    </div>
</div>

<div class="main-layout">
    <div id="map-container">
        <h6 class="text-center text-success mb-2">RADAR DE FLOTA</h6>
        <div id="mainMap"></div>
        <p class="text-muted mt-2" style="font-size: 10px;">Clic en el mapa para marcar peligro</p>
    </div>

    <div class="grid-fleet" id="monitorGrid"></div>
</div>

<script>
    let currentToken;
    let peer;
    let mainMap;
    let modoDibujo = false;
    const units = {};
    const zonasPeligrosas = []; // Aquí se guardan los círculos dibujados

    function initMap() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mainMap);

        // EVENTO PARA DIBUJAR ZONAS AL HACER CLIC
        mainMap.on('click', function(e) {
            if(modoDibujo) {
                const radio = 300; // Radio fijo de 300 metros
                const circulo = L.circle(e.latlng, { color: 'red', fillColor: '#f03', fillOpacity: 0.4, radius: radio }).addTo(mainMap);
                zonasPeligrosas.push(circulo);
                alert("Zona de peligro marcada");
                modoDibujo = false;
            }
        });
    }

    function activarModoDibujo() {
        modoDibujo = true;
        alert("Haz clic en el mapa donde quieras marcar una zona de peligro.");
    }

    function generarToken() {
        currentToken = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('tokenDisplay').innerText = currentToken;
        if(peer) peer.destroy();
        peer = new Peer('PABLO-CENTRAL-' + currentToken);
        
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); }
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
                if(data.tipo === 'gps') actualizarGPS(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') toggleSOS(conn.peer, true);
            });
        });
    }

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}"><h3 class="text-white">🚨 SOS 🚨</h3></div>
            <div class="unit-header">${nombre.toUpperCase()}</div>
            <div class="video-box"><video id="v-${id}" autoplay playsinline muted></video></div>
            <div class="controls">
                <button class="btn-pablo" onclick="toggleAudio('${id}')">🔊 AUDIO</button>
                <button class="btn-pablo" onmousedown="hablar('${id}',true)" onmouseup="hablar('${id}',false)">🎤 HABLAR</button>
            </div>
        `;
        grid.appendChild(card);
        const marker = L.marker([0,0]).addTo(mainMap).bindPopup(nombre.toUpperCase());
        units[id] = { marker, card, ptt: null };
    }

    function actualizarGPS(id, lat, lng) {
        if(!units[id]) return;
        const pos = [lat, lng];
        units[id].marker.setLatLng(pos);
        
        // VERIFICAR SI ENTRÓ EN ALGUNA ZONA DIBUJADA
        let enPeligro = false;
        zonasPeligrosas.forEach(z => {
            const distancia = mainMap.distance(pos, z.getLatLng());
            if(distancia < z.getRadius()) enPeligro = true;
        });

        if(enPeligro) {
            units[id].card.classList.add('zona-roja-alert');
        } else {
            units[id].card.classList.remove('zona-roja-alert');
        }
    }

    function toggleAudio(id) { const v = document.getElementById('v-'+id); if(v) v.muted = !v.muted; }

    async function hablar(id, on) {
        if(on) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                units[id].ptt = peer.call(id, s);
            } catch(e) {}
        } else if(units[id].ptt) {
            units[id].ptt.close();
        }
    }

    function toggleSOS(id, on) { document.getElementById('sos-'+id).style.display = on ? 'flex' : 'none'; }

    initMap();
    generarToken();
</script>
</body>
</html>
