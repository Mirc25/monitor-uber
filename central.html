<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MAESTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000; border-bottom: 1px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 40px; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* CUADRICULA DE MONITOREO (Izquierda) */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4 columnas como en tu imagen */
            gap: 5px; padding: 5px; overflow-y: auto; 
            background: #111;
        }

        /* CELDA COMPACTA (Video + Botones + MiniMapa) */
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 260px; position: relative; }
        .video-box { height: 100px; background: #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; padding: 2px; background: #000; border-top: 1px solid #0f0; border-bottom: 1px solid #0f0; }
        .btn-ctrl { font-size: 9px; padding: 3px 0; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .btn-ctrl:hover { background: #ccc; }

        .mini-map { flex: 1; background: #333; border-top: 1px solid #333; }

        /* PANEL LATERAL DERECHO (Como tu imagen) */
        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        #mainMap { height: 250px; border-bottom: 2px solid #0f0; }
        
        .tools-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; }
        .btn-tool { background: #aaa; color: #000; font-weight: bold; padding: 15px; width: 100%; border-radius: 5px; text-transform: uppercase; font-size: 1.2rem; border: none; }
        
        .ai-switch { text-align: center; color: #fff; margin-top: 30px; }
        .toggle { width: 80px; height: 35px; background: #fff; border-radius: 20px; display: inline-block; position: relative; margin-top: 10px; }
        .toggle::after { content: ''; position: absolute; right: 5px; top: 5px; width: 25px; height: 25px; background: #eee; border-radius: 50%; box-shadow: 0 0 5px #000; }

        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight: bold;">PABLO SECURITY CENTRAL CHIMBAS</div>
    <button class="btn btn-sm btn-success" onclick="toggleAgenda(true)">+ ABRIR AGENDA Y TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>

    <div class="side-panel">
        <div id="mainMap"></div>
        
        <div class="tools-area">
            <button class="btn-tool">carpeta negra</button>
            <button class="btn-tool">siguientes</button>
            
            <div class="ai-switch">
                <div>ia reconocimiento facial</div>
                <div class="toggle"></div>
                <div style="margin-top: 5px; font-weight: bold;">activada</div>
            </div>
        </div>
    </div>
</div>

<div id="agendaModal"> ... </div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
    }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarGPS(conn.peer, data.lat, data.lng);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play().catch(()=>{}); }
            });
        });
    }

    function crearOActualizarCelda(pid, nombre) {
        if(document.getElementById('card-' + pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.innerHTML = `
            <div class="video-box"><video id="v-${pid}" autoplay muted playsinline></video></div>
            <div class="unit-actions">
                <button class="btn-ctrl" onclick="escuchar('${pid}')">Escuchar</button>
                <button class="btn-ctrl" onclick="hablar('${pid}')">hablar</button>
                <button class="btn-ctrl" style="color:red">Stop SOS</button>
            </div>
            <div id="m-${pid}" class="mini-map"></div>
        `;
        grid.prepend(card);
        
        // Inicializar mini-mapa para cada unidad
        const m = L.map('m-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        units[pid] = { m, mark: L.marker([0,0]).addTo(m) };
    }

    function actualizarGPS(pid, lat, lng) {
        if(units[pid]) {
            const pos = [lat, lng];
            units[pid].m.setView(pos);
            units[pid].mark.setLatLng(pos);
        }
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }
    window.onload = init;
</script>
</body>
</html>
