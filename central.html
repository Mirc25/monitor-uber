<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL DE MONITOREO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .header { border-bottom: 2px solid #0f0; background: #0a0a0a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .codigo-box { background: #1a1a1a; border: 2px dashed #0f0; padding: 10px; border-radius: 8px; color: #fff; font-size: 1.4rem; font-weight: bold; }
        .main-container { display: flex; height: calc(100vh - 70px); }
        .video-section { flex: 3; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; border-right: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .side-panel { flex: 1; background: #0a0a0a; padding: 20px; display: flex; flex-direction: column; }
        .btn-danger-custom { background: #600; color: #fff; border: 2px solid #f00; width: 100%; padding: 15px; font-weight: bold; margin-top: 10px; }
        .btn-danger-custom:hover { background: #a00; }
        .status-card { border: 1px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .alert-sos { background: #f00; color: #fff; padding: 20px; text-align: center; border-radius: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div><strong style="font-size: 1.5rem;">PABLO SECURITY</strong> <span class="text-secondary">| MONITORING V.3</span></div>
    <div class="d-flex align-items-center">
        <span class="me-3 text-secondary">CÓDIGO DE ENLACE:</span>
        <div id="numCodigo" class="codigo-box">------</div>
    </div>
</div>

<div class="main-container">
    <div class="video-section">
        <video id="videoRemote" autoplay playsinline></video>
        <div id="no-signal" style="position: absolute; color: #333;">SIN SEÑAL DE VIDEO</div>
    </div>

    <div class="side-panel">
        <div id="sosAlert" class="alert-sos mb-3">🚨 BOTÓN DE PÁNICO 🚨</div>
        
        <div class="status-card">
            <h6 class="text-secondary border-bottom pb-2">DATOS DE UNIDAD</h6>
            <p class="mb-1">UNIDAD: <strong id="txtNombre" class="text-white">---</strong></p>
            <p class="mb-1">COORDENADAS: <strong id="txtGps" class="text-white">---</strong></p>
            <p class="mb-0">ESTADO: <span id="txtStatus" class="text-warning">LISTO</span></p>
        </div>

        <button onclick="window.location.reload()" class="btn-danger-custom">CORTAR LLAMADA / RESET</button>
        
        <div class="mt-auto">
            <p class="small text-secondary mb-1">REGISTRO DE ACTIVIDAD:</p>
            <div id="log" style="font-size: 10px; color: #444; height: 100px; overflow-y: auto; border-top: 1px solid #222;"></div>
        </div>
    </div>
</div>

<script>
    const miCodigo = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('numCodigo').innerText = miCodigo;

    const peer = new Peer('pablo-' + miCodigo);
    const log = (m) => { document.getElementById('log').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; };

    peer.on('call', (call) => {
        log("Llamada entrante...");
        call.answer();
        call.on('stream', (stream) => {
            document.getElementById('videoRemote').srcObject = stream;
            document.getElementById('no-signal').style.display = 'none';
            document.getElementById('txtStatus').innerText = "TRANSMITIENDO";
            document.getElementById('txtStatus').className = "text-danger";
        });
    });

    peer.on('connection', (conn) => {
        log("Conexión de datos establecida.");
        conn.on('data', (data) => {
            if(data.tipo === 'nombre') document.getElementById('txtNombre').innerText = data.valor.toUpperCase();
            if(data.tipo === 'gps') document.getElementById('txtGps').innerText = data.lat.toFixed(6) + "," + data.lng.toFixed(6);
            if(data.tipo === 'alerta') {
                document.getElementById('sosAlert').style.display = 'block';
                new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
            }
        });
    });
</script>
</body>
</html>
