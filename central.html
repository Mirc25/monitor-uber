<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MONITOR INTERACTIVO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .top-bar { background: #050505; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .grid-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 15px; padding: 15px; height: calc(100vh - 60px); overflow-y: auto; }
        
        .unit-card { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; display: flex; flex-direction: column; height: 500px; position: relative; overflow: hidden; transition: all 0.3s ease; }
        
        /* Video Ultra Ancho */
        .video-box { width: 100%; height: 250px; background: #000; cursor: pointer; border-bottom: 1px solid #1a1a1a; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; } /* Cover asegura que llene todo el ancho */
        
        /* GPS Interactivo */
        .map-box { width: 100%; height: 160px; background: #111; cursor: pointer; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(95%); cursor: pointer; }

        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #050505; }
        .btn-pablo { font-size: 11px; font-weight: bold; padding: 12px; border: 1px solid #0f0; background: transparent; color: #0f0; text-transform: uppercase; border-radius: 8px; }
        .btn-hablar { background: #002200; }
        .btn-hablar:active { background: #0f0; color: #000; }

        /* Efecto Maximizar al tocar */
        .max-view { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 2000; }
        .max-view .video-box { height: 100% !important; }
        .max-view .map-box, .max-view .controls, .max-view .unit-header { display: none; }

        .max-map { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 2000; }
        .max-map .map-box { height: 100% !important; }
        .max-map .video-box, .max-map .controls, .max-map .unit-header { display: none; }

        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.9); display: none; z-index: 2500; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .unit-header { background: #000; padding: 5px; font-size: 12px; text-align: center; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong>PABLO SECURITY</strong> | PANEL TÁCTIL</div>
    <div class="badge bg-dark border border-success p-2 fs-5">ID CENTRAL: PABLO-CENTRAL-2026</div>
</div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    const peer = new Peer('PABLO-CENTRAL-2026');
    const units = {};
    let myStream;

    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => myStream = s);

    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (stream) => {
            const video = document.getElementById('v-' + call.peer);
            if (video) { video.srcObject = stream; video.play(); }
        });
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data.tipo === 'login') crearTarjeta(conn.peer, data.nombre);
            if (data.tipo === 'gps') moverGPS(conn.peer, data.lat, data.lng);
            if (data.tipo === 'sos') alerta(conn.peer, true);
        });
    });

    function crearTarjeta(id, nombre) {
        if (document.getElementById('card-' + id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}">
                <h1 class="text-white fw-bold">🚨 ALERTA SOS 🚨</h1>
                <p class="text-white">${nombre.toUpperCase()}</p>
                <button class="btn btn-light btn-lg fw-bold mt-3" onclick="alerta('${id}', false)">DETENER ALARMA</button>
            </div>
            <div class="unit-header text-success"><strong>${nombre.toUpperCase()}</strong></div>
            <div class="video-box" onclick="toggleMax('${id}', 'video')">
                <video id="v-${id}" autoplay playsinline muted></video>
            </div>
            <div id="map-${id}" class="map-box" onclick="toggleMax('${id}', 'map')"></div>
            <div class="controls">
                <button class="btn-pablo" id="aud-${id}" onclick="toggleAudio('${id}')">ESCUCHAR</button>
                <button class="btn-pablo btn-hablar" onmousedown="hablar('${id}', true)" onmouseup="hablar('${id}', false)" ontouchstart="hablar('${id}', true)" ontouchend="hablar('${id}', false)">HABLAR</button>
            </div>
        `;
        grid.appendChild(card);
        
        units[id] = { map: L.map('map-' + id, { zoomControl: false, attributionControl: false }).setView([0,0], 17), marker: null };
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(units[id].map);
    }

    function toggleMax(id, tipo) {
        const card = document.getElementById('card-' + id);
        if (tipo === 'video') {
            card.classList.toggle('max-view');
        } else {
            card.classList.toggle('max-map');
            setTimeout(() => units[id].map.invalidateSize(), 400);
        }
    }

    function hablar(id, activo) {
        if(activo && myStream) {
            peer.call(id, myStream);
        }
    }

    function toggleAudio(id) {
        const v = document.getElementById('v-' + id);
        v.muted = !v.muted;
        const btn = document.getElementById('aud-' + id);
        btn.style.background = v.muted ? 'transparent' : '#0f0';
        btn.style.color = v.muted ? '#0f0' : '#000';
    }
