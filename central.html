<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL DE MONITOREO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .navbar-security { border-bottom: 2px solid #00ff00; background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .codigo-display { background: #111; border: 1px dashed #00ff00; padding: 5px 15px; border-radius: 5px; color: #fff; font-weight: bold; font-size: 1.2rem; }
        .video-container { position: relative; width: 100%; height: 70vh; background: #000; border: 1px solid #333; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        .info-panel { background: #111; border-left: 2px solid #00ff00; height: 100vh; padding: 20px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; background: #555; }
        .status-online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .alert-sos { background: rgba(255,0,0,0.2); border: 2px solid red; color: red; padding: 15px; border-radius: 10px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar-security">
        <div><strong>PABLO SECURITY</strong> | CENTRAL V.2.0</div>
        <div>
            <span class="text-secondary small">CÓDIGO PARA CHÓFERES: </span>
            <span id="displayCodigo" class="codigo-display">Cargando...</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-9 px-4">
                <div class="video-container">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="no-signal" style="position:absolute;">ESPERANDO SEÑAL DE VIDEO...</div>
                </div>
                
                <div id="alertaSos" class="alert-sos mt-3 text-center">
                    <h2 class="m-0">🚨 ¡ALERTA S.O.S - UNIDAD EN PELIGRO! 🚨</h2>
                </div>
            </div>

            <div class="col-md-3 info-panel">
                <h5 class="text-white border-bottom pb-2">ESTADO DE UNIDAD</h5>
                <div class="mb-4 mt-3">
                    <p><span id="dot" class="status-dot"></span> <span id="statusTxt">DESCONECTADO</span></p>
                    <p class="small">IDENTIFICACIÓN: <br><strong id="nombreUnidad" class="text-white">---</strong></p>
                    <p class="small">COORDENADAS GPS: <br><strong id="gps" class="text-white">---</strong></p>
