<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MONITOR MAESTRO Argentina</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* BARRA SUPERIOR PROFESIONAL */
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 45px; z-index: 20; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .btn-agenda-main { background: #0f0; color: #000; font-weight: bold; padding: 5px 12px; border: none; border-radius: 2px; cursor: pointer; font-size: 11px; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.5); } 70% { box-shadow: 0 0 0 8px rgba(0, 255, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); } }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; background: #050505; }
        
        /* CUADRICULA AJUSTADA AL 25% (4 COLUMNAS FIJAS) */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); /* Cada recuadro es un 25% */
            gap: 12px; padding: 12px; overflow-y: auto; align-content: start;
        }
        
        /* DISEÑO DE LA CELDA DE CADA CONDUCTOR */
        .unit-card { background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; height: 280px; position: relative; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .unit-header { background: #1a1a1a; font-size: 10px; padding: 5px; text-align: center; border-bottom: 1px solid #0f0; color: #0f0; fw: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        /* VIDEO MINIATURA */
        .video-box { height: 160px; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ALERTA ANTIPÁNICO ROJA (Boton Antipanico) */
        .sos-active-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.6); z-index: 10; display: none; animation: blink 0.4s infinite; pointer-events: none; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        
        /* ÚNICO BOTÓN PERMITIDO EN EMERGENCIA: PARAR ALERTA */
        .btn-stop-alert { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; background: #fff; color: #f00; border: 2px solid #f00; font-weight: bold; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; box-shadow: 0 0 15px #fff; }

        /* ELIMINADOS BOTONES "CORTAR", "ESCUCHAR", "LLAMAR" - SOLO INFO */
        .mini-controls-disabled { display: flex; justify-content: center; align-items: center; padding: 4px; background: #000; color: #666; font-size: 9px; font-style: italic; }

        /* MAPA INDIVIDUAL MINI */
        .mini-map { height: 75px; border-top: 1px solid #222; filter: grayscale(1) contrast(1.2) invert(1) hue-rotate(180deg); } /* Efecto noche militar */
        #mainMap { width: 300px; height: 220px; border: 2px solid #0f0; position: fixed; bottom: 15px; right: 15px; z-index: 30; border-radius: 8px; opacity: 0.8; box-shadow: 0 0 20px rgba(0,255,0,0.2); }

        /* AGENDA MODAL FLOTANTE */
        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 1000; padding: 30px; }
        .agenda-container { max-width: 900px; margin: 0 auto; background: #0a0a0a; border: 2px solid #0f0; padding: 25px; border-radius: 10px; box-shadow: 0 0 40px rgba(0,255,0,0.1); }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b style="font-size: 1.2em;">PABLO SECURITY</b> <span style="font-size: 0.7em; opacity: 0.6;">| CENTRAL OPERATIVA CHIMBAS</span></div>
    <button class="btn-agenda-main" onclick="toggleAgenda(true)">📂 AGENDA CONDUCTORES</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-container text-success">
        <div class="d-flex justify-content-between mb-3 border-bottom border-success pb-2">
            <h4 class="m-0">GESTIÓN DE CONDUCTORES Y TOKENS</h4>
            <button class="btn btn-sm btn-outline-success" onclick="toggleAgenda(false)">_ MINIMIZAR</button>
        </div>
        <div class="row g-2 mb-3 bg-dark p-2 rounded">
            <div class="col-6"><input type="text" id="regNombre" placeholder="IDENTIFICACIÓN CONDUCTOR" class="form-control form-control-sm bg-black text-success border-success"></div>
            <div class="col-3"><select id="regTiempo" class="form-select form-select-sm bg-black text-success border-success"><option value="24">24 HORAS</option><option value="720">30 DÍAS</option></select></div>
            <div class="col-3"><button class="btn btn-sm btn-success w-100 fw-bold" onclick="crearAbonado()">+ ALTA</button></div>
        </div>
        <input type="text" class="form-control form-control-sm bg-dark text-info mb-3" placeholder="🔎 BUSCAR EN BASE DE DATOS..." onkeyup="renderAgenda()" id="busquedaAbonado">
        <div id="agendaContenido" class="row g-2" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmSound = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');

    function init() {
        mainMap = L.map('mainMap', {zoomControl: false, attributionControl: false}).setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarIngreso(conn, data);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') alertaAntipanico(conn.peer);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function manejarIngreso(conn, data) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        
        if(user && Date.now() < user.vence) {
            conn.send({ tipo: 'auth_ok', vence: user.vence });
            crearOActualizarCelda(conn.peer, user.nombre);
        } else {
            conn.send({ tipo: 'error', msg: 'ACCESO DENEGADO' });
        }
    }

    function crearOActualizarCelda(pid, nombre) {
        // ELIMINAR CUALQUIER INSTANCIA PREVIA DEL MISMO NOMBRE (NO DUPLICAR)
        let ex = document.querySelector(`[data-u="${nombre}"]`);
        if(ex) {
            const oldPid = ex.id.replace('card-', '');
            if(units[oldPid]) {
                units[oldPid].markerGen.remove();
                delete units[oldPid];
            }
            ex.remove();
        }

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.setAttribute('data-u', nombre);
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box">
                <div id="sos-over-${pid}" class="sos-active-overlay"></div>
                <button id="sos-btn-${pid}" class="btn-stop-alert" onclick="detenerSOS('${pid}')">PARAR ALERTA SOS</button>
                <video id="v-${pid}" autoplay playsinline muted></video>
            </div>
            <div class="mini-controls-disabled">Transmisión Activa</div>
            <div id="m-i-${pid}" class="mini-map"></div>
        `;
        grid.prepend(card); // Los nuevos entran primero
        
        const mi = L.map('m-i-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { 
            mi, 
            markerInd: L.marker([0,0]).addTo(mi), 
            markerGen: L.marker([0,0], {icon: L.divIcon({className: 'bg-danger rounded-circle', iconSize:[10,10]})}).addTo(mainMap).bindPopup(nombre)
        };
    }

    // --- LÓGICA ÚNICA DE BOTON ANTIPANICO (SOS) ---
    function alertaAntipanico(pid) {
        const overlay = document.getElementById('sos-over-' + pid);
        const btn = document.getElementById('sos-btn-' + pid);
        if(overlay && btn) {
            overlay.style.display = 'block';
            btn.style.display = 'block';
            alarmSound.loop = true;
            alarmSound.play();
        }
    }

    // Esta función permite al operador (Pablo) detener solo el sonido y el parpadeo
    function detenerSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'none';
        document.getElementById('sos-btn-' + pid).style.display = 'none';
        alarmSound.pause();
        alarmSound.currentTime = 0;
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    // --- FUNCIONES AGENDA (No cambian) ---
    function crearAbonado() {
        const nombre = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if(!nombre) return;
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        db.push({ nombre, token: Math.floor(1000 + Math.random() * 8999).toString(), vence: Date.now() + (horas * 3600000) });
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
        document.getElementById('regNombre').value = "";
    }

    function renderAgenda() {
        const cont = document.getElementById('agendaContenido');
        const filtro = document.getElementById('busquedaAbonado').value.toUpperCase();
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        cont.innerHTML = db.filter(u => u.nombre.includes(filtro)).map(u => `
            <div class="col-md-4"><div class="p-2 border border-secondary small text-white rounded">
                <b>${u.nombre}</b><br>T: ${u.token}
            </div></div>`).join('');
    }

    window.onload = init;
</script>
</body>
</html>
