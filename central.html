<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MASTER IA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000; border-bottom: 1px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 45px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 5px; overflow-y: auto; background: #111; }
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 320px; position: relative; transition: 0.3s; }
        
        /* Alerta IA Titilante */
        .alerta-ia { border: 5px solid #f00 !important; box-shadow: 0 0 25px #f00; animation: parpadeo-ia 0.4s infinite alternate; z-index: 1000; cursor: pointer; }
        @keyframes parpadeo-ia { 0% { background: #000; } 100% { background: #400; } }

        /* Estilo para Unidad en Pausa de IA */
        .pausa-ia { opacity: 0.8; border: 1px solid #00f !important; }
        .pausa-ia::after { content: "IA EN PAUSA"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,255,0.7); color: white; padding: 2px 5px; font-size: 10px; border-radius: 4px; pointer-events: none; }

        .unit-header { background: #1a1a1a; font-size: 10px; padding: 2px; text-align: center; color: #0f0; }
        .video-box { height: 110px; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px; background: #000; border-top: 1px solid #0f0; }
        .btn-ctrl { font-size: 9px; padding: 8px 0; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; user-select: none; }
        .btn-active { background: #0f0 !important; color: #000 !important; }
        .btn-talking { background: #f0f !important; color: #fff !important; }
        .mini-map { flex: 1; background: #333; pointer-events: none; }
        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        #mainMap { height: 260px; border-bottom: 2px solid #0f0; }
        .modales { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 25px; }
        .modal-container { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #0f0; padding: 20px; color: #0f0; border-radius: 8px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight: bold;">PABLO SECURITY CENTRAL MASTER</div>
    <div>
        <button class="btn btn-sm btn-info fw-bold me-2" onclick="activarMicrofonoCentral()">🎤 ACTIVAR MICRO CENTRAL</button>
    </div>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div class="side-panel">
        <div id="mainMap"></div>
        <div class="p-3">
            <button class="btn btn-danger w-100 fw-bold mb-3" onclick="toggleCarpetaNegra(true)">👤 CARPETA NEGRA</button>
            <div id="ia-toggle" style="width:70px; height:30px; background:#444; border-radius:20px; margin:10px auto; position:relative; cursor:pointer;" onclick="toggleIA()">
                <div id="ia-dot" style="position:absolute; left:5px; top:4px; width:22px; height:22px; background:#ddd; border-radius:50%; transition: 0.3s;"></div>
            </div>
            <div id="ia-text" style="font-weight:bold; font-size:12px; color:#555; text-align:center;">IA DESACTIVADA</div>
        </div>
    </div>
</div>

<div id="blackFolderModal" class="modales">
    <div class="modal-container" style="border-color: #f00;">
        <h4>LISTA NEGRA</h4>
        <button class="btn btn-sm btn-danger float-end" onclick="toggleCarpetaNegra(false)">CERRAR</button>
        <div class="row g-2 my-4">
            <div class="col-md-5"><input type="file" id="fotoDelincuente" class="form-control bg-dark text-white border-danger" accept="image/*"></div>
            <div class="col-md-4"><input type="text" id="nombreDelincuente" class="form-control bg-dark text-white border-danger" placeholder="ALIAS"></div>
            <div class="col-md-3"><button class="btn btn-danger w-100" onclick="guardarDelincuente()">AÑADIR</button></div>
        </div>
        <div id="listaNegra" class="row g-2"></div>
    </div>
</div>

<script>
    let peer, mainMap, dbIndexed, iaActiva = false;
    let miStreamAudio = null;
    let llamadaActual = null;
    const units = {}; // Registro de unidades y sus estados
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmAudio.loop = true;

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [25, 25], className: 'fuchsia-car' });
    const sosIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'sos-car' });

    // --- BASE DE DATOS ---
    const request = indexedDB.open("PabloSecurity_Folder", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("delincuentes", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = (e) => { dbIndexed = e.target.result; cargarListaNegraVisual(); };

    async function activarMicrofonoCentral() {
        try {
            miStreamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
            alert("Micrófono de la central activo.");
        } catch (e) { alert("Permitir micrófono en el navegador."); }
    }

    async function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        try {
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        } catch(e) { console.log("IA Modelos no listos"); }
        conectarCentral();
        setInterval(escanearIA, 2000);
    }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            units[conn.peer] = units[conn.peer] || { ignoreIA: false };
            units[conn.peer].conn = conn;
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.muted = true; v.play(); }
            });
        });
    }

    function pararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        if(c && c.classList.contains('alerta-ia')) {
            c.classList.remove('alerta-ia');
            if(units[pid].mainMarker) units[pid].mainMarker.setIcon(carIcon);
            
            // --- NUEVA LÓGICA DE PAUSA DE 3 MINUTOS ---
            units[pid].ignoreIA = true;
            c.classList.add('pausa-ia');
            console.log("IA pausada 3 min para: " + pid);

            setTimeout(() => {
                units[pid].ignoreIA = false;
                c.classList.remove('pausa-ia');
                console.log("IA reactivada para: " + pid);
            }, 180000); // 180.000 ms = 3 minutos

            // Detener sonido si no hay más alertas
            if(document.querySelectorAll('.alerta-ia').length === 0) {
                alarmAudio.pause(); alarmAudio.currentTime = 0;
            }
        }
    }

    async function escanearIA() {
        if(!iaActiva) return;
        const vids = document.querySelectorAll('video');
        const dbList = await new Promise(res => {
            const list = [];
            dbIndexed.transaction("delincuentes", "readonly").objectStore("delincuentes").openCursor().onsuccess = (e) => {
                const c = e.target.result; if(c) { list.push(c.value); c.continue(); } else res(list);
            };
        });
        if(dbList.length === 0) return;

        for(let v of vids) {
            const pid = v.id.replace('v-', '');
            
            // SI LA UNIDAD ESTÁ EN PAUSA, NO ESCANEARLA
            if(units[pid] && units[pid].ignoreIA) continue;

            if(v.paused || v.ended || v.readyState < 3) continue;
            try {
                const det = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptors();
                for(let d of det) {
                    for(let del of dbList) {
                        if(faceapi.euclideanDistance(d.descriptor, new Float32Array(del.descriptor)) < 0.6) {
                            dispararAlerta(pid);
                        }
                    }
                }
            } catch(e) {}
        }
    }

    function dispararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        if(c && !c.classList.contains('alerta-ia') && !units[pid].ignoreIA) {
            c.classList.add('alerta-ia');
            if(units[pid].mainMarker) units[pid].mainMarker.setIcon(sosIcon);
            alarmAudio.play().catch(()=>{});
        }
    }

    // --- RESTO DE FUNCIONES (HABLAR, ESCUCHAR, BLOQUEAR, SETUP) ---
    function iniciarHabla(pid) {
        if(!miStreamAudio) return;
        const btn = document.getElementById('btn-hablar-' + pid);
        btn.classList.add('btn-talking');
        units[pid].currentCall = peer.call(pid, miStreamAudio);
    }
    function detenerHabla(pid) {
        const btn = document.getElementById('btn-hablar-' + pid);
        if(btn) btn.classList.remove('btn-talking');
        if(units[pid].currentCall) { units[pid].currentCall.close(); units[pid].currentCall = null; }
    }
    function toggleEscucha(pid) {
        const v = document.getElementById('v-' + pid);
        const btn = document.getElementById('btn-escuchar-' + pid);
        if (v.muted) { v.muted = false; btn.classList.add('btn-active'); btn.innerText = "🔊 ON"; }
        else { v.muted = true; btn.classList.remove('btn-active'); btn.innerText = "🔈 OFF"; }
    }
    function bloquearPantalla(pid) { if(units[pid].conn) units[pid].conn.send({ tipo: 'bloquear_pantalla' }); }

    function crearOActualizarCelda(pid, nombre) {
        if(document.getElementById('card-' + pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + pid;
        card.onclick = function() { if(this.classList.contains('alerta-ia')) pararAlerta(pid); };

        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box"><video id="v-${pid}" autoplay playsinline muted crossorigin="anonymous"></video></div>
            <div class="unit-actions">
                <button id="btn-hablar-${pid}" class="btn-ctrl" onmousedown="iniciarHabla('${pid}')" onmouseup="detenerHabla('${pid}')" onmouseleave="detenerHabla('${pid}')">🎙️ Hablar</button>
                <button id="btn-escuchar-${pid}" class="btn-ctrl" onclick="event.stopPropagation(); toggleEscucha('${pid}')">🔈 Escuchar</button>
                <button class="btn-ctrl" style="background:#ffc107" onclick="event.stopPropagation(); bloquearPantalla('${pid}')">🔒 Bloquear</button>
                <button class="btn-ctrl" style="color:red" onclick="event.stopPropagation(); pararAlerta('${pid}')">SOS</button>
            </div>
            <div id="m-${pid}" class="mini-map"></div>`;
        grid.prepend(card);
        const m = L.map('m-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        units[pid] = units[pid] || { ignoreIA: false };
        units[pid].miniMap = m; units[pid].miniMarker = L.marker([0,0]).addTo(m);
    }

    function actualizarPosicionGlobal(pid, lat, lng) {
        const pos = [lat, lng];
        if (!units[pid]) units[pid] = { ignoreIA: false };
        if (!units[pid].mainMarker) { units[pid].mainMarker = L.marker(pos, {icon: carIcon}).addTo(mainMap).bindPopup(pid); } 
        else { units[pid].mainMarker.setLatLng(pos); }
        if (units[pid].miniMap) { units[pid].miniMap.setView(pos); if (units[pid].miniMarker) units[pid].miniMarker.setLatLng(pos); }
    }
    function manejarLogin(conn, data) { units[conn.peer] = units[conn.peer] || { ignoreIA: false }; units[conn.peer].conn = conn; crearOActualizarCelda(conn.peer, data.nombre); conn.send({ tipo: 'auth_ok' }); }
    function toggleIA() { iaActiva = !iaActiva; document.getElementById('ia-dot').style.left = iaActiva ? "40px" : "5px"; document.getElementById('ia-toggle').style.background = iaActiva ? "#0f0" : "#444"; document.getElementById('ia-text').innerText = iaActiva ? "ACTIVA" : "DESACTIVADA"; }
    function toggleCarpetaNegra(s) { document.getElementById('blackFolderModal').style.display = s ? 'block' : 'none'; }
    async function guardarDelincuente() {
        const nom = document.getElementById('nombreDelincuente').value;
        const file = document.getElementById('fotoDelincuente').files[0];
        if(!nom || !file) return;
        try {
            const img = await faceapi.bufferToImage(file);
            const detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptor();
            const tx = dbIndexed.transaction(["delincuentes"], "readwrite");
            tx.objectStore("delincuentes").add({ nombre: nom.toUpperCase(), descriptor: Array.from(detections.descriptor), foto: await toBase64(file) });
            tx.oncomplete = () => { cargarListaNegraVisual(); alert("GUARDADO"); };
        } catch(e) { alert("Error IA"); }
    }
    function cargarListaNegraVisual() {
        const cont = document.getElementById('listaNegra'); if(!cont) return;
        cont.innerHTML = "";
        dbIndexed.transaction("delincuentes", "readonly").objectStore("delincuentes").openCursor().onsuccess = (e) => {
            const c = e.target.result; if(c) {
                cont.innerHTML += `<div class="col-4 mb-2 text-center"><div class="card bg-black border-danger p-1"><img src="${c.value.foto}" style="height:60px; object-fit:cover;"><button class="btn btn-danger btn-sm mt-1" onclick="eliminarSospechoso(${c.value.id})">X</button></div></div>`;
                c.continue();
            }
        };
    }
    function eliminarSospechoso(id) { dbIndexed.transaction(["delincuentes"], "readwrite").objectStore("delincuentes").delete(id); cargarListaNegraVisual(); }
    function toBase64(f) { return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }); }
    function toggleAgenda(s) { /* Si tenés el modal de agenda, habilitar acá */ }
    window.onload = init;
</script>
</body>
</html>
