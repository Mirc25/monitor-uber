<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MUNDO SEGURIDAD - CENTRAL IA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a1a2f 0%, #1e355c 100%) fixed;
            color: #e7f0ff;
            font-family: 'Rajdhani', 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: linear-gradient(90deg, #0a1a2f 0%, #1e355c 100%);
            border-bottom: 2px solid #2bdcff;
            padding: 7px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 54px;
            box-shadow: 0 2px 12px #0008;
        }
        .top-bar .logo-mundo {
            width: 32px;
            height: 32px;
            vertical-align: middle;
            filter: drop-shadow(0 0 4px #2bdcff);
            margin-right: 8px;
            animation: girar-mundo 2.5s linear infinite;
        }

        @keyframes girar-mundo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .top-bar-title {
            font-size: 18px;
            letter-spacing: 1px;
            color: #2bdcff;
            text-shadow: 0 2px 8px #000a;
            font-weight: bold;
        }
        /* Botón AGENDA Y TOKENS moderno y destacado */
        .agenda-btn-wrap {
            background: linear-gradient(90deg, #6bffaf 0%, #2bdcff 100%);
            border-radius: 16px;
            box-shadow: 0 2px 16px #2bdcff44;
            padding: 10px 8px 6px 8px;
            margin-bottom: 18px;
        }
        .btn-3d.agenda-btn {
            background: linear-gradient(90deg, #2bdcff 0%, #0a1a2f 100%);
            color: #0a1a2f;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 16px #2bdcff88, 0 1.5px 0 #0a1a2f inset;
            font-weight: bold;
            font-size: 16px;
            padding: 13px 22px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
            text-shadow: 0 1px 8px #fff8;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-3d.agenda-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 2px 8px #2bdcffcc;
        }
        .btn-zona {
            background: linear-gradient(180deg, #ffb347 0%, #ffcc80 100%);
            color: #7a2800;
            box-shadow: 0 4px 16px #ffb34744, 0 1.5px 0 #7a2800 inset;
        }
        .btn-negra {
            background: linear-gradient(180deg, #ff5f7d 0%, #ffb6c1 100%);
            color: #7a0022;
            box-shadow: 0 4px 16px #ff5f7d44, 0 1.5px 0 #7a0022 inset;
        }
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        .main-layout-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: url('https://img.freepik.com/fotos-premium/mapa-mundo-lineas-conexion-red-internet_177415-3114.jpg?w=2000') center center no-repeat;
            background-size: cover;
            opacity: 0.18;
        }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; padding: 8px; overflow-y: auto; background: #111; }
        /* Eliminado fondo duplicado en .grid-fleet::before para evitar conflicto visual */
        .grid-fleet::before {
            content: none;
        }
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 350px; position: relative; transition: 0.3s; z-index: 1; }
        .alerta-ia { border: 5px solid #f00 !important; box-shadow: 0 0 25px #f00; animation: parpadeo-ia 0.4s infinite alternate; z-index: 1000; cursor: pointer; }
        @keyframes parpadeo-ia { 0% { background: #000; } 100% { background: #400; } }
        .alerta-emergencia { border: 5px solid #ff6a00 !important; box-shadow: 0 0 25px #ff6a00; animation: parpadeo-emergencia 0.35s infinite alternate; z-index: 1001; cursor: pointer; }
        @keyframes parpadeo-emergencia { 0% { background: #000; } 100% { background: #4a1f00; } }
        .unit-header.emergency { background: #ff6a00; color: #000; animation: parpadeo-emergencia 0.35s infinite alternate; }
        .pausa-activa { border-bottom: 3px solid #00f !important; }
        .unit-header { background: #1a1a1a; font-size: 10px; padding: 2px; text-align: center; color: #0f0; font-weight: bold; }
        .video-box { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { height: 100%; width: auto; object-fit: contain; }
        .unit-actions {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            padding: 8px 8px 6px 8px;
            background: #000;
            border-top: 1px solid #222;
        }
        .btn-record, .btn-gps, .btn-sos, .btn-ctrl {
            background: #000;
            color: #fff;
            border: 1.5px solid #fff;
            border-radius: 32px;
            box-shadow: 0 4px 18px 0 #000a;
            font-weight: 900;
            font-size: 22px;
            padding: 14px 38px 14px 24px;
            min-width: 150px;
            cursor: pointer;
            text-transform: uppercase;
            user-select: none;
            transition: box-shadow 0.18s, background 0.18s, color 0.18s, border 0.18s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 18px;
            letter-spacing: 1.3px;
            position: relative;
            overflow: hidden;
            outline: none;
        }
        .btn-record:hover, .btn-gps:hover, .btn-sos:hover, .btn-ctrl:hover {
            background: #181818;
            box-shadow: 0 8px 32px 0 #000c;
            border-color: #fff;
            color: #fff;
        }
        .btn-record svg, .btn-gps svg, .btn-sos svg, .btn-ctrl svg {
            width: 30px;
            height: 30px;
            margin-right: 10px;
            flex-shrink: 0;
            fill: #fff;
            animation: icon-bounce 1.2s infinite alternate;
        }
        @keyframes icon-bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
        .btn-record { color: #fff; }
        .btn-gps { color: #fff; }
        .btn-sos { color: #fff; }
        .btn-ctrl { color: #fff; }
        .btn-record .rec-anim {
            width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; margin-right: 7px;
        }
        .btn-record .rec-anim svg {
            display: block;
        }
        .btn-record .rec-pulse {
            fill: #f34b4b;
            stroke: #fff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 6px #f34b4b88);
            animation: rec-pulse 1.1s infinite alternate;
        }
        @keyframes rec-pulse {
            0% { opacity: 1; r: 7; }
            100% { opacity: 0.5; r: 10; }
        }
        .btn-record.recording {
            background: linear-gradient(160deg, #2a1818 0%, #3a2323 100%);
            color: #fff;
            border-color: #f34b4b;
        }
        .btn-gps {
            background: linear-gradient(145deg, #1a2327 0%, #162024 100%);
            color: #b2f2ff;
            border-color: #1a2327;
        }
        .btn-sos {
            background: linear-gradient(145deg, #2e1a1a 0%, #3a2323 100%);
            color: #ffb6b6;
            border-color: #2e1a1a;
            font-size: 14px;
            min-width: 60px;
            padding: 8px 12px;
        }
        .btn-ctrl {
            background: linear-gradient(145deg, #1a2327 0%, #23272e 100%);
            color: #b2f2ff;
            border-color: #1a2327;
            font-size: 14px;
            min-width: 60px;
            padding: 8px 12px;
        }
        .btn-active {
            background: linear-gradient(145deg, #1a2e1a 0%, #232e23 100%) !important;
            color: #b6ffb6 !important;
        }
        .btn-talking {
            background: linear-gradient(145deg, #2e1a2e 0%, #2e2332 100%) !important;
            color: #e6b6ff !important;
        }
        .btn-record:active, .btn-gps:active, .btn-sos:active, .btn-ctrl:active, .btn-other:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: 0 1px 4px #000c;
        }
        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        .map-shell { position: relative; border-bottom: 2px solid #0f0; }
        #mainMap { height: 280px; background: #111; }
        .map-actions { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 6px; z-index: 1200; }
        .btn-map-mini { background: rgba(7, 14, 24, 0.88); color: #9fe9ff; border: 1px solid #2f6993; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
        .btn-map-mini.active { background: #7a2800; color: #ffd8ad; border-color: #ff8a3c; }
        .btn-map-mini.ref-on { background: #143e66; color: #d7f0ff; border-color: #6fb7ff; }
        .zone-list-item { border: 1px solid #2b435e; border-radius: 8px; background: #0d1724; padding: 8px; margin-bottom: 8px; color: #cde5ff; }
        .zone-list-item .meta { font-size: 12px; color: #94c8ff; }
        .modales { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 25px; }
        .modal-container { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #0f0; padding: 20px; border-radius: 8px; color: #0f0; position: relative; }
        #mapaFlotanteContainer { height: 500px; width: 100%; background: #222; margin-top: 10px; border: 1px solid #0f0; }
        #mainMapExpandedContainer { height: calc(100vh - 140px); width: 100%; background: #111; border: 1px solid #1f6e94; }
        .gps-toolbar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .gps-mini-btn { border: 1px solid #246ea0; background: #10263b; color: #8fd3ff; font-size: 11px; font-weight: bold; border-radius: 6px; padding: 5px 10px; cursor: pointer; }
        .gps-mini-btn.on { background: #1f5f34; border-color: #46c77a; color: #d9ffe9; }
        .gps-mini-btn.poi { background: #3a2a11; border-color: #d09a4f; color: #ffd89e; }
        .gps-hud { margin-top: 8px; border: 1px solid #1a5075; border-radius: 8px; background: #08151f; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: #bfe7ff; }
        .gps-hud b { color: #77ceff; }
        #statusCentral { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: #f00; color: #fff; font-weight: bold; }
        #statusCentral.online { background: #0a0; }
        .alerta-zona { border: 5px solid #ffc107 !important; box-shadow: 0 0 25px #ffc107; animation: parpadeo-zona 0.5s infinite alternate; z-index: 1002; }
        @keyframes parpadeo-zona { 0% { background: #111; } 100% { background: #4b3805; } }
    </style>
</head>
<body>
<!-- El resto del HTML y JS de la central debe ir aquí -->
</body>

<div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
        <svg class="logo-mundo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

          <ellipse cx="32" cy="32" rx="24" ry="12" fill="#1e355c" opacity="0.7"/>
          <ellipse cx="32" cy="32" rx="20" ry="28" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
          <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
        </svg>
        <span class="top-bar-title">MUNDO SEGURIDAD</span>
        <span id="statusCentral" style="margin-left:12px;">● CONECTANDO...</span>
    </div>
    <!-- Eliminar botón duplicado de AGENDA Y TOKENS en la barra superior -->
</div>

<div class="main-layout">
    <img src="https://img.freepik.com/fotos-premium/mapa-mundo-lineas-conexion-red-internet_177415-3114.jpg?w=2000" alt="Decorativo" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.18;z-index:0;pointer-events:none;" />
        <div class="grid-fleet" id="monitorGrid" style="position:relative; z-index:1;"></div>
        <script>
        // --- UI para botón GRABAR y gestión de videos ---
        // Simulación: asume que cada monitor es un .unit-card con un video-box
        function renderRecordButtons() {
            const grid = document.getElementById('monitorGrid');
            if (!grid) return;
            const cards = grid.querySelectorAll('.unit-card');
            cards.forEach((card, idx) => {
                const actions = card.querySelector('.unit-actions');
                if (!actions) return;
                // Solo agrega los botones si no existen
                if (!actions.querySelector('.btn-record')) {
                    const recBtn = document.createElement('button');
                    recBtn.className = 'btn-record';
                    recBtn.onclick = function() { toggleRecord(this, idx); };
                    recBtn.innerHTML = `
                        <span class="rec-anim">
                            <svg width="18" height="18" viewBox="0 0 20 20">
                                <circle class="rec-pulse" cx="10" cy="10" r="7" />
                                <circle cx="10" cy="10" r="4" fill="#fff"/>
                            </svg>
                        </span>
                        <span style="flex:1;text-align:center;">REC</span>
                    `;
                    actions.appendChild(recBtn);
                }
                if (!actions.querySelector('.btn-gps')) {
                    const gpsBtn = document.createElement('button');
                    gpsBtn.className = 'btn-gps';
                    gpsBtn.onclick = function() { /* Acción GPS aquí */ alert('GPS solicitado'); };
                    gpsBtn.innerHTML = `
                        <span class="rec-anim">
                            <svg width="18" height="18" viewBox="0 0 20 20">
                                <circle cx="10" cy="10" r="7" fill="#fff" opacity="0.13"/>
                                <circle cx="10" cy="10" r="6" fill="#3ad6ff"/>
                                <circle cx="10" cy="10" r="2.5" fill="#fff"/>
                                <path d="M10 2v3M10 15v3M2 10h3M15 10h3" stroke="#3ad6ff" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span style="flex:1;text-align:center;">GPS</span>
                    `;
                    actions.appendChild(gpsBtn);
                }
                if (!actions.querySelector('.btn-sos')) {
                    const sosBtn = document.createElement('button');
                    sosBtn.className = 'btn-sos';
                    sosBtn.onclick = function() { /* Acción SOS aquí */ alert('SOS enviado'); };
                    sosBtn.innerHTML = `
                        <span class="rec-anim">
                            <svg width="18" height="18" viewBox="0 0 20 20">
                                <circle cx="10" cy="10" r="7" fill="#fff" opacity="0.13"/>
                                <circle cx="10" cy="10" r="6" fill="#ff5f5f"/>
                                <rect x="9.1" y="5" width="1.8" height="6.5" rx="0.9" fill="#fff"/>
                                <rect x="9.1" y="13.2" width="1.8" height="1.8" rx="0.9" fill="#fff"/>
                            </svg>
                        </span>
                        <span style="flex:1;text-align:center;">SOS</span>
                    `;
                    actions.appendChild(sosBtn);
                }
                if (!actions.querySelector('.btn-ctrl')) {
                    const bloquearBtn = document.createElement('button');
                    bloquearBtn.className = 'btn-ctrl';
                    bloquearBtn.onclick = function() { /* Acción BLOQUEAR aquí */ alert('Bloqueado'); };
                    bloquearBtn.innerHTML = `
                        <span class="rec-anim">
                            <svg width="18" height="18" viewBox="0 0 20 20">
                                <rect x="4" y="9" width="12" height="6" rx="2" fill="#b2f2ff"/>
                                <rect x="7" y="4" width="6" height="6" rx="3" fill="#23272e"/>
                                <rect x="9.2" y="11.5" width="1.6" height="2.5" rx="0.8" fill="#23272e"/>
                            </svg>
                        </span>
                        <span style="flex:1;text-align:center;">BLOQ</span>
                    `;
                    actions.appendChild(bloquearBtn);
                }
            });
        }
        // Observa cambios en el grid de monitores y agrega el botón REC automáticamente
        document.addEventListener('DOMContentLoaded', () => {
            renderRecordButtons();
            const grid = document.getElementById('monitorGrid');
            if (!grid) return;
            const observer = new MutationObserver(() => renderRecordButtons());
            observer.observe(grid, { childList: true, subtree: true });
        });
        // --- Botón y animación ---
        // --- Grabación de video y GPS ---
        const recordings = [];
        let mediaRecorders = {};
        let gpsInterval = null;
        function toggleRecord(btn, idx) {
            const card = btn.closest('.unit-card');
            const video = card ? card.querySelector('video') : null;
            const nombre = card ? (card.querySelector('.unit-header')?.innerText || 'Monitor') : 'Monitor';
            if (!video) return;
            btn.classList.toggle('recording');
            if (btn.classList.contains('recording')) {
                btn.innerHTML = '<span class="rec-dot"></span> GRABANDO...';
                // Iniciar grabación
                let stream = video.srcObject || video.captureStream?.() || video.mozCaptureStream?.();
                if (!stream) { alert('No se puede grabar este video.'); return; }
                let chunks = [];
                let gpsData = [];
                let recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const now = new Date();
                    const fecha = now.toLocaleDateString('es-AR').replace(/\//g, '-');
                    const hora = now.toLocaleTimeString('es-AR').replace(/:/g, '-');
                    const filename = `${fecha}_${hora}_${nombre.replace(/\s+/g,'_')}.webm`;
                    recordings.push({ filename, blob, gps: [...gpsData] });
                    updateVideosList();
                };
                recorder.start();
                mediaRecorders[idx] = recorder;
                // Guardar GPS cada 2s
                gpsData.push(getCurrentGps());
                gpsInterval = setInterval(() => gpsData.push(getCurrentGps()), 2000);
            } else {
                btn.innerHTML = '<span class="rec-dot"></span> REC';
                // Detener grabación
                if (mediaRecorders[idx]) {
                    mediaRecorders[idx].stop();
                    delete mediaRecorders[idx];
                }
                if (gpsInterval) { clearInterval(gpsInterval); gpsInterval = null; }
            }
        }

        function getCurrentGps() {
            // Simulación: reemplaza por tu fuente real de GPS
            return { lat: window.floatingMarker?.getLatLng?.().lat || 0, lng: window.floatingMarker?.getLatLng?.().lng || 0, t: Date.now() };
        }

        // --- Listado y gestión de videos ---
        function updateVideosList() {
            const list = document.getElementById('videosList');
            if (!list) return;
            if (!recordings.length) {
                list.innerHTML = '<div class="text-info">No hay videos grabados aún.</div>';
                return;
            }
            list.innerHTML = '';
            recordings.forEach((rec, i) => {
                const div = document.createElement('div');
                div.className = 'video-item bg-dark text-light p-2 mb-2 rounded';
                div.innerHTML = `
                  <b>${rec.filename}</b><br>
                  <video src="${URL.createObjectURL(rec.blob)}" controls style="width:220px;max-width:100%;vertical-align:middle;"></video>
                  <button class="btn btn-sm btn-success ms-2" onclick="playVideoInModal(${i})">REPRODUCIR</button>
                  <button class="btn btn-sm btn-danger ms-2" onclick="deleteVideo(${i})">BORRAR</button>
                  <button class="btn btn-sm btn-info ms-2" onclick="shareVideo(${i})">COMPARTIR</button>
                  <button class="btn btn-sm btn-secondary ms-2" onclick="downloadVideo(${i})">DESCARGAR</button>
                  <span class="badge bg-info ms-2">GPS: ${rec.gps.length} pts</span>
                `;
                list.appendChild(div);
            });
        }

        function deleteVideo(i) {
            if (confirm('¿Borrar este video?')) {
                recordings.splice(i, 1);
                updateVideosList();
            }
        }
        function shareVideo(i) {
            const rec = recordings[i];
            if (navigator.share) {
                rec.blob.arrayBuffer().then(buf => {
                    const file = new File([buf], rec.filename, { type: 'video/webm' });
                    navigator.share({ files: [file], title: rec.filename });
                });
            } else {
                alert('Compartir no soportado en este navegador.');
            }
        }
        function downloadVideo(i) {
            const rec = recordings[i];
            const a = document.createElement('a');
            a.href = URL.createObjectURL(rec.blob);
            a.download = rec.filename;
            a.click();
        }
        function playVideoInModal(i) {
            const rec = recordings[i];
            const modal = document.createElement('div');
            modal.className = 'modales';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-container" style="max-width:700px; position:relative;">
                    <button onclick="this.closest('.modales').remove()" style="position:absolute;top:10px;right:10px;font-size:1.7em;background:none;border:none;color:#f00;font-weight:bold;z-index:10;line-height:1;">&times;</button>
                    <h4 style="padding-right:40px;">${rec.filename}</h4>
                    <video src="${URL.createObjectURL(rec.blob)}" controls autoplay style="width:100%"></video>
                    <br>
                    <button class="btn btn-danger mt-2" onclick="this.closest('.modales').remove()">CERRAR</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        </script>
        <style>

<script>
    let peer, mainMap, mainMapExpanded, dbIndexed, iaActiva = false;
    let localStream = null, floatingMap = null, floatingMarker = null;
    let floatingTrackLine = null, floatingTrackPoints = [];
    let floatingCurrentPid = null, floatingCurrentNombre = '';
    let floatingFollow = true, floatingPoiOn = false;
    let floatingPoiLayer = null;
    let riskZonesLayer = null, riskZonesLayerExpanded = null;
    let poiLayerMain = null, poiLayerExpanded = null;
    let geocodeMarkerMain = null, geocodeMarkerExpanded = null;
    let riskZones = [];
    const units = {};
    const pendingUnitStreams = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const PEER_OPTS = {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        path: '/',
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                {
                    urls: [
                        'turn:openrelay.metered.ca:80',
                        'turn:openrelay.metered.ca:443',
                        'turn:openrelay.metered.ca:443?transport=tcp'
                    ],
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        }
    };
    const RISK_ZONES_KEY = 'pablo_risk_zones_v1';
    const DEFAULT_ZONE_RADIUS_METERS = 700;
    const MIN_ZONE_RADIUS_METERS = 450;
    const MAX_ZONE_RADIUS_METERS = 2000;
    const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmAudio.loop = true;

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [25, 25], className: 'fuchsia-car' });
    const sosIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'sos-car' });
    const riskIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'risk-car' });

    const request = indexedDB.open("PabloSecurity_Folder", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("delincuentes", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = (e) => { dbIndexed = e.target.result; cargarListaNegraVisual(); };

    function setStatusCentral(online, texto) {
        const el = document.getElementById('statusCentral');
        el.innerText = '● ' + texto;
        el.className = online ? 'online' : '';
    }

    function attachUnitStream(peerId, stream) {
        const v = document.getElementById('v-' + peerId);
        if (!v) {
            pendingUnitStreams[peerId] = stream;
            return;
        }
        v.srcObject = stream;
        v.muted = true;
        v.play().catch(() => {});
        delete pendingUnitStreams[peerId];
    }

    function updateGpsHud(nombre, lat, lng) {
        const chofer = document.getElementById('hudChofer');
        const hora = document.getElementById('hudHora');
        const latEl = document.getElementById('hudLat');
        const lngEl = document.getElementById('hudLng');
        if (chofer) chofer.innerText = nombre || floatingCurrentNombre || '-';
        if (hora) hora.innerText = new Date().toLocaleTimeString();
        if (latEl) latEl.innerText = Number(lat || 0).toFixed(6);
        if (lngEl) lngEl.innerText = Number(lng || 0).toFixed(6);
    }

    function addTrackPoint(lat, lng) {
        if (!floatingMap) return;
        floatingTrackPoints.push([lat, lng]);
        if (floatingTrackPoints.length > 300) floatingTrackPoints.shift();
        if (!floatingTrackLine) {
            floatingTrackLine = L.polyline(floatingTrackPoints, { color: '#4fd1ff', weight: 3, opacity: 0.85 }).addTo(floatingMap);
        } else {
            floatingTrackLine.setLatLngs(floatingTrackPoints);
        }
    }

    function centrarMapaChofer() {
        if (!floatingMap || !floatingMarker) return;
        floatingMap.setView(floatingMarker.getLatLng(), 16);
    }

    function toggleSeguirChofer() {
        floatingFollow = !floatingFollow;
        const btn = document.getElementById('btnFollowDriver');
        if (btn) {
            btn.classList.toggle('on', floatingFollow);
            btn.innerText = floatingFollow ? 'SEGUIR ON' : 'SEGUIR OFF';
        }
    }

    async function loadPoiChofer() {
        if (!floatingMap || !floatingPoiOn) return;
        if (!floatingPoiLayer) floatingPoiLayer = L.layerGroup().addTo(floatingMap);
        floatingPoiLayer.clearLayers();

        const b = floatingMap.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json][timeout:20];(node["amenity"="fuel"](${bbox});node["shop"~"supermarket|convenience"](${bbox});node["amenity"~"pharmacy|hospital|clinic|police"](${bbox}););out body 150;`;

        try {
            const res = await fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
                body: 'data=' + encodeURIComponent(query)
            });
            if (!res.ok) return;
            const data = await res.json();
            const elements = Array.isArray(data.elements) ? data.elements : [];
            elements.forEach((el) => {
                if (!Number.isFinite(el.lat) || !Number.isFinite(el.lon)) return;
                const tags = el.tags || {};
                const name = tags.name || tags.brand || 'Referencia';
                L.circleMarker([el.lat, el.lon], {
                    radius: 5,
                    color: '#ffd57a',
                    fillColor: '#ffd57a',
                    fillOpacity: 0.75,
                    weight: 1
                }).bindPopup(name).addTo(floatingPoiLayer);
            });
        } catch (e) {}
    }

    function togglePoiChofer() {
        floatingPoiOn = !floatingPoiOn;
        const btn = document.getElementById('btnPoiDriver');
        if (btn) btn.innerText = floatingPoiOn ? 'REFERENCIAS ON' : 'REFERENCIAS OFF';
        if (!floatingPoiOn) {
            if (floatingPoiLayer) floatingPoiLayer.clearLayers();
            return;
        }
        loadPoiChofer();
    }

    function modernMapLayers(targetMap) {
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        });
        const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        });
        const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });
        const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        });
        osm.addTo(targetMap);
        L.control.layers({
            'OpenStreetMap Referencias': osm,
            'Esri Streets + POI': esri,
            'Carto Voyager': carto,
            'Esri Satelital': esriSat
        }, null, { position: 'bottomright' }).addTo(targetMap);
    }

    function loadRiskZones() {
        try {
            const raw = localStorage.getItem(RISK_ZONES_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            riskZones = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            riskZones = [];
        }
    }

    function saveRiskZones() {
        localStorage.setItem(RISK_ZONES_KEY, JSON.stringify(riskZones));
    }

    function redrawRiskZones() {
        if (riskZonesLayer) riskZonesLayer.clearLayers();
        if (riskZonesLayerExpanded) riskZonesLayerExpanded.clearLayers();

        riskZones.forEach((z) => {
            const opts = { color: '#ff3b30', fillColor: '#ff3b30', fillOpacity: 0.24, weight: 2 };
            const label = z.name || 'Zona peligrosa';
            const radius = Math.max(MIN_ZONE_RADIUS_METERS, Number(z.radius || 0) || DEFAULT_ZONE_RADIUS_METERS);
            if (riskZonesLayer) L.circle([z.lat, z.lng], { radius, ...opts }).addTo(riskZonesLayer).bindTooltip(label);
            if (riskZonesLayerExpanded) L.circle([z.lat, z.lng], { radius, ...opts }).addTo(riskZonesLayerExpanded).bindTooltip(label);
        });

        renderZoneList();
    }

    function addRiskZone(lat, lng, radius = DEFAULT_ZONE_RADIUS_METERS, name = '') {
        const safeRadius = Math.min(MAX_ZONE_RADIUS_METERS, Math.max(MIN_ZONE_RADIUS_METERS, Number(radius || 0) || DEFAULT_ZONE_RADIUS_METERS));
        riskZones.push({ lat, lng, radius: safeRadius, name: name || ('Zona ' + (riskZones.length + 1)) });
        saveRiskZones();
        redrawRiskZones();
    }

    function clearRiskZones() {
        riskZones = [];
        saveRiskZones();
        redrawRiskZones();
    }

    function renderZoneList() {
        const cont = document.getElementById('zoneList');
        if (!cont) return;
        if (!riskZones.length) {
            cont.innerHTML = '<div class="small text-secondary">No hay zonas cargadas.</div>';
            return;
        }

        cont.innerHTML = riskZones.map((z, i) => {
            const lat = Number(z.lat || 0).toFixed(5);
            const lng = Number(z.lng || 0).toFixed(5);
            const radius = Number(z.radius || 220);
            const safeName = String(z.name || ('Zona ' + (i + 1))).replace(/</g, '&lt;');
            return `<div class="zone-list-item"><div class="d-flex justify-content-between align-items-center"><strong>${safeName}</strong><div class="d-flex gap-1"><button class="btn btn-sm btn-outline-info" onclick="focusZone(${i})">VER</button><button class="btn btn-sm btn-outline-danger" onclick="removeZone(${i})">BORRAR</button></div></div><div class="meta">Lat ${lat} | Lng ${lng} | Radio ${radius}m</div></div>`;

    async function buscarLugarParaZona() {
        const queryInput = document.getElementById('zoneSearch');
        const raw = (queryInput?.value || '').trim();
        if (!raw) {
            alert('Escribí un barrio o referencia para buscar.');
            return;
        }

        const q = /san\s*juan/i.test(raw) ? raw : `${raw}, San Juan, Argentina`;

        try {
            const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=ar&q=${encodeURIComponent(q)}`;
            const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
            if (!res.ok) throw new Error('Geocoding ' + res.status);
            const list = await res.json();

            if (!Array.isArray(list) || list.length === 0) {
                alert('No encontré ese lugar. Probá con otro nombre o una referencia cercana.');
                return;
            }

            const top = list[0];
            const lat = Number(top.lat);
            const lng = Number(top.lon);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) throw new Error('Coordenadas invalidas');

            const shortName = String(top.display_name || raw).split(',').slice(0, 2).join(',').trim();
            let suggestedRadius = DEFAULT_ZONE_RADIUS_METERS;
            if (Array.isArray(top.boundingbox) && top.boundingbox.length === 4 && mainMap) {
                const south = Number(top.boundingbox[0]);
                const north = Number(top.boundingbox[1]);
                const west = Number(top.boundingbox[2]);
                const east = Number(top.boundingbox[3]);
                if ([south, north, west, east].every(Number.isFinite)) {
                    const nsMeters = mainMap.distance([south, lng], [north, lng]);
                    const ewMeters = mainMap.distance([lat, west], [lat, east]);
                    const halfSpan = Math.max(nsMeters, ewMeters) / 2;
                    suggestedRadius = Math.min(MAX_ZONE_RADIUS_METERS, Math.max(MIN_ZONE_RADIUS_METERS, halfSpan));
                }
            }

            addRiskZone(lat, lng, suggestedRadius, shortName || raw);
            if (queryInput) queryInput.value = '';

            mainMap.setView([lat, lng], 16);
            if (mainMapExpanded) mainMapExpanded.setView([lat, lng], 16);
            setGeocodeMarker(lat, lng, shortName || raw);
        } catch (e) {
            console.error('Error al buscar lugar:', e);
            alert('No se pudo buscar el lugar ahora. Revisá conexión y probá de nuevo.');
        }
    }

    function focusZone(index) {
        const z = riskZones[index];
        if (!z || !mainMap) return;
        const zoom = z.radius > 900 ? 14 : 16;
        mainMap.setView([z.lat, z.lng], zoom);
        if (mainMapExpanded) mainMapExpanded.setView([z.lat, z.lng], zoom);
    }

    function removeZone(index) {
        if (index < 0 || index >= riskZones.length) return;
        riskZones.splice(index, 1);
        saveRiskZones();
        redrawRiskZones();
    }

    function isInsideRiskZone(lat, lng) {
        if (!mainMap || !Array.isArray(riskZones) || riskZones.length === 0) return false;
        return riskZones.some((z) => {
            const radius = Math.max(MIN_ZONE_RADIUS_METERS, Number(z.radius || 0) || DEFAULT_ZONE_RADIUS_METERS);
            return mainMap.distance([lat, lng], [z.lat, z.lng]) <= radius;
        });
    }

    function stopRiskBlink(pid) {

            }
        }
    }

    function conectarCentral() {
        if (peer && !peer.destroyed) peer.destroy();

        setStatusCentral(false, 'CONECTANDO...');

        peer = new Peer(CENTRAL_ID, PEER_OPTS);

        peer.on('open', (id) => {
            console.log('Central conectada con ID:', id);
            setStatusCentral(true, 'EN LÍNEA - ' + id);
        });

        peer.on('connection', (conn) => {
            if (!units[conn.peer]) units[conn.peer] = { ignoreIA: false, lat: 0, lng: 0 };
            units[conn.peer].conn = conn;

            conn.on('data', (data) => {
                if (data.tipo === 'login') manejarLogin(conn, data);
                if (data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
                if (data.tipo === 'emergency_recording_started') manejarEmergenciaGrabacion(conn.peer, data);
            });

            conn.on('close', () => {
                console.log('Unidad desconectada:', conn.peer);
                const card = document.getElementById('card-' + conn.peer);
                if (card) card.style.opacity = '0.4';
            });

            conn.on('error', (err) => {
                console.error('Error en conexión de unidad:', err);
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                attachUnitStream(call.peer, s);
            });
        });

        // ── FIX CLAVE: Reconexión automática de la central ──
        peer.on('error', (err) => {
            console.error('Error central:', err.type, err.message);
            if (err.type === 'unavailable-id') {
                // ID todavía ocupado por sesión anterior del servidor — esperar más
                setStatusCentral(false, 'ID OCUPADO - ESPERANDO 10s...');
                setTimeout(() => conectarCentral(), 10000);
            } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
                setStatusCentral(false, 'SIN RED - REINTENTANDO...');
                setTimeout(() => conectarCentral(), 5000);
            } else {
                setStatusCentral(false, 'ERROR: ' + err.type);
                setTimeout(() => conectarCentral(), 5000);
            }
        });

        peer.on('disconnected', () => {
            console.warn('Central desconectada del servidor PeerJS, reconectando...');
            setStatusCentral(false, 'DESCONECTADA - RECONECTANDO...');
            if (!peer.destroyed) {
                peer.reconnect();
            } else {
                setTimeout(() => conectarCentral(), 5000);
            }
        });

        peer.on('close', () => {
            setStatusCentral(false, 'CERRADA - RECONECTANDO...');
            setTimeout(() => conectarCentral(), 5000);
        });
    }

    function generarAlta() {
        const n = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if (!n) return;
        let db = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        db.push({ 
            nombre: n, 
            token: Math.floor(1000 + Math.random() * 9000).toString(), 
            vence: Date.now() + (horas * 60 * 60 * 1000) 
        });
        localStorage.setItem('pablo_db', JSON.stringify(db));
        document.getElementById('regNombre').value = "";
        renderAgenda();
    }

    function renderAgenda() {
        const list = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        const ahora = Date.now();
        const cont = document.getElementById('listaAbonadosVisual');
        if (!cont) return;
        cont.innerHTML = list.map((u, i) => {
            const falta = Math.round((u.vence - ahora) / (1000 * 60 * 60));
            return `<div class="p-2 border-bottom border-secondary small d-flex justify-content-between align-items-center"><span>${u.nombre} - <b>${u.token}</b></span><span>${falta > 0 ? falta+'h rest.' : 'VENCIDO'}</span><button class="btn btn-xs btn-danger py-0" onclick="eliminarAbonado(${i})">X</button></div>`;
        }).join('');
    }

    function eliminarAbonado(i) { let db = JSON.parse(localStorage.getItem('pablo_db') || "[]"); db.splice(i, 1); localStorage.setItem('pablo_db', JSON.stringify(db)); renderAgenda(); }
    
    function manejarLogin(conn, data) {
        const db = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        const u = db.find(x => x.nombre === data.nombre.toUpperCase() && x.token === data.token);
        if (u && Date.now() < u.vence) { 
            crearOActualizarCelda(conn.peer, data.nombre); 
            conn.send({ tipo: 'auth_ok' }); 
        } else { 
            conn.send({ tipo: 'auth_fail', msg: 'ACCESO DENEGADO O VENCIDO' }); 
        }
    }

    // --- MOTOR IA ---
    async function escanearIA() {
        if (!iaActiva) return;
        const tx = dbIndexed.transaction("delincuentes", "readonly");
        const dbList = await new Promise(res => {
            const list = [];
            tx.objectStore("delincuentes").openCursor().onsuccess = (e) => {
                const c = e.target.result; if (c) { list.push(c.value); c.continue(); } else res(list);
            };
        });
        if (dbList.length === 0) return;
        const vids = document.querySelectorAll('video');
        for (let v of vids) {
            const pid = v.id.replace('v-', '');
            if (units[pid] && units[pid].ignoreIA) continue;
            if (v.paused || v.ended || v.readyState < 3) continue;
            try {
                const detections = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptors();
                for (let det of detections) {
                    for (let del of dbList) {
                        if (faceapi.euclideanDistance(det.descriptor, new Float32Array(del.descriptor)) < 0.6) dispararAlerta(pid);
                    }
                }
            } catch(e) {}
        }
    }

        const c = document.getElementById('card-' + pid);
        if (c && !c.classList.contains('alerta-ia')) {

            alarmAudio.play().catch(() => {});

    function manejarEmergenciaGrabacion(pid, data) {
        const c = document.getElementById('card-' + pid);

        units[pid] = units[pid] || { ignoreIA: false, lat: 0, lng: 0 };
        units[pid].emergencyRecording = true;

        units[pid].emergencyTimestamp = data.timestamp || Date.now();

            c.classList.add('alerta-emergencia');
        }

        if (h) {
            h.classList.add('emergency');
            const label = data.nombre || h.dataset.nombre || h.innerText;
            h.innerText = 'GRABANDO SOS - ' + label;
        }

        if (units[pid].mainMarker) units[pid].mainMarker.setIcon(sosIcon);

    function activarSOSOperador(pid, origen = 'central_ui') {
        dispararAlerta(pid);
        if (units[pid] && units[pid].conn && units[pid].conn.open) {
            units[pid].conn.send({
                tipo: 'sos_operador',

    function pararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        const h = document.getElementById('header-' + pid);
        if (c && c.classList.contains('alerta-ia')) {
            c.classList.remove('alerta-ia'); 
            if (units[pid].mainMarker) units[pid].mainMarker.setIcon(carIcon); 
            if (units[pid]) {
                units[pid].ignoreIA = true;
                c.classList.add('pausa-activa');
                setTimeout(() => { units[pid].ignoreIA = false; c.classList.remove('pausa-activa'); }, 180000); 
            }
            if (document.querySelectorAll('.alerta-ia').length === 0) { alarmAudio.pause(); alarmAudio.currentTime = 0; }
        }

        if (c && c.classList.contains('alerta-emergencia')) {
            c.classList.remove('alerta-emergencia');
            if (h) {
                h.classList.remove('emergency');
                h.innerText = h.dataset.nombre || h.innerText.replace(/^GRABANDO SOS - /, '');
            }
            if (units[pid]) {
                units[pid].emergencyRecording = false;
                units[pid].emergencyReason = null;
            }
            if (!document.querySelector('.alerta-ia') && !document.querySelector('.alerta-emergencia')) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }

        if (c && c.classList.contains('alerta-zona') && units[pid] && !units[pid].riskZoneActive) {
            c.classList.remove('alerta-zona');
            if (!document.querySelector('.alerta-ia') && !document.querySelector('.alerta-emergencia') && !document.querySelector('.alerta-zona')) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }
    }

            const c = e.target.result; 
            if (c) { 
                cont.innerHTML += `<div class="col-4 col-md-3 mb-2 text-center"><div class="card bg-black border-danger p-1"><img src="${c.value.foto}" style="height:80px; object-fit:cover; border-radius:4px;"><div class="small text-danger mt-1">${c.value.nombre}</div><button class="btn btn-danger btn-sm w-100 mt-1" onclick="eliminarSospechoso(${c.value.id})">BORRAR</button></div></div>`; 
                c.continue(); 
            } 
        }; 
    }

    function eliminarSospechoso(id) { 
        dbIndexed.transaction(["delincuentes"], "readwrite").objectStore("delincuentes").delete(id); 
        cargarListaNegraVisual(); 
    }

    function toBase64(f) { 
        return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }); 
    }

    window.onload = init;
</script>
</body>
</html>
