<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* BARRA SUPERIOR */
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; flex-shrink: 0; }
        
        /* MAPA GENERAL TÁCTICO */
        #mainMap { width: 100%; height: 300px; border-bottom: 2px solid #0f0; flex-shrink: 0; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* GRILLA DE VIDEOS */
        .grid-fleet { display: grid; grid-template-columns: repeat(auto-fill, 300px); gap: 15px; padding: 15px; overflow-y: auto; flex-grow: 1; background: #050505; }

        /* TARJETA DE UNIDAD */
        .unit-card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; width: 300px; position: relative; overflow: hidden; transition: 0.3s; height: fit-content; }
        .unit-header { background: #111; padding: 6px; font-size: 12px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; color: #0f0; }

        /* VIDEO */
        .video-box { width: 300px; height: 170px; background: #000; }
        video { width: 100%; height: 100%; object-fit: fill; } 

        /* ALERTAS */
        .zona-roja-alert { border: 3px solid red !important; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; border-color: transparent; } }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px; }
        .btn-pablo { font-size: 10px; font-weight: bold; padding: 8px 0; border: 1px solid #0f0; background: transparent; color: #0f0; border-radius: 4px; text-transform: uppercase; cursor: pointer; }
        .btn-pablo:active { background: #0f0; color: #000; }
        
        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.8); display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="fw-bold">PABLO SECURITY - RADAR CENTRAL</div>
    <div id="tokenDisplay" class="badge bg-dark border border-success fs-5">----</div>
    <button class="btn btn-success btn-sm" onclick="generarToken()">GENERAR CÓDIGO</button>
</div>

<div id="mainMap"></div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    let currentToken;
    let peer;
    let mainMap;
    const units = {};

    // CONFIGURACIÓN DE ZONAS ROJAS (Ejemplo: San Juan)
    const zonasPeligrosas = [
        { nombre: "Sector Norte", lat: -31.537, lng: -68.536, radio: 400 },
        { nombre: "Sector Sur", lat: -31.550, lng: -68.520, radio: 300 }
    ];

    // Inicializar Mapa
    function initMap() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mainMap);
        
        // Dibujar zonas rojas visuales
        zonasPeligrosas.forEach(z => {
            L.circle([z.lat, z.lng], { color: 'red', fillColor: '#f03', fillOpacity: 0.2, radius: z.radio }).addTo(mainMap);
        });
    }

    function generarToken() {
        currentToken = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('tokenDisplay').innerText = currentToken;
        if(peer) peer.destroy();
        
        peer = new Peer('PABLO-CENTRAL-' + currentToken);
        
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); }
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') toggleSOS(conn.peer, true);
            });
        });
    }

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}">
                <h3 class="fw-bold">🚨 SOS 🚨</h3>
                <button class="btn btn-light btn-sm" onclick="toggleSOS('${id}', false)">CERRAR</button>
            </div>
            <div class="unit-header">${nombre.toUpperCase()}</div>
            <div class="video-box"><video id="v-${id}" autoplay playsinline muted></video></div>
            <div class="controls">
                <button class="btn-pablo" onclick="toggleAudio('${id}')">🔊 AUDIO</button>
                <button class="btn-pablo" onmousedown="hablar('${id}',true)" onmouseup="hablar('${id}',false)">🎤 HABLAR</button>
            </div>
        `;
        grid.appendChild(card);
        
        // Crear marcador en el mapa maestro
        const marker = L.marker([0,0]).addTo(mainMap).bindPopup(nombre.toUpperCase());
        units[id] = { marker, card, ptt: null };
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        const pos = [lat, lng];
        units[id].marker.setLatLng(pos);
        
        // Verificar si entró en Zona Roja
        let enPeligro = false;
        zonasPeligrosas.forEach(z => {
            const distancia = mainMap.distance(pos, [z.lat, z.lng]);
            if(distancia < z.radio) enPeligro = true;
        });

        if(enPeligro) {
            units[id].card.classList.add('zona-roja-alert');
        } else {
            units[id].card.classList.remove('zona-roja-alert');
        }
    }

    async function hablar(id, on) {
        if(on) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                units[id].ptt = peer.call(id, s);
            } catch(e) { console.error("Error micro"); }
        } else if(units[id].ptt) {
            units[id].ptt.close();
        }
    }

    function toggleSOS(id, on) {
        const overlay = document.getElementById('sos-'+id);
        if(overlay) overlay.style.display = on ? 'flex' : 'none';
    }

    function toggleAudio(id) {
        const v = document.getElementById('v-'+id);
        if(v) v.muted = !v.muted;
    }

    initMap();
    generarToken();
</script>
</body>
</html>
