<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MAESTRA IA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000; border-bottom: 1px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 45px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; padding: 8px; overflow-y: auto; background: #111; }
        
        .unit-card { background: #000; border: 1px solid #333; display: flex; flex-direction: column; height: 350px; position: relative; transition: 0.3s; }
        
        .alerta-ia { border: 5px solid #f00 !important; box-shadow: 0 0 25px #f00; animation: parpadeo-ia 0.4s infinite alternate; z-index: 1000; cursor: pointer; }
        @keyframes parpadeo-ia { 0% { background: #000; } 100% { background: #400; } }
        .alerta-emergencia { border: 5px solid #ff6a00 !important; box-shadow: 0 0 25px #ff6a00; animation: parpadeo-emergencia 0.35s infinite alternate; z-index: 1001; cursor: pointer; }
        @keyframes parpadeo-emergencia { 0% { background: #000; } 100% { background: #4a1f00; } }
        .unit-header.emergency { background: #ff6a00; color: #000; animation: parpadeo-emergencia 0.35s infinite alternate; }

        .pausa-activa { border-bottom: 3px solid #00f !important; }
        .unit-header { background: #1a1a1a; font-size: 10px; padding: 2px; text-align: center; color: #0f0; font-weight: bold; }
        
        .video-box { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { height: 100%; width: auto; object-fit: contain; }
        
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px; background: #000; border-top: 1px solid #0f0; }
        .btn-ctrl { font-size: 9px; padding: 8px 0; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; user-select: none; }
        .btn-gps { background: #007bff; color: #fff; }
        .btn-active { background: #0f0 !important; color: #000 !important; }
        .btn-talking { background: #f0f !important; color: #fff !important; }

        .side-panel { width: 320px; background: #222; display: flex; flex-direction: column; border-left: 2px solid #0f0; }
        .map-shell { position: relative; border-bottom: 2px solid #0f0; }
        #mainMap { height: 280px; background: #111; }
        .map-actions { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 6px; z-index: 1200; }
        .btn-map-mini { background: rgba(7, 14, 24, 0.88); color: #9fe9ff; border: 1px solid #2f6993; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
        .btn-map-mini.active { background: #7a2800; color: #ffd8ad; border-color: #ff8a3c; }
        .zone-list-item { border: 1px solid #2b435e; border-radius: 8px; background: #0d1724; padding: 8px; margin-bottom: 8px; color: #cde5ff; }
        .zone-list-item .meta { font-size: 12px; color: #94c8ff; }
        
        .modales { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 25px; }
        .modal-container { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #0f0; padding: 20px; border-radius: 8px; color: #0f0; position: relative; }
        
        #mapaFlotanteContainer { height: 500px; width: 100%; background: #222; margin-top: 10px; border: 1px solid #0f0; }
        #mainMapExpandedContainer { height: calc(100vh - 140px); width: 100%; background: #111; border: 1px solid #1f6e94; }

        #statusCentral { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: #f00; color: #fff; font-weight: bold; }
        #statusCentral.online { background: #0a0; }

        .alerta-zona { border: 5px solid #ffc107 !important; box-shadow: 0 0 25px #ffc107; animation: parpadeo-zona 0.5s infinite alternate; z-index: 1002; }
        @keyframes parpadeo-zona { 0% { background: #111; } 100% { background: #4b3805; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY CENTRAL MASTER</b> &nbsp; <span id="statusCentral">● CONECTANDO...</span></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="toggleAgenda(true)">📂 ABRIR AGENDA Y TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div class="side-panel">
        <div class="map-shell">
            <div id="mainMap"></div>
            <div class="map-actions">
                <button class="btn-map-mini" onclick="toggleMainMapExpanded(true)">MAXIMIZAR</button>
                <button id="btnZoneMode" class="btn-map-mini" onclick="toggleZoneMode()">ZONAS OFF</button>
                <button class="btn-map-mini" onclick="toggleZoneManager(true)">ZONAS</button>
                <button class="btn-map-mini" onclick="clearRiskZones()">LIMPIAR</button>
            </div>
        </div>
        <div class="tools-area p-3">
            <button class="btn btn-danger w-100 fw-bold mb-3" onclick="toggleCarpetaNegra(true)">👤 CARPETA NEGRA</button>
            <div id="ia-toggle" style="width:70px; height:30px; background:#444; border-radius:20px; margin:10px auto; position:relative; cursor:pointer;" onclick="toggleIA()">
                <div id="ia-dot" style="position:absolute; left:5px; top:4px; width:22px; height:22px; background:#ddd; border-radius:50%; transition: 0.3s;"></div>
            </div>
            <div id="ia-text" style="font-weight:bold; font-size:13px; color:#555; text-align:center;">IA DESACTIVADA</div>
        </div>
    </div>
</div>

<div id="agendaModal" class="modales">
    <div class="modal-container" style="border-color: #0f0;">
        <div class="d-flex justify-content-between mb-3 border-bottom border-success pb-2">
            <h4>GESTIÓN DE ABONADOS</h4>
            <button class="btn btn-sm btn-danger" onclick="toggleAgenda(false)">CERRAR</button>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-md-4"><input type="text" id="regNombre" class="form-control bg-dark text-white border-success" placeholder="NOMBRE"></div>
            <div class="col-md-4">
                <select id="regTiempo" class="form-select bg-dark text-white border-success">
                    <option value="24">24 HORAS</option>
                    <option value="168">7 DÍAS</option>
                    <option value="720">1 MES</option>
                </select>
            </div>
            <div class="col-md-4"><button class="btn btn-success w-100 fw-bold" onclick="generarAlta()">DAR DE ALTA</button></div>
        </div>
        <div id="listaAbonadosVisual" class="bg-black p-2" style="max-height: 400px; overflow-y: auto; border: 1px solid #333;"></div>
    </div>
</div>

<div id="gpsModal" class="modales">
    <div class="modal-container">
        <div class="d-flex justify-content-between align-items:center;">
            <h4 id="gpsModalTitle">UBICACIÓN GPS</h4>
            <button class="btn btn-sm btn-danger" onclick="cerrarMapaGPS()">CERRAR</button>
        </div>
        <div id="mapaFlotanteContainer"></div>
    </div>
</div>

<div id="mainMapModal" class="modales">
    <div class="modal-container" style="max-width: 96vw; border-color: #1f6e94;">
        <div class="d-flex justify-content-between align-items:center;">
            <h4>MAPA GENERAL AMPLIADO</h4>
            <button class="btn btn-sm btn-danger" onclick="toggleMainMapExpanded(false)">CERRAR</button>
        </div>
        <div id="mainMapExpandedContainer"></div>
    </div>
</div>

<div id="zoneManagerModal" class="modales">
    <div class="modal-container" style="border-color:#2f6993; max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-info pb-2">
            <h4>ZONAS PELIGROSAS - GESTION</h4>
            <button class="btn btn-sm btn-danger" onclick="toggleZoneManager(false)">CERRAR</button>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-md-3"><input id="zoneName" class="form-control bg-dark text-info border-info" placeholder="Nombre zona"></div>
            <div class="col-md-3"><input id="zoneLat" class="form-control bg-dark text-info border-info" placeholder="Latitud"></div>
            <div class="col-md-3"><input id="zoneLng" class="form-control bg-dark text-info border-info" placeholder="Longitud"></div>
            <div class="col-md-2"><input id="zoneRadius" class="form-control bg-dark text-info border-info" placeholder="Radio m" value="220"></div>
            <div class="col-md-1 d-grid"><button class="btn btn-info fw-bold" onclick="addZoneFromInputs()">+</button></div>
        </div>

        <div class="small text-info mb-2">Tip: con ZONAS ON tambien podés tocar el mapa para agregar manchas rápidas.</div>
        <div id="zoneList" style="max-height: 360px; overflow-y: auto;"></div>
    </div>
</div>

<div id="blackFolderModal" class="modales">
    <div class="modal-container" style="border-color: #f00;">
        <div class="d-flex justify-content-between mb-3 border-bottom border-danger pb-2">
            <h4>CARPETA NEGRA</h4>
            <button class="btn btn-sm btn-outline-danger" onclick="toggleCarpetaNegra(false)">CERRAR</button>
        </div>
        <div class="row g-2 mb-4 bg-dark p-2 rounded">
            <div class="col-md-5"><input type="file" id="fotoDelincuente" class="form-control bg-black text-danger border-danger" accept="image/*"></div>
            <div class="col-md-4"><input type="text" id="nombreDelincuente" class="form-control bg-black text-danger border-danger" placeholder="ALIAS"></div>
            <div class="col-md-3"><button class="btn btn-danger w-100 fw-bold" onclick="guardarDelincuente()">AÑADIR</button></div>
        </div>
        <div id="listaNegra" class="row g-2" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    let peer, mainMap, mainMapExpanded, dbIndexed, iaActiva = false;
    let localStream = null, floatingMap = null, floatingMarker = null;
    let riskZonesLayer = null, riskZonesLayerExpanded = null;
    let zoneMode = false;
    let riskZones = [];
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const RISK_ZONES_KEY = 'pablo_risk_zones_v1';
    const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    alarmAudio.loop = true;

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [25, 25], className: 'fuchsia-car' });
    const sosIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'sos-car' });
    const riskIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30], className: 'risk-car' });

    const request = indexedDB.open("PabloSecurity_Folder", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("delincuentes", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = (e) => { dbIndexed = e.target.result; cargarListaNegraVisual(); };

    function setStatusCentral(online, texto) {
        const el = document.getElementById('statusCentral');
        el.innerText = '● ' + texto;
        el.className = online ? 'online' : '';
    }

    function modernMapLayers(targetMap) {
        const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        });
        const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });
        esri.addTo(targetMap);
        L.control.layers({ 'Esri Streets + POI': esri, 'Carto Voyager': carto }, null, { position: 'bottomright' }).addTo(targetMap);
    }

    function loadRiskZones() {
        try {
            const raw = localStorage.getItem(RISK_ZONES_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            riskZones = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            riskZones = [];
        }
    }

    function saveRiskZones() {
        localStorage.setItem(RISK_ZONES_KEY, JSON.stringify(riskZones));
    }

    function redrawRiskZones() {
        if (riskZonesLayer) riskZonesLayer.clearLayers();
        if (riskZonesLayerExpanded) riskZonesLayerExpanded.clearLayers();

        riskZones.forEach((z) => {
            const opts = { color: '#ff7b00', fillColor: '#ff7b00', fillOpacity: 0.17, weight: 2 };
            const label = z.name || 'Zona peligrosa';
            if (riskZonesLayer) L.circle([z.lat, z.lng], { radius: z.radius || 220, ...opts }).addTo(riskZonesLayer).bindTooltip(label);
            if (riskZonesLayerExpanded) L.circle([z.lat, z.lng], { radius: z.radius || 220, ...opts }).addTo(riskZonesLayerExpanded).bindTooltip(label);
        });

        renderZoneList();
    }

    function toggleZoneMode() {
        zoneMode = !zoneMode;
        const btn = document.getElementById('btnZoneMode');
        if (!btn) return;
        btn.classList.toggle('active', zoneMode);
        btn.innerText = zoneMode ? 'ZONAS ON' : 'ZONAS OFF';
    }

    function addRiskZone(lat, lng, radius = 220, name = '') {
        riskZones.push({ lat, lng, radius, name: name || ('Zona ' + (riskZones.length + 1)) });
        saveRiskZones();
        redrawRiskZones();
    }

    function clearRiskZones() {
        riskZones = [];
        saveRiskZones();
        redrawRiskZones();
    }

    function renderZoneList() {
        const cont = document.getElementById('zoneList');
        if (!cont) return;
        if (!riskZones.length) {
            cont.innerHTML = '<div class="small text-secondary">No hay zonas cargadas.</div>';
            return;
        }

        cont.innerHTML = riskZones.map((z, i) => {
            const lat = Number(z.lat || 0).toFixed(5);
            const lng = Number(z.lng || 0).toFixed(5);
            const radius = Number(z.radius || 220);
            const safeName = String(z.name || ('Zona ' + (i + 1))).replace(/</g, '&lt;');
            return `<div class="zone-list-item"><div class="d-flex justify-content-between align-items-center"><strong>${safeName}</strong><div class="d-flex gap-1"><button class="btn btn-sm btn-outline-info" onclick="focusZone(${i})">VER</button><button class="btn btn-sm btn-outline-danger" onclick="removeZone(${i})">BORRAR</button></div></div><div class="meta">Lat ${lat} | Lng ${lng} | Radio ${radius}m</div></div>`;
        }).join('');
    }

    function addZoneFromInputs() {
        const name = (document.getElementById('zoneName').value || '').trim();
        const lat = Number((document.getElementById('zoneLat').value || '').trim());
        const lng = Number((document.getElementById('zoneLng').value || '').trim());
        const radius = Number((document.getElementById('zoneRadius').value || '220').trim()) || 220;

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
            alert('Latitud/Longitud invalidas');
            return;
        }

        addRiskZone(lat, lng, Math.max(60, radius), name || 'Zona manual');
        document.getElementById('zoneName').value = '';
        document.getElementById('zoneLat').value = '';
        document.getElementById('zoneLng').value = '';
        document.getElementById('zoneRadius').value = '220';
    }

    function focusZone(index) {
        const z = riskZones[index];
        if (!z || !mainMap) return;
        const zoom = z.radius > 900 ? 14 : 16;
        mainMap.setView([z.lat, z.lng], zoom);
        if (mainMapExpanded) mainMapExpanded.setView([z.lat, z.lng], zoom);
    }

    function removeZone(index) {
        if (index < 0 || index >= riskZones.length) return;
        riskZones.splice(index, 1);
        saveRiskZones();
        redrawRiskZones();
    }

    function toggleZoneManager(show) {
        const modal = document.getElementById('zoneManagerModal');
        if (!modal) return;
        modal.style.display = show ? 'block' : 'none';
        if (show) renderZoneList();
    }

    function isInsideRiskZone(lat, lng) {
        if (!mainMap || !Array.isArray(riskZones) || riskZones.length === 0) return false;
        return riskZones.some((z) => mainMap.distance([lat, lng], [z.lat, z.lng]) <= (z.radius || 220));
    }

    function ofrecerAyudaZona(pid) {
        activarSOSOperador(pid, 'zona_riesgo_auto');
    }

    function handleRiskZoneState(pid, lat, lng) {
        units[pid] = units[pid] || { ignoreIA: false, lat: 0, lng: 0 };
        const inRisk = isInsideRiskZone(lat, lng);
        const card = document.getElementById('card-' + pid);

        if (inRisk && !units[pid].riskZoneActive) {
            units[pid].riskZoneActive = true;
            if (card) card.classList.add('alerta-zona');
            if (units[pid].mainMarker) {
                units[pid].mainMarker.setIcon(riskIcon);
                units[pid].mainMarker.bindPopup(`<b>${pid}</b><br>ZONA DE RIESGO<br><button onclick="ofrecerAyudaZona('${pid}')">OFRECER AYUDA</button>`);
            }
            alarmAudio.play().catch(() => {});
        } else if (!inRisk && units[pid].riskZoneActive) {
            units[pid].riskZoneActive = false;
            if (card) card.classList.remove('alerta-zona');
            if (units[pid].mainMarker && !units[pid].emergencyRecording) {
                units[pid].mainMarker.setIcon(carIcon);
                units[pid].mainMarker.bindPopup(pid);
            }
            if (!document.querySelector('.alerta-ia') && !document.querySelector('.alerta-emergencia') && !document.querySelector('.alerta-zona')) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }
    }

    function toggleMainMapExpanded(show) {
        const modal = document.getElementById('mainMapModal');
        if (!modal) return;

        modal.style.display = show ? 'block' : 'none';
        if (!show) return;

        if (!mainMapExpanded) {
            mainMapExpanded = L.map('mainMapExpandedContainer').setView(mainMap.getCenter(), mainMap.getZoom());
            modernMapLayers(mainMapExpanded);
            riskZonesLayerExpanded = L.layerGroup().addTo(mainMapExpanded);

            mainMapExpanded.on('click', (e) => {
                if (!zoneMode) return;
                addRiskZone(e.latlng.lat, e.latlng.lng, 220);
            });
        }

        mainMapExpanded.setView(mainMap.getCenter(), mainMap.getZoom());
        redrawRiskZones();

        setTimeout(() => {
            mainMapExpanded.invalidateSize();
        }, 120);
    }

    async function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        modernMapLayers(mainMap);
        riskZonesLayer = L.layerGroup().addTo(mainMap);
        loadRiskZones();
        redrawRiskZones();

        mainMap.on('click', (e) => {
            if (!zoneMode) return;
            addRiskZone(e.latlng.lat, e.latlng.lng, 220, 'Zona mapa');
        });
        
        try {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        } catch(e) { console.error("Error modelos IA:", e); }

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch(e) { console.log("Permiso micro central denegado"); }

        conectarCentral();
        renderAgenda();
        setInterval(escanearIA, 2000);
    }

    function conectarCentral() {
        if (peer && !peer.destroyed) peer.destroy();

        setStatusCentral(false, 'CONECTANDO...');

        peer = new Peer(CENTRAL_ID);

        peer.on('open', (id) => {
            console.log('Central conectada con ID:', id);
            setStatusCentral(true, 'EN LÍNEA - ' + id);
        });

        peer.on('connection', (conn) => {
            if (!units[conn.peer]) units[conn.peer] = { ignoreIA: false, lat: 0, lng: 0 };
            units[conn.peer].conn = conn;

            conn.on('data', (data) => {
                if (data.tipo === 'login') manejarLogin(conn, data);
                if (data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
                if (data.tipo === 'emergency_recording_started') manejarEmergenciaGrabacion(conn.peer, data);
            });

            conn.on('close', () => {
                console.log('Unidad desconectada:', conn.peer);
                const card = document.getElementById('card-' + conn.peer);
                if (card) card.style.opacity = '0.4';
            });

            conn.on('error', (err) => {
                console.error('Error en conexión de unidad:', err);
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if (v) { v.srcObject = s; v.muted = true; v.play(); }
            });
        });

        // ── FIX CLAVE: Reconexión automática de la central ──
        peer.on('error', (err) => {
            console.error('Error central:', err.type, err.message);
            if (err.type === 'unavailable-id') {
                // ID todavía ocupado por sesión anterior del servidor — esperar más
                setStatusCentral(false, 'ID OCUPADO - ESPERANDO 10s...');
                setTimeout(() => conectarCentral(), 10000);
            } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
                setStatusCentral(false, 'SIN RED - REINTENTANDO...');
                setTimeout(() => conectarCentral(), 5000);
            } else {
                setStatusCentral(false, 'ERROR: ' + err.type);
                setTimeout(() => conectarCentral(), 5000);
            }
        });

        peer.on('disconnected', () => {
            console.warn('Central desconectada del servidor PeerJS, reconectando...');
            setStatusCentral(false, 'DESCONECTADA - RECONECTANDO...');
            if (!peer.destroyed) {
                peer.reconnect();
            } else {
                setTimeout(() => conectarCentral(), 5000);
            }
        });

        peer.on('close', () => {
            setStatusCentral(false, 'CERRADA - RECONECTANDO...');
            setTimeout(() => conectarCentral(), 5000);
        });
    }

    // --- AGENDA Y TOKEN ---
    function toggleAgenda(s) { document.getElementById('agendaModal').style.display = s ? 'block' : 'none'; }
    
    function generarAlta() {
        const n = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if (!n) return;
        let db = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        db.push({ 
            nombre: n, 
            token: Math.floor(1000 + Math.random() * 9000).toString(), 
            vence: Date.now() + (horas * 60 * 60 * 1000) 
        });
        localStorage.setItem('pablo_db', JSON.stringify(db));
        document.getElementById('regNombre').value = "";
        renderAgenda();
    }

    function renderAgenda() {
        const list = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        const ahora = Date.now();
        const cont = document.getElementById('listaAbonadosVisual');
        if (!cont) return;
        cont.innerHTML = list.map((u, i) => {
            const falta = Math.round((u.vence - ahora) / (1000 * 60 * 60));
            return `<div class="p-2 border-bottom border-secondary small d-flex justify-content-between align-items-center"><span>${u.nombre} - <b>${u.token}</b></span><span>${falta > 0 ? falta+'h rest.' : 'VENCIDO'}</span><button class="btn btn-xs btn-danger py-0" onclick="eliminarAbonado(${i})">X</button></div>`;
        }).join('');
    }

    function eliminarAbonado(i) { let db = JSON.parse(localStorage.getItem('pablo_db') || "[]"); db.splice(i, 1); localStorage.setItem('pablo_db', JSON.stringify(db)); renderAgenda(); }
    
    function manejarLogin(conn, data) {
        const db = JSON.parse(localStorage.getItem('pablo_db') || "[]");
        const u = db.find(x => x.nombre === data.nombre.toUpperCase() && x.token === data.token);
        if (u && Date.now() < u.vence) { 
            crearOActualizarCelda(conn.peer, data.nombre); 
            conn.send({ tipo: 'auth_ok' }); 
        } else { 
            conn.send({ tipo: 'auth_fail', msg: 'ACCESO DENEGADO O VENCIDO' }); 
        }
    }

    // --- MOTOR IA ---
    async function escanearIA() {
        if (!iaActiva) return;
        const tx = dbIndexed.transaction("delincuentes", "readonly");
        const dbList = await new Promise(res => {
            const list = [];
            tx.objectStore("delincuentes").openCursor().onsuccess = (e) => {
                const c = e.target.result; if (c) { list.push(c.value); c.continue(); } else res(list);
            };
        });
        if (dbList.length === 0) return;
        const vids = document.querySelectorAll('video');
        for (let v of vids) {
            const pid = v.id.replace('v-', '');
            if (units[pid] && units[pid].ignoreIA) continue;
            if (v.paused || v.ended || v.readyState < 3) continue;
            try {
                const detections = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptors();
                for (let det of detections) {
                    for (let del of dbList) {
                        if (faceapi.euclideanDistance(det.descriptor, new Float32Array(del.descriptor)) < 0.6) dispararAlerta(pid);
                    }
                }
            } catch(e) {}
        }
    }

    function dispararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        if (c && !c.classList.contains('alerta-ia')) {
            c.classList.add('alerta-ia');
            if (units[pid].mainMarker) units[pid].mainMarker.setIcon(sosIcon);
            alarmAudio.play().catch(() => {});
        }
    }

    function manejarEmergenciaGrabacion(pid, data) {
        const c = document.getElementById('card-' + pid);
        const h = document.getElementById('header-' + pid);

        units[pid] = units[pid] || { ignoreIA: false, lat: 0, lng: 0 };
        units[pid].emergencyRecording = true;
        units[pid].emergencyReason = data.reason || 'double_tap_lock';
        units[pid].emergencyTimestamp = data.timestamp || Date.now();

        if (c) {
            c.classList.add('alerta-emergencia');
        }

        if (h) {
            h.classList.add('emergency');
            const label = data.nombre || h.dataset.nombre || h.innerText;
            h.innerText = 'GRABANDO SOS - ' + label;
        }

        if (units[pid].mainMarker) units[pid].mainMarker.setIcon(sosIcon);
        alarmAudio.play().catch(() => {});

        if (units[pid].conn && units[pid].conn.open) {
            units[pid].conn.send({ tipo: 'emergency_recording_ack' });
        }
    }

    function activarSOSOperador(pid, origen = 'central_ui') {
        dispararAlerta(pid);
        if (units[pid] && units[pid].conn && units[pid].conn.open) {
            units[pid].conn.send({
                tipo: 'sos_operador',
                source: origen,
                timestamp: Date.now()
            });
        }
    }

    function pararAlerta(pid) {
        const c = document.getElementById('card-' + pid);
        const h = document.getElementById('header-' + pid);
        if (c && c.classList.contains('alerta-ia')) {
            c.classList.remove('alerta-ia'); 
            if (units[pid].mainMarker) units[pid].mainMarker.setIcon(carIcon); 
            if (units[pid]) {
                units[pid].ignoreIA = true;
                c.classList.add('pausa-activa');
                setTimeout(() => { units[pid].ignoreIA = false; c.classList.remove('pausa-activa'); }, 180000); 
            }
            if (document.querySelectorAll('.alerta-ia').length === 0) { alarmAudio.pause(); alarmAudio.currentTime = 0; }
        }

        if (c && c.classList.contains('alerta-emergencia')) {
            c.classList.remove('alerta-emergencia');
            if (h) {
                h.classList.remove('emergency');
                h.innerText = h.dataset.nombre || h.innerText.replace(/^GRABANDO SOS - /, '');
            }
            if (units[pid]) {
                units[pid].emergencyRecording = false;
                units[pid].emergencyReason = null;
            }
            if (!document.querySelector('.alerta-ia') && !document.querySelector('.alerta-emergencia')) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }

        if (c && c.classList.contains('alerta-zona') && units[pid] && !units[pid].riskZoneActive) {
            c.classList.remove('alerta-zona');
            if (!document.querySelector('.alerta-ia') && !document.querySelector('.alerta-emergencia') && !document.querySelector('.alerta-zona')) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }
        }
    }

    // --- FUNCIONES EXTRA ---
    function actualizarPosicionGlobal(pid, lat, lng) {
        const pos = [lat, lng];
        if (!units[pid]) units[pid] = { ignoreIA: false, lat: lat, lng: lng };
        units[pid].lat = lat; units[pid].lng = lng;
        if (!units[pid].mainMarker) { units[pid].mainMarker = L.marker(pos, {icon: carIcon}).addTo(mainMap).bindPopup(pid); } else { units[pid].mainMarker.setLatLng(pos); }
        if (mainMapExpanded) {
            if (!units[pid].expandedMarker) {
                units[pid].expandedMarker = L.marker(pos, { icon: carIcon }).addTo(mainMapExpanded).bindPopup(pid);
            } else {
                units[pid].expandedMarker.setLatLng(pos);
            }
        }
        if (document.getElementById('gpsModal').style.display === 'block' && floatingMarker) { floatingMarker.setLatLng(pos); floatingMap.panTo(pos); }
        handleRiskZoneState(pid, lat, lng);
    }

    function abrirMapaGPS(pid, nombre) { 
        document.getElementById('gpsModal').style.display = 'block'; 
        document.getElementById('gpsModalTitle').innerText = "UBICACIÓN: " + nombre; 
        const pos = [units[pid].lat || -31.5375, units[pid].lng || -68.5364]; 
        if (!floatingMap) { 
            floatingMap = L.map('mapaFlotanteContainer').setView(pos, 16); 
            modernMapLayers(floatingMap); 
            floatingMarker = L.marker(pos, {icon: carIcon}).addTo(floatingMap); 
        } else { 
            floatingMap.setView(pos, 16); 
            floatingMarker.setLatLng(pos); 
            setTimeout(() => { floatingMap.invalidateSize(); }, 200); 
        } 
    }

    function cerrarMapaGPS() { document.getElementById('gpsModal').style.display = 'none'; }

    function iniciarHabla(pid) { 
        if (!localStream) return; 
        const btn = document.getElementById('btn-hablar-' + pid); 
        btn.classList.add('btn-talking'); 
        units[pid].currentCall = peer.call(pid, localStream); 
    }

    function detenerHabla(pid) { 
        const btn = document.getElementById('btn-hablar-' + pid); 
        if (btn) btn.classList.remove('btn-talking'); 
        if (units[pid] && units[pid].currentCall) { units[pid].currentCall.close(); units[pid].currentCall = null; } 
    }

    function toggleEscucha(pid) { 
        const v = document.getElementById('v-' + pid); 
        const btn = document.getElementById('btn-escuchar-' + pid); 
        if (v.muted) { v.muted = false; btn.classList.add('btn-active'); btn.innerText = "🔊 ON"; } 
        else { v.muted = true; btn.classList.remove('btn-active'); btn.innerText = "🔈 ESCUCHAR"; } 
    }

    function bloquearPantalla(pid) { 
        if (units[pid] && units[pid].conn) units[pid].conn.send({ tipo: 'bloquear_pantalla' }); 
    }

    function crearOActualizarCelda(pid, nombre) { 
        const existing = document.getElementById('card-' + pid);
        if (existing) { existing.style.opacity = '1'; return; }
        const grid = document.getElementById('monitorGrid'); 
        const card = document.createElement('div'); 
        card.className = 'unit-card'; 
        card.id = 'card-' + pid; 
        card.onclick = function() { if (this.classList.contains('alerta-ia') || this.classList.contains('alerta-emergencia')) pararAlerta(pid); }; 
        card.ondblclick = function(event) { event.preventDefault(); activarSOSOperador(pid, 'central_card_double_click'); };
        card.innerHTML = `<div class="unit-header" id="header-${pid}" data-nombre="${nombre}">${nombre}</div><div class="video-box"><video id="v-${pid}" autoplay playsinline muted crossorigin="anonymous"></video></div><div class="unit-actions"><button id="btn-hablar-${pid}" class="btn-ctrl" onmousedown="iniciarHabla('${pid}')" onmouseup="detenerHabla('${pid}')" onmouseleave="detenerHabla('${pid}')">🎙️ Hablar</button><button id="btn-escuchar-${pid}" class="btn-ctrl" onclick="event.stopPropagation(); toggleEscucha('${pid}')">🔈 Escuchar</button><button class="btn-ctrl btn-gps" onclick="event.stopPropagation(); abrirMapaGPS('${pid}', '${nombre}')">📍 GPS</button><button class="btn-ctrl" style="color:red" onclick="event.stopPropagation(); activarSOSOperador('${pid}', 'central_sos_button')">SOS</button><button class="btn-ctrl btn-block" style="grid-column: span 2; background:#ffc107" onclick="event.stopPropagation(); bloquearPantalla('${pid}')">🔒 Bloquear</button></div>`; 
        grid.prepend(card); 
        units[pid] = units[pid] || { ignoreIA: false, lat: 0, lng: 0 }; 
    }

    function toggleIA() { 
        iaActiva = !iaActiva; 
        document.getElementById('ia-dot').style.left = iaActiva ? "40px" : "5px"; 
        document.getElementById('ia-toggle').style.background = iaActiva ? "#0f0" : "#444"; 
        document.getElementById('ia-text').innerText = iaActiva ? "ACTIVA" : "DESACTIVADA"; 
        document.getElementById('ia-text').style.color = iaActiva ? "#0f0" : "#555"; 
    }

    function toggleCarpetaNegra(s) { document.getElementById('blackFolderModal').style.display = s ? 'block' : 'none'; }

    async function guardarDelincuente() { 
        const nom = document.getElementById('nombreDelincuente').value; 
        const file = document.getElementById('fotoDelincuente').files[0]; 
        if (!nom || !file) return; 
        const img = await faceapi.bufferToImage(file); 
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceDescriptor(); 
        if (!det) { alert('No se detectó cara en la foto'); return; }
        dbIndexed.transaction(["delincuentes"], "readwrite").objectStore("delincuentes").add({ nombre: nom.toUpperCase(), descriptor: Array.from(det.descriptor), foto: await toBase64(file) }); 
        cargarListaNegraVisual(); 
    }

    function cargarListaNegraVisual() { 
        const cont = document.getElementById('listaNegra'); 
        if (!cont) return; 
        cont.innerHTML = ""; 
        dbIndexed.transaction("delincuentes", "readonly").objectStore("delincuentes").openCursor().onsuccess = (e) => { 
            const c = e.target.result; 
            if (c) { 
                cont.innerHTML += `<div class="col-4 col-md-3 mb-2 text-center"><div class="card bg-black border-danger p-1"><img src="${c.value.foto}" style="height:80px; object-fit:cover; border-radius:4px;"><div class="small text-danger mt-1">${c.value.nombre}</div><button class="btn btn-danger btn-sm w-100 mt-1" onclick="eliminarSospechoso(${c.value.id})">BORRAR</button></div></div>`; 
                c.continue(); 
            } 
        }; 
    }

    function eliminarSospechoso(id) { 
        dbIndexed.transaction(["delincuentes"], "readwrite").objectStore("delincuentes").delete(id); 
        cargarListaNegraVisual(); 
    }

    function toBase64(f) { 
        return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }); 
    }

    window.onload = init;
</script>
