<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - ACCESO CHOFER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .status { font-size: 12px; margin-top: 10px; color: #555; }
        .btn-pablo { background: #0f0; color: #000; font-weight: bold; width: 100%; padding: 15px; border: none; border-radius: 8px; }
        input { background: #111 !important; border: 1px solid #0f0 !important; color: #0f0 !important; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h3 class="mb-4">ACCESO DE SEGURIDAD</h3>
    
    <div id="loginForm">
        <input type="text" id="nombreChofer" class="form-control" placeholder="TU NOMBRE (EJ: MOVIL 04)">
        <input type="number" id="tokenAcceso" class="form-control" placeholder="CÓDIGO DE 4 DÍGITOS">
        <button class="btn-pablo" onclick="conectar()">ACTIVAR SESIÓN</button>
    </div>

    <div id="interfazChofer" style="display:none;">
        <div class="alert alert-success">SESIÓN ACTIVA</div>
        <p>Transmitiendo Video y GPS...</p>
        <button class="btn btn-danger w-100 p-4 fw-bold" id="sosBtn">🚨 BOTÓN DE PÁNICO 🚨</button>
    </div>

    <div class="status" id="statusTxt">Esperando conexión...</div>

    <script>
        let peer, localStream, conn;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function conectar() {
            const nombre = document.getElementById('nombreChofer').value.trim();
            const token = document.getElementById('tokenAcceso').value.trim();

            if(!nombre || !token) return alert("Completar Nombre y Token");

            // SOLUCIÓN AL ERROR: Creamos un ID ÚNICO usando el Token y el Nombre
            // Esto evita el error de "Nombre en uso"
            const idUnico = "CHOFER-" + token + "-" + nombre.replace(/\s+/g, '_');

            peer = new Peer(idUnico);

            peer.on('open', (id) => {
                document.getElementById('statusTxt').innerText = "Conectando a Central...";
                
                // Conectar datos a la central
                conn = peer.connect(CENTRAL_ID);
                
                conn.on('open', () => {
                    conn.send({ tipo: 'login', nombre: nombre, token: token });
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('interfazChofer').style.display = 'block';
                    iniciarTransmision();
                });

                conn.on('data', (data) => {
                    if(data.tipo === 'error') {
                        alert(data.msg);
                        location.reload();
                    }
                });
            });

            peer.on('error', (err) => {
                if(err.type === 'id-taken') {
                    document.getElementById('statusTxt').innerText = "Reintentando conexión...";
                    // Si el nombre está en uso, forzamos un pequeño cambio para que entre sí o sí
                    setTimeout(conectar, 1000);
                } else {
                    console.error(err);
                }
            });
        }

        async function iniciarTransmision() {
            // Activar Cámara
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            peer.call(CENTRAL_ID, localStream);

            // Activar GPS constante
            navigator.geolocation.watchPosition((pos) => {
                if(conn && conn.open) {
                    conn.send({ tipo: 'gps', lat: pos.coords.latitude, lng: pos.coords.longitude });
                }
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('sosBtn').onclick = () => {
            if(conn) conn.send({ tipo: 'sos' });
        };
    </script>
</body>
</html>
