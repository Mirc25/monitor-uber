<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CONSOLA MAESTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* BARRA SUPERIOR */
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; z-index: 10; }
        .btn-agenda-trigger { background: #0f0; color: #000; font-weight: bold; padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; background: #050505; }
        
        /* GRID DE MONITOREO AJUSTADO */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); 
            gap: 20px; padding: 20px; overflow-y: auto; 
        }
        
        /* DISEÑO DE LA CARD DEL CHOFER */
        .unit-card { background: #111; border: 2px solid #333; border-radius: 10px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .unit-header { background: #1a1a1a; color: #0f0; padding: 10px; text-align: center; font-weight: bold; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        
        .video-container { position: relative; background: #000; height: 280px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* BOTONES DE ACCIÓN SOBRE EL VIDEO */
        .unit-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; background: #0a0a0a; }
        .btn-action { padding: 8px; border: 1px solid #0f0; background: transparent; color: #0f0; font-weight: bold; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .btn-action:hover { background: #0f0; color: #000; }
        .btn-sos-active { background: #f00 !important; color: #fff !important; animation: blink-sos 0.5s infinite; border: none; }
        
        @keyframes blink-sos { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* MAPA INDIVIDUAL */
        .mini-map { height: 180px; border-top: 1px solid #333; }

        /* MAPA GENERAL FLOTANTE */
        #mainMap { width: 350px; height: 250px; border: 2px solid #0f0; position: fixed; bottom: 20px; right: 20px; z-index: 5; border-radius: 10px; opacity: 0.9; }

        /* AGENDA MODAL */
        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 30px; overflow-y: auto; }
        .agenda-container { max-width: 1100px; margin: 0 auto; background: #0a0a0a; border: 2px solid #0f0; border-radius: 12px; padding: 25px; }
        
        .fuchsia-car { filter: invert(19%) sepia(87%) saturate(6011%) hue-rotate(296deg) brightness(101%) contrast(110%); }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small style="color: #666;">[SISTEMA DE RESPUESTA]</small></div>
    <button class="btn-agenda-trigger" onclick="toggleAgenda(true)">📂 ABRIR AGENDA</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-container text-success">
        <div class="d-flex justify-content-between mb-4 border-bottom border-success pb-2">
            <h3>ADMINISTRACIÓN DE ACCESOS</h3>
            <button class="btn btn-sm btn-outline-danger" onclick="toggleAgenda(false)">_ MINIMIZAR</button>
        </div>
        
        <div class="row g-2 mb-4">
            <div class="col-md-5"><input type="text" id="regNombre" placeholder="IDENTIFICACIÓN" class="form-control bg-black text-success border-success"></div>
            <div class="col-md-3">
                <select id="regTiempo" class="form-select bg-black text-success border-success">
                    <option value="24">24 HORAS</option>
                    <option value="720">30 DÍAS</option>
                </select>
            </div>
            <div class="col-md-4"><button class="btn btn-success w-100 fw-bold" onclick="crearAbonado()">+ GENERAR TOKEN</button></div>
        </div>

        <input type="text" id="busquedaAbonado" class="form-control bg-dark text-info border-info mb-3" placeholder="🔎 BUSCAR EN BASE DE DATOS..." onkeyup="renderAgenda()">
        <div class="row g-3" id="agendaContenido"></div>
    </div>
</div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [36, 36], className: 'fuchsia-car' });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }

    // --- LÓGICA DE CENTRAL ---
    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') activarAlertaSOS(conn.peer);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function manejarLogin(conn, data) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        
        if(user && Date.now() < user.vence) {
            user.online = true;
            localStorage.setItem('pablo_agenda', JSON.stringify(db));
            renderAgenda();
            conn.send({ tipo: 'auth_ok', vence: user.vence });
            crearVentanaMonitor(conn, user.nombre);
        } else {
            conn.send({ tipo: 'error', msg: 'VENCIDO O INCORRECTO' });
        }
    }

    function crearVentanaMonitor(conn, nombre) {
        const pid = conn.peer;
        if(document.getElementById('card-' + pid)) return;

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.innerHTML = `
            <div class="unit-header">
                <span>${nombre}</span>
                <span id="sos-tag-${pid}" class="badge bg-dark">SISTEMA OK</span>
            </div>
            <div class="video-container">
                <video id="v-${pid}" autoplay playsinline muted></video>
            </div>
            <div class="unit-controls">
                <button class="btn-action" onclick="toggleEscuchar('${pid}', this)">🔊 ESCUCHAR</button>
                <button class="btn-action" onclick="hablarConChofer('${pid}')">🎤 LLAMAR</button>
                <button class="btn-action text-danger border-danger" onclick="cortarConexion('${pid}')">✖ CORTAR</button>
            </div>
            <div id="m-i-${pid}" class="mini-map"></div>
        `;
        grid.appendChild(card);
        
        // Mapa individual
        const mi = L.map('m-i-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { 
            conn: conn,
            mi: mi, 
            markerInd: L.marker([0,0]).addTo(mi), 
            markerGen: L.marker([0,0], {icon: carIcon}).addTo(mainMap).bindPopup(nombre) 
        };
    }

    // --- ACCIONES DE LOS BOTONES ---
    function toggleEscuchar(pid, btn) {
        const v = document.getElementById('v-' + pid);
        v.muted = !v.muted;
        btn.innerText = v.muted ? "🔊 ESCUCHAR" : "🔈 SILENCIAR";
        btn.style.background = v.muted ? "transparent" : "#0f0";
        btn.style.color = v.muted ? "#0f0" : "#000";
    }

    async function hablarConChofer(pid) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer.call(pid, stream);
            alert("Micrófono abierto hacia la unidad.");
        } catch(e) { alert("Error al abrir micrófono de PC"); }
    }

    function cortarConexion(pid) {
        if(confirm("¿Cortar transmisión?")) {
            if(units[pid]) {
                units[pid].markerGen.remove();
                delete units[pid];
            }
            document.getElementById('card-' + pid).remove();
        }
    }

    function activarAlertaSOS(pid) {
        const tag = document.getElementById('sos-tag-' + pid);
        if(tag) {
            tag.innerText = "¡¡ ALERTA SOS !!";
            tag.className = "badge btn-sos-active";
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.play();
        }
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    // --- FUNCIONES AGENDA (Mismo que antes) ---
    function crearAbonado() {
        const nombre = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if(!nombre) return;
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        const nuevo = { nombre, token: Math.floor(1000 + Math.random() * 8999).toString(), vence: Date.now() + (horas * 3600000), online: false };
        db.push(nuevo);
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
        alert(`ALTA: ${nombre}\nTOKEN: ${nuevo.token}`);
    }

    function renderAgenda() {
        const cont = document.getElementById('agendaContenido');
        const filtro = document.getElementById('busquedaAbonado').value.toUpperCase();
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        cont.innerHTML = "";
        db.filter(u => u.nombre.includes(filtro)).forEach((u, i) => {
            const h = Math.max(0, Math.floor((u.vence - Date.now()) / 3600000));
            cont.innerHTML += `
                <div class="col-md-4">
                    <div class="p-2 border border-secondary rounded">
                        <b>${u.nombre}</b><br>
                        <small>TOKEN: ${u.token}</small><br>
                        <small>TIEMPO: ${h}h</small>
                    </div>
                </div>`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
