<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .navbar-security { border-bottom: 2px solid #0f0; background: #0a0a0a; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .codigo-vivo { background: #1a1a1a; border: 2px dashed #0f0; padding: 10px 20px; border-radius: 8px; color: #fff; font-size: 1.5rem; font-weight: bold; }
        .monitor-video { width: 100%; height: 70vh; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 10px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .panel-lateral { background: #0a0a0a; border-left: 1px solid #0f0; height: 100vh; padding: 20px; }
        .btn-update { background: #0f0; color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-update:hover { background: #0c0; }
    </style>
</head>
<body>

<nav class="navbar-security">
    <div><strong>PABLO SECURITY</strong> | CENTRAL V.2.2</div>
    <div class="d-flex align-items-center">
        <button onclick="window.location.reload()" class="btn-update me-3">NUEVO CÓDIGO / LIMPIAR</button>
        <span class="me-3 text-secondary">CÓDIGO ACTUAL:</span>
        <div id="numCodigo" class="codigo-vivo">------</div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-9 p-4">
            <div class="monitor-video">
                <video id="videoApp" autoplay playsinline></video>
                <div id="esperaTxt" style="position: absolute; color: #555;">SISTEMA LISTO - ESPERANDO SEÑAL...</div>
            </div>
        </div>
        <div class="col-md-3 panel-lateral">
            <h5 class="border-bottom pb-2">DATOS DE UNIDAD</h5>
            <div class="mt-3">
                <p>MÓVIL: <strong id="txtNombre" class="text-white">---</strong></p>
                <p>GPS: <strong id="txtGps" class="text-white">---</strong></p>
                <p>ESTADO: <span id="txtStatus" class="text-warning">ESPERANDO...</span></p>
            </div>
            <div id="sosAlert" style="display:none; background:red; color:white; padding:15px; text-align:center; font-weight:bold; border-radius:10px; margin-top:20px;">🚨 ALERTA SOS 🚨</div>
        </div>
    </div>
</div>

<script>
    const miCodigo = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('numCodigo').innerText = miCodigo;

    const peer = new Peer('pablo-' + miCodigo);

    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (stream) => {
            const v = document.getElementById('videoApp');
            v.srcObject = stream;
            v.play();
            document.getElementById('esperaTxt').style.display = 'none';
            document.getElementById('txtStatus').innerText = "EN VIVO 🔴";
            document.getElementById('txtStatus').className = "text-danger";
        });
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.tipo === 'nombre') document.getElementById('txtNombre').innerText = data.valor.toUpperCase();
            if(data.tipo === 'gps') document.getElementById('txtGps').innerText = data.lat.toFixed(6) + ", " + data.lng.toFixed(6);
            if(data.tipo === 'alerta') {
                document.getElementById('sosAlert').style.display = 'block';
                new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
            }
        });
    });
</script>
</body>
</html>
