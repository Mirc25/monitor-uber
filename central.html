<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MONITOR MAESTRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: 45px; z-index: 100; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* CUADRICULA 25% - AJUSTADA PARA DEJAR ESPACIO AL MAPA SI ES NECESARIO */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; padding: 10px; overflow-y: auto;
            margin-right: 420px; /* ESPACIO RESERVADO PARA EL MAPA GRANDE */
        }
        
        .unit-card { background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; height: 340px; display: flex; flex-direction: column; position: relative; }
        .unit-header { background: #1a1a1a; font-size: 11px; padding: 4px; text-align: center; border-bottom: 1px solid #0f0; color: #0f0; font-weight: bold; }
        
        .video-box { height: 130px; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .unit-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px; background: #050505; }
        .btn-ctrl { font-size: 9px; padding: 5px; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-ctrl:hover { background: #0f0; color: #000; }

        .mini-map { height: 80px; border-top: 1px solid #222; }

        /* SOS */
        .sos-alert { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.6); z-index: 50; animation: blink 0.5s infinite; pointer-events: none; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } }
        .btn-stop-sos { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 60; background: #fff; color: #f00; border: 2px solid #f00; padding: 10px; font-weight: bold; cursor: pointer; }

        /* MAPA GENERAL RE-ESTRUCTURADO (MUCHO MÁS GRANDE) */
        #mainMap { 
            width: 400px; 
            height: calc(100vh - 65px); /* OCUPA CASI TODO EL ALTO */
            border-left: 2px solid #0f0; 
            position: absolute; 
            top: 0; 
            right: 0; 
            z-index: 80; 
            background: #000;
        }

        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .agenda-box { max-width: 800px; margin: 0 auto; background: #0a0a0a; border: 1px solid #0f0; padding: 20px; }

        .fuchsia-car { filter: invert(19%) sepia(87%) saturate(6011%) hue-rotate(296deg) brightness(101%) contrast(110%); }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small>CENTRAL DE MONITOREO</small></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="toggleAgenda(true)">📂 ABRIR AGENDA</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-box text-success">
        <div class="d-flex justify-content-between mb-3 border-bottom border-success pb-2">
            <h4>ESTADO DE ABONADOS</h4>
            <button class="btn btn-sm btn-outline-success" onclick="toggleAgenda(false)">CERRAR</button>
        </div>
        <div id="agendaContenido"></div>
    </div>
</div>

<script>
    // Se mantiene TODA la lógica de PeerJS, SOS, Audio y Autitos que ya teníamos.
    // Solo se ajustó el CSS para que el mapa se vea grande como en una central real.
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarm = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [35, 35], className: 'fuchsia-car' });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
        setInterval(renderAgenda, 60000);
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') activarSOS(conn.peer);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function manejarLogin(conn, data) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        if(user && Date.now() < user.vence) {
            conn.send({ tipo: 'auth_ok', vence: user.vence });
            crearOActualizarCelda(conn.peer, user.nombre);
        }
    }

    function crearOActualizarCelda(pid, nombre) {
        let ex = document.querySelector(`[data-u="${nombre}"]`);
        if(ex) {
            const oldPid = ex.id.replace('card-', '');
            if(units[oldPid]) units[oldPid].markerGen.remove();
            ex.remove();
        }

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.setAttribute('data-u', nombre);
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box">
                <div id="sos-over-${pid}" class="sos-alert"></div>
                <button id="sos-btn-${pid}" class="btn-stop-sos" onclick="pararSOS('${pid}')">DETENER SOS</button>
                <video id="v-${pid}" autoplay playsinline muted></video>
            </div>
            <div class="unit-actions">
                <button class="btn-ctrl" style="color:#ff0" onclick="hablar('${pid}')">🎤 HABLAR</button>
                <button class="btn-ctrl" onclick="escuchar('${pid}')">🔊 ESCUCHAR</button>
                <button class="btn-ctrl" onclick="alert('Zoom Video')">FULL VID</button>
                <button class="btn-ctrl" onclick="alert('Zoom GPS')">FULL GPS</button>
            </div>
            <div id="m-i-${pid}" class="mini-map"></div>
        `;
        grid.prepend(card);
        
        const mi = L.map('m-i-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { 
            mi, 
            markerInd: L.marker([0,0]).addTo(mi), 
            markerGen: L.marker([0,0], {icon: carIcon}).addTo(mainMap).bindPopup(nombre)
        };
    }

    async function hablar(pid) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer.call(pid, stream);
        } catch(e) { alert("Error de micrófono"); }
    }

    function escuchar(pid) {
        const v = document.getElementById('v-' + pid);
        if(v) v.muted = !v.muted;
    }

    function activarSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'block';
        document.getElementById('sos-btn-' + pid).style.display = 'block';
        alarm.loop = true; alarm.play();
    }

    function pararSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'none';
        document.getElementById('sos-btn-' + pid).style.display = 'none';
        alarm.pause(); alarm.currentTime = 0;
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    function renderAgenda() {
        const cont = document.getElementById('agendaContenido');
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        cont.innerHTML = db.map(u => {
            const h = Math.max(0, Math.floor((u.vence - Date.now()) / 3600000));
            const m = Math.max(0, Math.floor(((u.vence - Date.now()) % 3600000) / 60000));
            return `<div class="p-2 border border-secondary mb-1 d-flex justify-content-between">
                <span><b>${u.nombre}</b></span>
                <span class="badge ${h < 2 ? 'bg-danger' : 'bg-success'}">${h}h ${m}m restante</span>
            </div>`;
        }).join('');
    }

    window.onload = init;
</script>
</body>
</html>
