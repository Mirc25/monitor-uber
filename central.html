<script>
    let peer, mainMap, miMicStream;
    const units = {}; // Aquí guardamos los datos de cada conductor
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const carIcon = L.icon({ 
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', 
        iconSize: [25, 25],
        className: 'fuchsia-car' // Aplicamos el filtro fucsia de tu imagen
    });

    function obtenerDB() {
        try {
            const data = localStorage.getItem('pablo_db');
            return data ? JSON.parse(data) : [];
        } catch (e) { return []; }
    }

    function init() {
        // Mapa principal (Derecha)
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
    }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarLogin(conn, data);
                if(data.tipo === 'gps') actualizarPosicionGlobal(conn.peer, data.lat, data.lng);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play().catch(()=>{}); }
            });
        });
    }

    // ESTA FUNCIÓN DIBUJA LOS AUTITOS SIEMPRE
    function actualizarPosicionGlobal(pid, lat, lng) {
        const pos = [lat, lng];
        
        // Si el conductor no existe en memoria, creamos su marcador en el mapa grande
        if (!units[pid]) {
            // Buscamos el nombre en la base de datos para el popup
            const db = obtenerDB();
            // Los IDs de PeerJS suelen ser PABLO-U-NOMBRE
            const nombreLimpio = pid.replace('PABLO-U-', '').replace(/-/g, ' ');

            units[pid] = {
                // Marcador en el mapa de la derecha (el autito)
                mainMarker: L.marker(pos, {icon: carIcon}).addTo(mainMap).bindPopup(nombreLimpio)
            };
        } else {
            // Si ya existe, solo movemos el autito
            units[pid].mainMarker.setLatLng(pos);
        }

        // Si ADEMÁS tiene la celda de video abierta, actualizamos su mini-mapa
        if (units[pid].miniMap) {
            units[pid].miniMap.setView(pos);
            units[pid].miniMarker.setLatLng(pos);
        }
    }

    function manejarLogin(conn, data) {
        let db = obtenerDB();
        const user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        if(user && Date.now() < new Date(user.expira).getTime()) {
            crearCeldaMonitoreo(conn.peer, user.nombre);
            conn.send({ tipo: 'auth_ok' });
        } else {
            conn.send({ tipo: 'error', msg: 'ACCESO DENEGADO' });
        }
    }

    function crearCeldaMonitoreo(pid, nombre) {
        if(document.getElementById('card-' + pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box" onclick="zoomVideo('${pid}')"><video id="v-${pid}" autoplay muted playsinline></video></div>
            <div class="unit-actions">
                <button class="btn-ctrl" onclick="toggleEscuchar('${pid}')">Escuchar</button>
                <button class="btn-ctrl" onclick="toggleHablar('${pid}')">hablar</button>
                <button class="btn-ctrl" style="color:red">Stop SOS</button>
            </div>
            <div id="m-${pid}" class="mini-map"></div>
        `;
        grid.prepend(card);

        // Inicializar el mini-mapa de la celda
        const m = L.map('m-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        
        // Vinculamos el mini-mapa al objeto global de la unidad
        if(!units[pid]) units[pid] = {}; 
        units[pid].miniMap = m;
        units[pid].miniMarker = L.marker([0,0]).addTo(m);
    }

    // Funciones de Agenda y UI omitidas para brevedad, se mantienen igual
    window.onload = init;
</script>
