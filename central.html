<!DOCTYPE html>
<html>
<head>
    <title>CENTRAL - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #111; color: #0f0; font-family: monospace; }
        video { width: 100%; background: #000; border: 2px solid #0f0; border-radius: 10px; }
        .panel { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body class="container py-4">
    <div class="row">
        <div class="col-md-4">
            <div class="panel">
                <h3>CENTRAL PABLO</h3>
                <hr>
                <input type="text" id="idDestino" class="form-control bg-dark text-success border-success mb-2" placeholder="CÓDIGO DEL CHOFER">
                <button id="btnConectar" class="btn btn-success w-100">CONECTAR A UNIDAD</button>
                <div class="mt-4">
                    <p>UBICACIÓN: <span id="gps">---</span></p>
                    <div id="alerta" class="alert alert-danger" style="display:none; animation: pulse 1s infinite;">
                        🚨 ¡BOTÓN DE PÁNICO! 🚨
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <video id="videoRemoto" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const peer = new Peer(); // ID aleatorio para la central

        document.getElementById('btnConectar').onclick = () => {
            const destId = document.getElementById('idDestino').value.trim().toLowerCase();
            
            // Llamar video
            const call = peer.call(destId, new MediaStream()); // Mandamos stream vacío
            call.on('stream', remoteStream => {
                document.getElementById('videoRemoto').srcObject = remoteStream;
            });

            // Conectar datos
            const conn = peer.connect(destId);
            conn.on('data', data => {
                if(data.tipo === 'gps') document.getElementById('gps').innerText = data.lat + ", " + data.lng;
                if(data.tipo === 'alerta') {
                    document.getElementById('alerta').style.display = 'block';
                    new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
                }
            });
        };
    </script>
</body>
</html>
