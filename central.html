<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .caja { border: 2px solid #0f0; background: #111; padding: 10px; border-radius: 10px; }
        video { width: 100%; height: 220px; background: #000; object-fit: cover; }
    </style>
</head>
<body>
    <h1>MONITOREO CENTRAL</h1>
    <div id="unidades" class="grid"></div>

    <script>
        const peer = new Peer('PABLO-CENTRAL-MASTER-2026');

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') {
                    dibujarUnidad(data.nombre, conn.peer);
                    
                    // LLAMAR AL CHOFER PARA PEDIR EL VIDEO
                    setTimeout(() => {
                        const call = peer.call(conn.peer, null);
                        call.on('stream', (stream) => {
                            const vid = document.getElementById('v-' + data.nombre);
                            if(vid) vid.srcObject = stream;
                        });
                    }, 1500);
                }
            });
        });

        function dibujarUnidad(nombre, peerId) {
            if(document.getElementById('u-' + nombre)) return;
            const div = document.createElement('div');
            div.id = 'u-' + nombre;
            div.className = 'caja';
            div.innerHTML = `<h3>UNIDAD: ${nombre}</h3><video id="v-${nombre}" autoplay playsinline muted></video>`;
            document.getElementById('unidades').appendChild(div);
        }
    </script>
</body>
</html>
