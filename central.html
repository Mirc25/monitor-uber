<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL PRO v8</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 15px; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; }
        .unit-card { background: #050505; border: 1px solid #333; border-radius: 12px; height: 520px; position: relative; overflow: hidden; }
        
        /* CÁMARA AMPLIADA PARA VER PASAJEROS */
        .video-box { width: 100%; height: 280px; background: #000; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: fill; background: #000; } 
        
        .map-box { width: 100%; height: 150px; border-top: 1px solid #222; }
        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(200,0,0,0.95); display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-pablo { width: 100%; padding: 12px; background: transparent; border: 1px solid #0f0; color: #0f0; font-weight: bold; border-radius: 8px; text-transform: uppercase; }
        .btn-hablar { background: #002200; transition: 0.1s; }
        .btn-hablar:active { background: #0f0 !important; color: #000 !important; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>

<div class="top-bar">
    <strong class="fs-4">PABLO SECURITY</strong>
    <div class="text-center">
        <span class="text-secondary small">CÓDIGO DE ACCESO:</span>
        <div id="tokenDisplay" class="badge bg-dark border border-success fs-3" style="letter-spacing: 5px; color: #0f0;">----</div>
    </div>
    <button class="btn btn-outline-success fw-bold" onclick="generarToken()">GENERAR CÓDIGO NUEVO</button>
</div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    let currentToken;
    let peer;
    const units = {};

    function generarToken() {
        currentToken = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('tokenDisplay').innerText = currentToken;
        if(peer) peer.destroy();
        peer = new Peer('PABLO-CENTRAL-' + currentToken);
        
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); }
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
                if(data.tipo === 'gps') actualizarGPS(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') toggleSOS(conn.peer, true);
            });
        });
    }

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}">
                <h1 class="text-white fw-bold">🚨 SOS 🚨</h1>
                <h3 class="text-white">${nombre.toUpperCase()}</h3>
                <button class="btn btn-light fw-bold mt-3" onclick="toggleSOS('${id}', false)">CERRAR ALERTA</button>
            </div>
            <div class="p-1 text-center small text-success fw-bold">${nombre.toUpperCase()}</div>
            <div class="video-box" onclick="this.parentElement.style.position='fixed';this.parentElement.style.inset='0';this.parentElement.style.zIndex='200';"><video id="v-${id}" autoplay playsinline muted></video></div>
            <div id="map-${id}" class="map-box"></div>
            <div class="p-2 d-flex gap-2">
                <button class="btn-pablo" id="aud-${id}" onclick="toggleAudio('${id}')">🔊 ESCUCHAR</button>
                <button class="btn-pablo btn-hablar" 
                    onmousedown="iniciarHablar('${id}')" 
                    onmouseup="detenerHablar()" 
                    ontouchstart="iniciarHablar('${id}')" 
                    ontouchend="detenerHablar()">🎤 HABLAR (PTT)</button>
            </div>
        `;
        grid.appendChild(card);
        units[id] = { map: L.map('map-' + id, { zoomControl: false }).setView([0,0], 17), marker: null, callPTT: null };
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(units[id].map);
    }

    // LÓGICA DE MICRÓFONO PTT REAL
    async function iniciarHablar(unidadId) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            units[unidadId].callPTT = peer.call(unidadId, stream);
        } catch (e) { console.log("Error micro central"); }
    }

    function detenerHablar() {
        // Al soltar el botón, cortamos el envío de audio inmediatamente
        Object.keys(units).forEach(id => {
            if(units[id].callPTT) {
                units[id].callPTT.close();
                units[id].callPTT = null;
            }
        });
    }

    function toggleSOS(id, on) {
        document.getElementById('sos-'+id).style.display = on ? 'flex' : 'none';
        if(on) {
            let a = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            a.loop = true; a.id = "s-"+id; a.play();
        } else {
            let a = document.getElementById("s-"+id); if(a) { a.pause(); a.remove(); }
        }
    }

    function actualizarGPS(id, lat, lng) {
        if(!units[id]) return;
        units[id].map.setView([lat, lng]);
        if(units[id].marker) units[id].marker.setLatLng([lat, lng]);
        else units[id].marker = L.marker([lat, lng]).addTo(units[id].map);
    }

    function toggleAudio(id) {
        const v = document.getElementById('v-'+id);
        v.muted = !v.muted;
        document.getElementById('aud-'+id).style.background = v.muted ? 'transparent' : '#0f0';
        document.getElementById('aud-'+id).style.color = v.muted ? '#0f0' : '#000';
    }

    generarToken();
</script>
</body>
</html>
