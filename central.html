<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - PANEL DE CONTROL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .grid-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); grid-auto-rows: 250px; gap: 10px; padding: 15px; height: calc(100vh - 60px); overflow-y: auto; }
        
        .unit-card { background: #111; border: 1px solid #333; border-radius: 8px; position: relative; display: flex; flex-direction: column; }
        .video-container { flex: 1; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .unit-controls { padding: 10px; background: #0a0a0a; }
        .btn-panel { font-size: 10px; padding: 5px; background: #222; color: #0f0; border: 1px solid #444; border-radius: 4px; margin-right: 2px; }
        .btn-panel:hover { background: #333; }
        .btn-active { background: #0f0 !important; color: #000 !important; }
        
        .sos-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .btn-stop-alert { background: #fff; color: #000; font-weight: bold; border: none; padding: 10px; border-radius: 5px; }

        /* Maximizar */
        .maximized { position: fixed !important; top: 60px; left: 0; width: 100% !important; height: calc(100vh - 60px) !important; z-index: 1000; grid-column: span 1 / -1; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong>PABLO SECURITY</strong> | CENTRAL DE MONITOREO</div>
    <div class="d-flex align-items-center">
        <span class="me-2 small">CÓDIGO:</span>
        <div id="displayCod" class="badge bg-dark border border-success p-2 fs-5">------</div>
    </div>
</div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('displayCod').innerText = code;
    const peer = new Peer('pablo-' + code);

    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (stream) => {
            const v = document.getElementById('video-' + call.peer);
            if(v) { v.srcObject = stream; v.play(); }
        });
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.tipo === 'nombre') crearTarjeta(conn.peer, data.valor);
            if(data.tipo === 'alerta') sonarAlerta(conn.peer);
        });
    });

    function crearTarjeta(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-overlay" id="sos-${id}">
                <h3 class="text-white">🚨 SOS 🚨</h3>
                <button class="btn-stop-alert" onclick="pararAlerta('${id}')">PARAR ALERTA</button>
            </div>
            <div class="video-container">
                <video id="video-${id}" autoplay playsinline muted></video>
            </div>
            <div class="unit-controls">
                <div class="text-white small mb-2"><strong>${nombre.toUpperCase()}</strong></div>
                <button class="btn-panel" id="listen-${id}" onclick="toggleEscuchar('${id}')">ESCUCHAR</button>
                <button class="btn-panel" onclick="alert('Hablando...')">HABLAR</button>
                <button class="btn-panel" onclick="maximizar('${id}')">MAXIMIZAR</button>
            </div>
        `;
        grid.appendChild(card);
    }

    function sonarAlerta(id) {
        document.getElementById('sos-'+id).style.display = 'flex';
        const a = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
        a.loop = true; a.id = "snd-"+id; a.play();
    }

    function pararAlerta(id) {
        document.getElementById('sos-'+id).style.display = 'none';
        const a = document.getElementById("snd-"+id);
        if(a) { a.pause(); a.remove(); }
    }

    function toggleEscuchar(id) {
        const v = document.getElementById('video-'+id);
        const btn = document.getElementById('listen-'+id);
        v.muted = !v.muted;
        btn.classList.toggle('btn-active');
        btn.innerText = v.muted ? "ESCUCHAR" : "ESC_ON";
    }

    function maximizar(id) {
        document.getElementById('card-'+id).classList.toggle('maximized');
    }
</script>
</body>
</html>
