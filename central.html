<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MONITOR 20+ UNIDADES</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        
        .btn-agenda-trigger { background: #0f0; color: #000; font-weight: bold; border: none; padding: 5px 15px; border-radius: 3px; cursor: pointer; font-size: 12px; }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* CUADRICULA PARA 20+ USUARIOS */
        .grid-fleet { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 10px; padding: 10px; overflow-y: auto; align-content: start;
        }
        
        .unit-card { background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; position: relative; height: 260px; }
        .unit-header { background: #1a1a1a; font-size: 11px; padding: 4px; text-align: center; border-bottom: 1px solid #0f0; color: #0f0; font-weight: bold; }
        
        /* VIDEO MINIATURA */
        .video-box { height: 140px; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ALERTAS SOS */
        .sos-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.4); z-index: 5; pointer-events: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } }
        
        .btn-stop-sos { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 6; background: #fff; color: #f00; border: none; font-weight: bold; padding: 5px; border-radius: 3px; cursor: pointer; font-size: 10px; }

        /* CONTROLES MINI */
        .mini-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px; background: #000; }
        .btn-m { font-size: 9px; padding: 3px; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; }
        .btn-m:hover { background: #0f0; color: #000; }

        .mini-map { height: 70px; border-top: 1px solid #222; }

        #mainMap { width: 280px; height: 200px; border: 1px solid #0f0; position: fixed; bottom: 15px; right: 15px; z-index: 10; border-radius: 8px; }

        /* MODAL AGENDA */
        #agendaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
        .agenda-container { max-width: 900px; margin: 0 auto; background: #0a0a0a; border: 1px solid #0f0; padding: 20px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small>MODO MOSAICO</small></div>
    <button class="btn-agenda-trigger" onclick="toggleAgenda(true)">📂 AGENDA</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-container">
        <div class="d-flex justify-content-between mb-3">
            <h4 class="text-success">GESTIÓN DE ABONADOS</h4>
            <button class="btn btn-sm btn-outline-success" onclick="toggleAgenda(false)">_ MINIMIZAR</button>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><input type="text" id="regNombre" placeholder="NOMBRE" class="form-control form-control-sm bg-black text-success border-success"></div>
            <div class="col-3"><select id="regTiempo" class="form-select form-select-sm bg-black text-success border-success"><option value="24">24HS</option><option value="720">30D</option></select></div>
            <div class="col-3"><button class="btn btn-sm btn-success w-100" onclick="crearAbonado()">+ ALTA</button></div>
        </div>
        <input type="text" class="form-control form-control-sm bg-dark text-info mb-2" placeholder="BUSCAR..." onkeyup="renderAgenda()" id="busquedaAbonado">
        <div id="agendaContenido" class="row g-2" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const alarmSound = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');

    function init() {
        mainMap = L.map('mainMap', {zoomControl: false}).setView([-31.5375, -68.5364], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
    }

    function toggleAgenda(show) { document.getElementById('agendaModal').style.display = show ? 'block' : 'none'; }

    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') manejarEntrada(conn, data);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') alertaBlanco(conn.peer);
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function manejarEntrada(conn, data) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
        
        if(user && Date.now() < user.vence) {
            conn.send({ tipo: 'auth_ok', vence: user.vence });
            crearOActualizarCelda(conn.peer, user.nombre);
        } else {
            conn.send({ tipo: 'error', msg: 'ACCESO DENEGADO' });
        }
    }

    function crearOActualizarCelda(pid, nombre) {
        // EVITAR DUPLICADOS POR NOMBRE
        let ex = document.querySelector(`[data-u="${nombre}"]`);
        if(ex) {
            const oldPid = ex.id.replace('card-', '');
            delete units[oldPid];
            ex.remove();
        }

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.setAttribute('data-u', nombre);
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <div class="video-box">
                <div id="sos-over-${pid}" class="sos-overlay"></div>
                <button id="sos-btn-${pid}" class="btn-stop-sos" onclick="detenerSOS('${pid}')">DETENER SOS</button>
                <video id="v-${pid}" autoplay playsinline muted></video>
            </div>
            <div class="mini-controls">
                <button class="btn-m" onclick="document.getElementById('v-${pid}').muted = !document.getElementById('v-${pid}').muted">🔊/🔈</button>
                <button class="btn-m" onclick="hablar('${pid}')">🎤 HABLAR</button>
            </div>
            <div id="m-i-${pid}" class="mini-map"></div>
        `;
        grid.appendChild(card);
        
        const mi = L.map('m-i-' + pid, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { 
            mi, 
            markerInd: L.marker([0,0]).addTo(mi), 
            markerGen: L.marker([0,0], {icon: L.divIcon({className: 'bg-danger rounded-circle', iconSize:[10,10]})}).addTo(mainMap) 
        };
    }

    function alertaBlanco(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'block';
        document.getElementById('sos-btn-' + pid).style.display = 'block';
        alarmSound.loop = true;
        alarmSound.play();
    }

    function detenerSOS(pid) {
        document.getElementById('sos-over-' + pid).style.display = 'none';
        document.getElementById('sos-btn-' + pid).style.display = 'none';
        alarmSound.pause();
        alarmSound.currentTime = 0;
    }

    async function hablar(pid) {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        peer.call(pid, s);
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    function crearAbonado() {
        const nombre = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if(!nombre) return;
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        db.push({ nombre, token: Math.floor(1000 + Math.random() * 8999).toString(), vence: Date.now() + (horas * 3600000) });
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
    }

    function renderAgenda() {
        const cont = document.getElementById('agendaContenido');
        const filtro = document.getElementById('busquedaAbonado').value.toUpperCase();
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        cont.innerHTML = db.filter(u => u.nombre.includes(filtro)).map(u => `
            <div class="col-4"><div class="p-1 border border-secondary small text-white">
                ${u.nombre}<br>T: ${u.token}
            </div></div>`).join('');
    }

    window.onload = init;
</script>
</body>
</html>
