<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL PRO v7</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .grid-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 15px; padding: 15px; height: calc(100vh - 60px); overflow-y: auto; }
        
        .unit-card { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; height: 520px; position: relative; overflow: hidden; transition: 0.3s; }
        .unit-card.offline { opacity: 0.5; filter: grayscale(1); }

        /* Video Panorámico */
        .video-box { width: 100%; height: 260px; background: #000; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Mapa */
        .map-box { width: 100%; height: 160px; background: #111; cursor: pointer; border-top: 1px solid #222; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #050505; }
        .btn-pablo { font-size: 11px; font-weight: bold; padding: 12px; border: 1px solid #0f0; background: transparent; color: #0f0; border-radius: 6px; text-transform: uppercase; }
        .btn-pablo:active { background: #0f0; color: #000; }
        .btn-hablar { background: #002200; }
        .btn-hablar:active { background: #0f0; color: #000; }

        /* Maximizado Táctil */
        .max-v { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 3000; }
        .max-v .video-box { height: 100% !important; }
        .max-v .map-box, .max-v .controls, .max-v .unit-name { display: none; }

        .max-m { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 3000; }
        .max-m .map-box { height: 100% !important; }
        .max-m .video-box, .max-m .controls, .max-m .unit-name { display: none; }

        .sos-alert { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.9); display: none; z-index: 4000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .unit-name { background: #000; padding: 5px; font-size: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong style="font-size: 20px;">PABLO SECURITY</strong> | CENTRAL DE CONTROL</div>
    <div class="badge bg-dark border border-success p-2 fs-5">ID: PABLO-CENTRAL-2026</div>
</div>

<div class="grid-fleet" id="monitorGrid"></div>

<script>
    const peer = new Peer('PABLO-CENTRAL-2026');
    const units = {};
    let myMicStream;

    // Pedir permiso de micro para la función HABLAR
    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => myMicStream = s);

    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (stream) => {
            const check = setInterval(() => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); clearInterval(check); }
            }, 500);
        });
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
            if(data.tipo === 'gps') actualizarGPS(conn.peer, data.lat, data.lng);
            if(data.tipo === 'sos') alerta(conn.peer, true);
            if(data.tipo === 'ping') marcarOnline(conn.peer);
        });
        conn.on('close', () => marcarOffline(conn.peer));
    });

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + id;
        card.innerHTML = `
            <div class="sos-alert" id="sos-${id}">
                <h1 class="text-white fw-bold">🚨 EMERGENCIA 🚨</h1>
                <h3 class="text-white">${nombre.toUpperCase()}</h3>
                <button class="btn btn-light fw-bold mt-4" onclick="alerta('${id}', false)">DETENER ALERTA</button>
            </div>
            <div class="unit-name">
                <span class="text-success fw-bold">${nombre.toUpperCase()}</span>
                <span id="st-${id}" class="text-success">● ONLINE</span>
            </div>
            <div class="video-box" onclick="zoom('${id}', 'v')"><video id="v-${id}" autoplay playsinline muted></video></div>
            <div id="map-${id}" class="map-box" onclick="zoom('${id}', 'm')"></div>
            <div class="controls">
                <button class="btn-pablo" id="aud-${id}" onclick="toggleAudio('${id}')">🔊 ESCUCHAR</button>
                <button class="btn-pablo btn-hablar" onmousedown="hablar('${id}', true)" onmouseup="hablar('${id}', false)" ontouchstart="hablar('${id}', true)" ontouchend="hablar('${id}', false)">🎤 HABLAR</button>
            </div>
        `;
        grid.appendChild(card);
        units[id] = { map: L.map('map-' + id, { zoomControl: false, attributionControl: false }).setView([0,0], 17), marker: null, timer: null };
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(units[id].map);
    }

    function zoom(id, tipo) {
        const c = document.getElementById('card-'+id);
        if(tipo === 'v') c.classList.toggle('max-v');
        else { c.classList.toggle('max-m'); setTimeout(() => units[id].map.invalidateSize(), 400); }
    }

    function hablar(id, on) {
        if(on && myMicStream) peer.call(id, myMicStream);
    }

    function alerta(id, on) {
        document.getElementById('sos-'+id).style.display = on ? 'flex' : 'none';
        if(on) {
            const a = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            a.loop = true; a.id = "snd-"+id; a.play();
        } else {
            const a = document.getElementById("snd-"+id); if(a) { a.pause(); a.remove(); }
        }
    }

    function marcarOnline(id) {
        const el = document.getElementById('st-'+id);
        const card = document.getElementById('card-'+id);
        if(el) { el.innerText = "● ONLINE"; el.className = "text-success"; card.classList.remove('offline'); }
        clearTimeout(units[id].timer);
        units[id].timer = setTimeout(() => marcarOffline(id), 6000);
    }

    function marcarOffline(id) {
        const el = document.getElementById('st-'+id);
        const card = document.getElementById('card-'+id);
        if(el) { el.innerText = "● DESCONECTADO"; el.className = "text-danger"; card.classList.add('offline'); }
    }

    function actualizarGPS(id, lat, lng) {
        if(!units[id]) return;
        units[id].map.setView([lat, lng]);
        if(units[id].marker) units[id].marker.setLatLng([lat, lng]);
        else units[id].marker = L.marker([lat, lng]).addTo(units[id].map);
    }

    function toggleAudio(id) {
        const v = document.getElementById('v-'+id);
        v.muted = !v.muted;
        document.getElementById('aud-'+id).style.background = v.muted ? 'transparent' : '#0f0';
        document.getElementById('aud-'+id).style.color = v.muted ? '#0f0' : '#000';
    }
</script>
</body>
</html>
