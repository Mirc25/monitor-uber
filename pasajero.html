<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAJERO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; margin: 0; color: #0f0; text-align: center; }
        #v { width: 100%; height: 40vh; background: #111; display: none; }
        #map { width: 100%; height: 60vh; display: none; }
        .play { margin-top: 40vh; padding: 20px; background: #0f0; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <button id="btn" class="play" onclick="ver()">VER MONITOREO</button>
    <video id="v" autoplay playsinline muted></video>
    <div id="map"></div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        function ver() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('v').style.display = 'block';
            document.getElementById('map').style.display = 'block';
            const m = L.map('map').setView([0,0], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
            const mark = L.marker([0,0]).addTo(m);
            const p = new Peer();
            p.on('open', () => {
                const call = p.call(id, null);
                call.on('stream', s => { document.getElementById('v').srcObject = s; });
                const c = p.connect(id);
                c.on('data', d => { if(d.tipo==='gps'){ m.setView([d.lat, d.lng]); mark.setLatLng([d.lat, d.lng]); }});
            });
        }
    </script>
</body>
</html>
