<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIAJE SEGURO - PASAJERO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; }
        video { width: 100vw; height: 70vh; background: #111; object-fit: cover; }
        .btn { background: #0f0; color: #000; padding: 25px; border: none; font-weight: bold; border-radius: 15px; margin-top: 50px; width: 80%; font-size: 20px; }
    </style>
</head>
<body>
    <div id="inicio">
        <button class="btn" onclick="conectar()">ENTRAR AL MONITOREO</button>
    </div>

    <div id="pantalla" style="display:none;">
        <video id="videoRemoto" autoplay playsinline muted></video>
        <h3 id="st" style="color:red;">🔴 CONECTANDO...</h3>
        <button onclick="document.getElementById('videoRemoto').muted=false" style="color:#0f0; background:none; border:1px solid #0f0; padding:10px;">ACTIVAR AUDIO</button>
    </div>

    <script>
        const args = new URLSearchParams(window.location.search);
        const idC = args.get('id');

        function conectar() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('pantalla').style.display = 'block';

            const peerP = new Peer({
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
            });

            peerP.on('open', () => {
                const call = peerP.call(idC, null);
                call.on('stream', (s) => {
                    document.getElementById('st').innerText = "🔴 EN VIVO";
                    const v = document.getElementById('videoRemoto');
                    v.srcObject = s;
                    v.play();
                });
            });
        }
    </script>
</body>
</html>
