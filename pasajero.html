<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - PASAJERO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; text-align: center; }
        #vContainer { width: 100vw; height: 80vh; background: #111; display:none; border-bottom: 2px solid #0f0; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .btn-ver { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; width: 85%; border-radius: 15px; margin-top: 40vh; font-size: 18px; }
    </style>
</head>
<body>
    <div id="inicio">
        <button class="btn-ver" onclick="conectar()">ACCEDER A CÁMARA EN VIVO</button>
    </div>

    <div id="monitor" style="display:none;">
        <div id="vContainer" style="display:block;">
            <video id="vPasajero" autoplay playsinline muted></video>
        </div>
        <h3 id="txtStatus" style="color:red; margin-top:15px;">🔴 CONECTANDO...</h3>
        <button onclick="document.getElementById('vPasajero').muted=false" style="background:#222; color:#0f0; border:1px solid #0f0; padding:10px; border-radius:5px;">Activar Sonido</button>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const cid = p.get('id');
        const exp = p.get('exp');

        function conectar() {
            if(Date.now() > exp) return alert("LINK EXPIRADO.");
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('monitor').style.display = 'block';

            const peer = new Peer();
            peer.on('open', () => {
                const call = peer.call(cid, null);
                call.on('stream', (stream) => {
                    const video = document.getElementById('vPasajero');
                    video.srcObject = stream;
                    document.getElementById('txtStatus').innerText = "🔴 EN VIVO";
                    video.play();
                });
            });
        }
    </script>
</body>
</html>
