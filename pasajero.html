<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - VISTA INVITADO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; }
        #map { height: 300px; border: 1px solid #0f0; margin: 10px; border-radius: 10px; }
        .video-container { width: 95%; max-width: 600px; margin: auto; border: 2px solid #0f0; border-radius: 15px; overflow: hidden; background: #111; }
        video { width: 100%; display: block; }
        .expired { color: #f00; font-size: 24px; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="content">
        <h3 class="mt-3">PABLO SECURITY</h3>
        <p id="info-unidad" class="small text-uppercase"></p>
        
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        
        <div id="map"></div>
        <p class="small">Este link caducará automáticamente.</p>
    </div>

    <div id="error-screen" style="display:none;" class="expired">
        ⚠️ EL LINK HA CADUCADO O ES INVÁLIDO<br>
        CONTACTE A LA CENTRAL
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const peerIdChofer = params.get('id'); // ID del chofer (PABLO-U-...)
        const tokenUrl = params.get('t');      // Token de tiempo
        const venceUrl = params.get('v');      // Timestamp de vencimiento

        function checkVencimiento() {
            if (!venceUrl || Date.now() > parseInt(venceUrl)) {
                document.getElementById('content').style.display = 'none';
                document.getElementById('error-screen').style.display = 'block';
                return false;
            }
            return true;
        }

        if (checkVencimiento() && peerIdChofer) {
            const peer = new Peer();
            let map = L.map('map').setView([0,0], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            let marker = L.marker([0,0]).addTo(map);

            peer.on('open', () => {
                // El pasajero llama al chofer
                const call = peer.call(peerIdChofer, null); 
                call.on('stream', (stream) => {
                    document.getElementById('remoteVideo').srcObject = stream;
                });

                // Conexión de datos para el GPS
                const conn = peer.connect(peerIdChofer);
                conn.on('data', (data) => {
                    if (data.tipo === 'gps') {
                        const pos = [data.lat, data.lng];
                        map.setView(pos);
                        marker.setLatLng(pos);
                    }
                });
            });

            // Chequeo constante cada 1 minuto por si se vence mientras mira
            setInterval(checkVencimiento, 60000);
        }
    </script>
</body>
</html>
