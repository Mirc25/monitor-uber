<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MONITOREO PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-container { height: 45%; background: #222; position: relative; border-bottom: 2px solid #0f0; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #map { flex: 1; }
        .badge { position: absolute; top: 10px; left: 10px; z-index: 100; background: #0f0; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>
    <div id="video-container">
        <div class="badge">🛡️ MONITOREO EN VIVO</div>
        <video id="v-pasajero" autoplay muted playsinline></video>
    </div>
    <div id="map"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const driverID = params.get('id');
    const expire = parseInt(params.get('exp'));

    if (Date.now() > expire) {
        document.body.innerHTML = "<h2 style='color:white;text-align:center;padding:50px;'>LINK EXPIRADO</h2>";
    } else {
        const map = L.map('map').setView([-31.5375, -68.5364], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([-31.5375, -68.5364]).addTo(map);

        const peer = new Peer();
        peer.on('open', () => {
            // Conexión de GPS
            const conn = peer.connect(driverID);
            conn.on('data', (d) => {
                if(d.tipo === 'gps') {
                    marker.setLatLng([d.lat, d.lng]);
                    map.panTo([d.lat, d.lng]);
                }
            });

            // Pedir Video: El pasajero llama al chofer
            const call = peer.call(driverID, new MediaStream()); 
            call.on('stream', (s) => {
                const video = document.getElementById('v-pasajero');
                video.srcObject = s;
                // Forzamos el play por código
                video.onloadedmetadata = () => video.play();
            });
        });
    }
</script>
</body>
</html>
