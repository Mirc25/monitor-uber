<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAJERO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; margin: 0; }
        video { width: 100%; height: 40vh; background: #111; object-fit: cover; }
        .btn-play { background: #0f0; padding: 25px; width: 80%; border-radius: 15px; font-weight: bold; margin-top: 40vh; font-size: 20px; }
    </style>
</head>
<body>
    <div id="inicio">
        <button class="btn-play" onclick="ver()">CONECTAR CON EL CHOFER</button>
    </div>
    <video id="v" autoplay playsinline muted style="display:none;"></video>

    <script>
        const idChofer = new URLSearchParams(window.location.search).get('id');
        function ver() {
            document.getElementById('inicio').style.display='none';
            document.getElementById('v').style.display='block';
            const peer = new Peer();
            peer.on('open', () => {
                const call = peer.call(idChofer, null);
                call.on('stream', (s) => {
                    document.getElementById('v').srcObject = s;
                });
            });
        }
    </script>
</body>
</html>
