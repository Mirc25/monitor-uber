<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOREO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; margin: 0; text-align: center; }
        #videoPasajero { width: 100%; height: 300px; background: #111; object-fit: cover; }
        #mapa { width: 100%; height: 350px; border-top: 1px solid #0f0; }
        .btn-play { background: #0f0; padding: 20px; width: 80%; border-radius: 10px; font-weight: bold; margin-top: 40vh; }
    </style>
</head>
<body>
    <div id="inicio">
        <button class="btn-play" onclick="conectar()">VER MONITOREO EN VIVO</button>
    </div>

    <div id="monitor" style="display:none;">
        <video id="v" autoplay playsinline muted></video>
        <div id="mapa"></div>
    </div>

    <script>
        const idChofer = new URLSearchParams(window.location.search).get('id');
        let map, marker;

        function conectar() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('monitor').style.display = 'block';

            map = L.map('mapa').setView([0,0], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0,0]).addTo(map);

            const peer = new Peer();
            peer.on('open', () => {
                const call = peer.call(idChofer, null);
                call.on('stream', (s) => {
                    const video = document.getElementById('v');
                    video.srcObject = s;
                    video.play();
                });

                // Para el mapa, el chofer tiene que mandar datos
                const conn = peer.connect(idChofer);
                conn.on('data', (d) => {
                    if(d.tipo === 'gps') {
                        const p = [d.lat, d.lng];
                        map.setView(p);
                        marker.setLatLng(p);
                    }
                });
            });
        }
    </script>
</body>
</html>
