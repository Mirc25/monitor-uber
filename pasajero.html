<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAJERO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; }
        #videoContainer { width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; }
        video { width: 100%; max-height: 80vh; background: #111; }
        .btn-play { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; border-radius: 10px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pantallaInicio" style="padding-top: 40vh;">
        <button class="btn-play" onclick="conectar()">VER VIAJE EN VIVO</button>
    </div>

    <div id="videoContainer" style="display:none;">
        <video id="remoteVideo" autoplay playsinline muted></video>
        <p id="status">CONECTANDO AL VEHÍCULO...</p>
        <button onclick="document.getElementById('remoteVideo').muted=false" style="color:#0f0; background:transparent; border:1px solid #0f0; padding:10px;">ACTIVAR SONIDO</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const choferID = params.get('id');
        const expira = params.get('exp');

        function conectar() {
            if(Date.now() > expira) return alert("EL LINK HA EXPIRADO.");

            document.getElementById('pantallaInicio').style.display = 'none';
            document.getElementById('videoContainer').style.display = 'flex';

            const peer = new Peer();

            peer.on('open', () => {
                // El pasajero llama al chofer
                const call = peer.call(choferID, null);
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('status').innerText = "🔴 EN VIVO";
                    const video = document.getElementById('remoteVideo');
                    video.srcObject = remoteStream;
                    
                    // Forzar el play después de un segundo
                    setTimeout(() => {
                        video.play().catch(e => {
                            console.log("Autoplay bloqueado, esperando interacción");
                        });
                    }, 500);
                });
            });
        }
    </script>
</body>
</html>
