<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - PASAJERO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; text-align: center; }
        #vContainer { width: 100%; height: 75vh; background: #111; border-bottom: 2px solid #0f0; display:none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-ver { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; width: 85%; border-radius: 10px; margin-top: 50px; }
    </style>
</head>
<body>
    <h2 style="margin-top:20px;">PABLO SECURITY</h2>
    
    <div id="check">
        <button id="btnPlay" class="btn-ver" onclick="validarYConectar()">VER CÁMARA EN VIVO</button>
        <p id="msg" style="padding:20px; color:#888;">Este link es temporal por seguridad.</p>
    </div>

    <div id="vContainer">
        <video id="vPasajero" autoplay playsinline muted></video>
        <p style="color:red; font-weight:bold;">🔴 MONITOREO EN TIEMPO REAL</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const choferID = params.get('id');
        const tiempoExpira = params.get('exp');

        function validarYConectar() {
            const ahora = Date.now();

            if(!choferID || !tiempoExpira) {
                return mostrarError("Link inválido o corrupto.");
            }

            if(ahora > tiempoExpira) {
                return mostrarError("EL LINK HA EXPIRADO. Pida uno nuevo al chofer.");
            }

            document.getElementById('check').style.display = 'none';
            document.getElementById('vContainer').style.display = 'block';

            const peer = new Peer();
            peer.on('open', () => {
                const call = peer.call(choferID, null);
                
                call.on('stream', (stream) => {
                    const video = document.getElementById('vPasajero');
                    video.srcObject = stream;
                    video.play();
                });

                call.on('error', () => {
                    mostrarError("EL CHOFER TERMINÓ LA TRANSMISIÓN.");
                });
            });
        }

        function mostrarError(txt) {
            document.getElementById('check').innerHTML = `<h3 style="color:red; padding:20px;">${txt}</h3>`;
            document.getElementById('vContainer').style.display = 'none';
        }
    </script>
</body>
</html>
