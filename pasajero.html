<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - PASAJERO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; text-align: center; }
        .monitor-box { width: 95%; margin: 10px auto; border: 2px solid #0f0; border-radius: 10px; overflow: hidden; background: #050505; }
        video { width: 100%; height: 300px; background: #000; object-fit: cover; display: block; }
        #mapaPasajero { height: 300px; width: 100%; border-top: 2px solid #0f0; }
        .btn-play { background: #0f0; color: #000; padding: 20px; width: 80%; border-radius: 10px; font-weight: bold; margin-top: 40vh; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="inicio">
        <button class="btn-play" onclick="conectarAlViaje()">INGRESAR AL MONITOREO</button>
    </div>

    <div id="app" style="display:none;">
        <div class="monitor-box">
            <div style="padding:10px; font-size:14px;">🔴 MONITOREO EN VIVO</div>
            <video id="videoPasajero" autoplay playsinline muted></video>
            <div id="mapaPasajero"></div>
            <div style="padding:10px; font-size:10px; color:#444;">PABLO SECURITY 2026</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const choferID = urlParams.get('id');
        let map, marker, peerP;

        function conectarAlViaje() {
            if(!choferID) return alert("Link inválido");
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            // Inicializar Mapa
            map = L.map('mapaPasajero', {zoomControl:false}).setView([0,0], 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0,0]).addTo(map);

            peerP = new Peer(null, {
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
            });

            peerP.on('open', () => {
                // 1. Pedir Video
                const call = peerP.call(choferID, null);
                call.on('stream', (stream) => {
                    const v = document.getElementById('videoPasajero');
                    v.srcObject = stream;
                    v.play();
                });

                // 2. Pedir GPS (Conexión de datos)
                const conn = peerP.connect(choferID);
                conn.on('data', (data) => {
                    if(data.tipo === 'gps') {
                        const pos = [data.lat, data.lng];
                        map.setView(pos);
                        marker.setLatLng(pos);
                    }
                });
            });
        }
    </script>
</body>
</html>
