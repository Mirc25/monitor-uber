<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAJERO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; margin: 0; font-family: sans-serif; text-align: center; }
        #vid { width: 100%; height: 35vh; background: #111; object-fit: cover; display: none; }
        #map { width: 100%; height: 65vh; display: none; }
        .play-btn { background: #0f0; padding: 25px; width: 80%; border-radius: 15px; font-weight: bold; font-size: 20px; margin-top: 40vh; cursor: pointer; }
    </style>
</head>
<body>
    <div id="init">
        <button class="play-btn" onclick="conectar()">ACCEDER AL MONITOREO</button>
    </div>

    <video id="vid" autoplay playsinline muted></video>
    <div id="map"></div>

    <script>
        const idChofer = new URLSearchParams(window.location.search).get('id');
        let map, marker;

        function conectar() {
            if(!idChofer) return alert("ID no encontrado");
            document.getElementById('init').style.display = 'none';
            document.getElementById('vid').style.display = 'block';
            document.getElementById('map').style.display = 'block';

            map = L.map('map').setView([0,0], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0,0]).addTo(map);

            const peer = new Peer();
            peer.on('open', () => {
                // 1. Pedir Video
                const call = peer.call(idChofer, null);
                call.on('stream', (s) => {
                    const v = document.getElementById('vid');
                    v.srcObject = s;
                    v.play();
                });

                // 2. Pedir GPS
                const conn = peer.connect(idChofer);
                conn.on('data', (d) => {
                    if(d.tipo === 'gps') {
                        const p = [d.lat, d.lng];
                        map.setView(p);
                        marker.setLatLng(p);
                    }
                });
            });
        }
    </script>
</body>
</html>
