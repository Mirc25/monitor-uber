<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIAJE SEGURO - PABLO SECURITY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #0f0; }
        #videoContainer { width: 100%; max-width: 600px; margin: auto; background: #111; position: relative; }
        video { width: 100%; height: auto; display: block; }
        .btn-start { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; font-size: 18px; margin: 50px auto; border-radius: 10px; display: block; cursor: pointer; }
        #status { font-size: 14px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <header>
        <h2>PABLO SECURITY</h2>
        <p>Monitoreo en Tiempo Real</p>
    </header>

    <div id="interfaz">
        <button class="btn-start" id="btnPlay" onclick="conectarAlViaje()">VER VIDEO EN VIVO</button>
        <p id="status">Esperando conexión...</p>
    </div>

    <div id="videoContainer" style="display:none;">
        <video id="vPasajero" autoplay playsinline></video>
        <p style="padding: 10px;">🔴 TRANSMISIÓN DE SEGURIDAD</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const choferPeerID = urlParams.get('id');

        function conectarAlViaje() {
            if(!choferPeerID) return alert("El link no tiene un ID de chofer válido.");

            document.getElementById('btnPlay').style.display = 'none';
            document.getElementById('status').innerText = 'Conectando con el móvil...';

            const peerPasajero = new Peer();

            peerPasajero.on('open', (id) => {
                // El pasajero Llama al chofer (el chofer contestará auto en su index.html)
                const call = peerPasajero.call(choferPeerID, null);
                
                call.on('stream', (streamRemoto) => {
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('videoContainer').style.display = 'block';
                    const video = document.getElementById('vPasajero');
                    video.srcObject = streamRemoto;
                    video.play();
                });

                call.on('error', (err) => {
                    document.getElementById('status').innerText = 'Error: El móvil no está transmitiendo.';
                });
            });
        }
    </script>
</body>
</html>
