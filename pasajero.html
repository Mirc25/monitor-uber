<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIAJE SEGURO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-container { height: 45%; background: #111; position: relative; border-bottom: 2px solid #0f0; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #map { flex: 1; }
        .badge-seguro { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,255,0,0.9); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; }
        #btn-play { position: absolute; z-index: 101; padding: 10px 20px; background: #0f0; color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-container">
        <div class="badge-seguro">🛡️ MONITOREO EN VIVO</div>
        <button id="btn-play" onclick="iniciarVideo()">CLIC PARA VER VIDEO</button>
        <video id="v-pasajero" autoplay playsinline muted></video>
    </div>
    <div id="map"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const driverID = params.get('id');
    const driverName = params.get('n');
    const expire = parseInt(params.get('exp'));

    function iniciarVideo() {
        const v = document.getElementById('v-pasajero');
        v.play();
        document.getElementById('btn-play').style.display = 'none';
    }

    if (Date.now() > expire) {
        document.body.innerHTML = "<div style='color:white; text-align:center; padding:50px;'><h2>LINK EXPIRADO</h2><p>Por seguridad, el tiempo de monitoreo terminó.</p></div>";
    } else {
        const map = L.map('map').setView([-31.5375, -68.5364], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [40, 40] });
        let marker = L.marker([-31.5375, -68.5364], {icon: carIcon}).addTo(map);

        const peer = new Peer();
        peer.on('open', () => {
            // Conexión de DATOS para GPS
            const conn = peer.connect(driverID);
            conn.on('data', (d) => {
                if(d.tipo === 'gps') {
                    marker.setLatLng([d.lat, d.lng]);
                    map.panTo([d.lat, d.lng]);
                }
            });

            // Conexión de VIDEO: El pasajero llama al chofer
            const call = peer.call(driverID, new MediaStream()); 
            call.on('stream', (s) => {
                const video = document.getElementById('v-pasajero');
                video.srcObject = s;
                // Intentar play automático, si falla se usa el botón
                video.play().then(() => {
                    document.getElementById('btn-play').style.display = 'none';
                }).catch(() => {});
            });
        });
    }
</script>
</body>
</html>
