<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIAJE SEGURO - PABLO SECURITY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; text-align: center; }
        #vPasajero { width: 100%; max-width: 500px; background: #111; height: 70vh; object-fit: cover; border-bottom: 2px solid #0f0; }
        .btn { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; margin-top: 20px; border-radius: 10px; width: 80%; }
    </style>
</head>
<body>
    <h2>PABLO SECURITY</h2>
    <div id="inicio">
        <button class="btn" onclick="conectar()">VER VIAJE EN VIVO</button>
    </div>
    <div id="reproductor" style="display:none;">
        <video id="vPasajero" autoplay playsinline></video>
        <p>🔴 CONECTADO AL MÓVIL</p>
    </div>

    <script>
        const idChofer = new URLSearchParams(window.location.search).get('id');

        function conectar() {
            if(!idChofer) return alert("Link inválido");
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('reproductor').style.display = 'block';

            const peer = new Peer(); // ID aleatorio para el pasajero
            
            peer.on('open', () => {
                // Llamamos al chofer
                const call = peer.call(idChofer, null);
                
                call.on('stream', (stream) => {
                    const v = document.getElementById('vPasajero');
                    v.srcObject = stream;
                    v.play();
                });

                // Si falla, reintentar en 3 segundos
                call.on('error', () => {
                    alert("Reconectando con el chofer...");
                    setTimeout(conectar, 3000);
                });
            });
        }
    </script>
</body>
</html>
