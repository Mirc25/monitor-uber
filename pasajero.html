<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAJERO - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; margin: 0; text-align: center; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #v { width: 100%; height: 40vh; background: #111; object-fit: cover; border-bottom: 2px solid #0f0; }
        #map { flex: 1; width: 100%; }
        .btn-ver { background: #0f0; color: #000; padding: 25px; width: 80%; border-radius: 15px; font-weight: bold; margin-top: 40vh; border: none; font-size: 20px; }
    </style>
</head>
<body>
    <div id="inicio">
        <button class="btn-ver" onclick="conectar()">ACCEDER AL MONITOREO</button>
    </div>

    <div id="pantalla" style="display:none; height: 100%;">
        <video id="v" autoplay playsinline muted></video>
        <div id="map"></div>
    </div>

    <script>
        const idChofer = new URLSearchParams(window.location.search).get('id');
        let map, marker;

        function conectar() {
            if(!idChofer) return alert("ID no encontrado");
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('pantalla').style.display = 'flex';
            document.getElementById('pantalla').style.flexDirection = 'column';

            map = L.map('map').setView([0,0], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0,0]).addTo(map);

            const peer = new Peer();
            peer.on('open', () => {
                // Pedir Video
                const call = peer.on('call', c => {}); // Limpiar llamadas
                const miCall = peer.call(idChofer, null);
                miCall.on('stream', s => {
                    const video = document.getElementById('v');
                    video.srcObject = s;
                    video.play();
                });

                // Pedir GPS
                const conn = peer.connect(idChofer);
                conn.on('data', d => {
                    if(d.tipo === 'gps') {
                        map.setView([d.lat, d.lng]);
                        marker.setLatLng([d.lat, d.lng]);
                    }
                });
            });
        }
    </script>
</body>
</html>
