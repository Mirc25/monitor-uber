<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGURIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn-start { background: #00ff00; color: #000; padding: 20px; border-radius: 50px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup">
        <h3>PROTECCIÓN ACTIVA</h3>
        <p>Presiona el botón para iniciar el monitoreo de seguridad.</p>
        <button class="btn-start" onclick="iniciarSeguridad()">INICIAR TRANSMISIÓN</button>
    </div>
    <div id="active" style="display:none;">
        <h3>✅ MONITOREO ACTIVO</h3>
        <p>Puedes minimizar esta ventana. El sistema opera en segundo plano.</p>
    </div>

    <script>
        function iniciarSeguridad() {
            const peer = new Peer(); // Genera un ID aleatorio para el auto

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('active').style.display = 'block';

                // Llama automáticamente a tu panel Master
                const call = peer.call('pablo-master-control-vip', stream);
            })
            .catch(err => alert("Error de permisos: " + err));
        }
    </script>
</body>
</html>
