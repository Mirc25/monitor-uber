<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSMISOR PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #setup { width: 90%; max-width: 400px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .btn-panic { width: 140px; height: 140px; border-radius: 50%; background: #ff0000; border: 6px solid #fff; color: white; font-size: 24px; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #vLocal { width: 100%; height: 200px; background: #000; border-radius: 10px; margin-bottom: 15px; object-fit: cover; border: 2px solid #444; }
    </style>
</head>
<body>

    <div id="setup" class="text-center">
        <h3 style="color: #00ff00;">PABLO SECURITY</h3>
        <p class="small text-muted">Solicitando acceso a cámara y GPS...</p>
        <input type="text" id="nombreInput" class="form-control form-control-lg mb-3 text-center" placeholder="NOMBRE DEL MÓVIL">
        <button id="btnStart" class="btn btn-success btn-lg w-100">ACTIVAR Y CONECTAR</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center w-100">
        <h4 id="dispNombre" class="mb-2"></h4>
        <video id="vLocal" autoplay playsinline muted></video>
        <div class="d-block mb-4">
            <button class="btn-panic" id="panicBtn">S.O.S</button>
        </div>
        <p id="statusMsg" class="small text-success">TRANSMITIENDO...</p>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id');
        let wakeLock = null;
        
        if(!myId) { alert("Error: Link inválido. Solicita uno nuevo a la Central."); }

        // Mantener pantalla y CPU activa
        async function activarWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock no soportado"); }
        }

        document.getElementById('btnStart').onclick = async () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Debes ingresar un nombre para el móvil.");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640 }, 
                    audio: true 
                });

                activarWakeLock();
                document.getElementById('setup').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('dispNombre').innerText = "MÓVIL: " + nombre;
                document.getElementById('vLocal').srcObject = stream;

                iniciarPeer(stream, nombre);

            } catch (err) {
                alert("ERROR DE CÁMARA: Permite el acceso para continuar. " + err.message);
            }
        };

        function iniciarPeer(stream, nombreReal) {
            const peer = new Peer(myId);

            peer.on('open', (id) => {
                const call = peer.call('pablo-master-control-vip', stream);
                const conn = peer.connect('pablo-master-control-vip');
                
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    
                    // GPS Persistente (watchPosition aguanta mejor el segundo plano)
                    navigator.geolocation.watchPosition(p => {
                        if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true, maximumAge: 0 });
                });

                document.getElementById('panicBtn').onclick = () => {
                    if(conn.open) conn.send({ tipo: 'alerta' });
                    alert("¡ALERTA ENVIADA!");
                };
            });

            peer.on('call', incomingCall => {
                incomingCall.answer();
                incomingCall.on('stream', centralStream => {
                    document.getElementById('audioCentral').srcObject = centralStream;
                });
            });
        }
    </script>
</body>
</html>
