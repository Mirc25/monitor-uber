<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY APP</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #setup { width: 90%; max-width: 400px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .btn-panic { width: 140px; height: 140px; border-radius: 50%; background: #ff0000; border: 6px solid #fff; color: white; font-size: 24px; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,0,0.5); margin: 15px 0; }
        #vLocal { width: 100%; height: 200px; background: #000; border-radius: 10px; object-fit: cover; border: 2px solid #444; }
        .btn-pip { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px; width: 100%; border-radius: 5px; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="setup" class="text-center">
        <h3 style="color: #00ff00;">PABLO SECURITY</h3>
        <input type="text" id="nombreInput" class="form-control form-control-lg mb-3 text-center" placeholder="ID MÓVIL">
        <button id="btnStart" class="btn btn-success btn-lg w-100">CONECTAR Y FIJAR APP</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center w-100 p-3">
        <h4 id="dispNombre" class="mb-2" style="color: #00ff00;"></h4>
        <video id="vLocal" autoplay playsinline muted></video>
        
        <button class="btn-pip" onclick="activarFlotante()">🔳 ACTIVAR VENTANA FLOTANTE</button>
        
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        <div id="statusMsg" style="color:#00ff00; font-size:11px;">MODO PERSISTENTE ACTIVO</div>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id');
        const video = document.getElementById('vLocal');
        let miStream = null;
        let wakeLock = null;

        // Función para forzar la ventana flotante (Picture-in-Picture)
        async function activarFlotante() {
            try {
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                } else {
                    await document.exitPictureInPicture();
                }
            } catch (error) {
                console.log("PiP no soportado o error:", error);
                alert("Para usar multiventana, mantén el video activo.");
            }
        }

        document.getElementById('btnStart').onclick = async () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Ingresa nombre");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 480 }, 
                    audio: true 
                });

                // Bloqueo de suspensión (WakeLock)
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }

                document.getElementById('setup').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('dispNombre').innerText = "MÓVIL: " + nombre;
                video.srcObject = miStream;

                iniciarConexion(nombre);

                // AUTO-FLOTANTE: Si minimiza, intenta abrir la ventanita solo
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden) {
                        video.requestPictureInPicture().catch(() => {});
                    }
                });

            } catch (err) { alert("Error al iniciar cámara."); }
        };

        function iniciarConexion(nombreReal) {
            const peer = new Peer(myId);
            peer.on('open', () => {
                peer.call('pablo-master-control-vip', miStream);
                const conn = peer.connect('pablo-master-control-vip');
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    
                    // GPS WATCH: Es la única forma que no se muere al minimizar
                    navigator.geolocation.watchPosition(p => {
                        if(conn && conn.open) {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }
                    }, null, { enableHighAccuracy: true, maximumAge: 0 });
                });
                document.getElementById('panicBtn').onclick = () => { if(conn.open) conn.send({ tipo: 'alerta' }); };
            });
            
            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });
        }
    </script>
</body>
</html>
