<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY APP</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #setup { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #00ff00; }
        
        /* CONTENEDOR DEL VIDEO CAMUFLADO */
        .video-wrap {
            position: relative;
            width: 100px; height: 70px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
        }
        #vLocal { width: 100%; height: 100%; object-fit: cover; }
        
        /* LOGO QUE TAPA EL VIDEO */
        .logo-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://cdn-icons-png.flaticon.com/512/1182/1182761.png') no-repeat center;
            background-size: 40px;
            pointer-events: none; /* Permite que el clic pase al video para el PiP */
        }

        .btn-panic { 
            width: 160px; height: 160px; 
            border-radius: 50%; background: radial-gradient(#ff0000, #800000); 
            border: 6px solid #fff; color: white; font-size: 28px; font-weight: bold; 
            box-shadow: 0 0 30px rgba(255,0,0,0.5); margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="setup" class="text-center">
        <h3 style="color: #00ff00;">PABLO SECURITY</h3>
        <input type="text" id="nombreInput" class="form-control mb-3 text-center bg-dark text-white" placeholder="ID UNIDAD">
        <button id="btnStart" class="btn btn-success btn-lg w-100">ACTIVAR SISTEMA</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center w-100 p-3">
        <h4 id="dispNombre" style="color: #00ff00;"></h4>
        
        <div class="video-wrap" onclick="activarPiP()">
            <video id="vLocal" autoplay playsinline muted></video>
            <div class="logo-overlay"></div>
        </div>
        
        <p class="small text-muted mt-2">Toca el logo para activar miniatura</p>

        <button class="btn-panic" id="panicBtn">S.O.S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id');
        const video = document.getElementById('vLocal');
        let miStream = null;

        async function activarPiP() {
            try {
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                }
            } catch (e) { console.error("Error PiP", e); }
        }

        document.getElementById('btnStart').onclick = async () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Ingresa ID");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 480 }, 
                    audio: true 
                });

                document.getElementById('setup').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('dispNombre').innerText = nombre;
                video.srcObject = miStream;

                iniciarConexion(nombre);

                // Forzar PiP al minimizar automáticamente
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden) activarPiP();
                });

            } catch (err) { alert("Permisos denegados."); }
        };

        function iniciarConexion(nombreReal) {
            const peer = new Peer(myId);
            peer.on('open', () => {
                peer.call('pablo-master-control-vip', miStream);
                const conn = peer.connect('pablo-master-control-vip');
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    navigator.geolocation.watchPosition(p => {
                        if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });
                document.getElementById('panicBtn').onclick = () => { if(conn.open) conn.send({ tipo: 'alerta' }); };
            });
            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });
        }
    </script>
</body>
</html>
