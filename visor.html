<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .top { background: #111; padding: 10px; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; }
        .main { display: flex; flex: 1; position: relative; }
        #grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding: 10px; overflow-y: auto; margin-right: 400px; }
        #map { width: 400px; height: 100%; position: absolute; right: 0; border-left: 2px solid #0f0; }
        .card-u { background: #0a0a0a; border: 1px solid #333; height: 350px; display: flex; flex-direction: column; }
        video { width: 100%; height: 150px; background: #000; object-fit: cover; }
        .sos { animation: blink 0.5s infinite; border: 3px solid red !important; }
        @keyframes blink { 50% { background: #500; } }
    </style>
</head>
<body>
    <div class="top">
        <h3>PABLO SECURITY - CENTRAL</h3>
        <button class="btn btn-success btn-sm" onclick="alert('Sistema Activo')">SISTEMA ONLINE</button>
    </div>
    <div class="main">
        <div id="grid"></div>
        <div id="map"></div>
    </div>
<script>
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    let map, units = {};

    function init() {
        map = L.map('map').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const peer = new Peer(CENTRAL_ID);
        peer.on('connection', (c) => {
            c.on('data', (d) => {
                if(d.tipo === 'login') {
                    if(!document.getElementById('u-'+c.peer)) {
                        const div = document.createElement('div');
                        div.className = 'card-u'; div.id = 'u-'+c.peer;
                        div.innerHTML = `<div style="padding:5px">${d.nombre}</div><video id="v-${c.peer}" autoplay muted playsinline></video><div id="m-${c.peer}" style="height:150px"></div><button class="btn btn-danger btn-sm" onclick="this.parentElement.classList.remove('sos')">OK</button>`;
                        document.getElementById('grid').appendChild(div);
                        const m = L.map('m-'+c.peer, {zoomControl:false}).setView([0,0],15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                        units[c.peer] = { m, mark: L.marker([0,0]).addTo(m), mainMark: L.marker([0,0]).addTo(map).bindPopup(d.nombre) };
                    }
                }
                if(d.tipo === 'gps' && units[c.peer]) {
                    const pos = [d.lat, d.lng];
                    units[c.peer].m.setView(pos);
                    units[c.peer].mark.setLatLng(pos);
                    units[c.peer].mainMark.setLatLng(pos);
                }
                if(d.tipo === 'sos') document.getElementById('u-'+c.peer).classList.add('sos');
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-'+call.peer);
                if(v) v.srcObject = s;
            });
        });
    }
    window.onload = init;
</script>
</body>
</html>
