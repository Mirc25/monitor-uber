<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISOR DE SEGURIDAD - PABLO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .monitor-video { width: 100%; border: 2px solid #333; border-radius: 10px; background: #111; }
        .status-bar { background: #222; padding: 10px; font-size: 0.8rem; border-bottom: 1px solid #444; }
        #mapa { height: 250px; width: 100%; border-radius: 10px; margin-top: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="status-bar d-flex justify-content-between">
        <span>🔴 TRANSMISIÓN EN VIVO</span>
        <span id="reloj"></span>
    </div>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-8">
                <div id="contenedor-video">
                    <img id="stream" class="monitor-video" src="" alt="Esperando señal del Uber...">
                </div>
                <div class="mt-2 text-center">
                    <button class="btn btn-outline-success btn-sm" onclick="escucharAudio()">🔊 ACTIVAR AUDIO</button>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card bg-dark text-white p-2">
                    <h6>UBICACIÓN GPS</h6>
                    <div id="mapa">
                        <iframe id="gps" width="100%" height="100%" frameborder="0" style="border:0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-3">
                        <small class="text-secondary">LINK DE ACCESO VÁLIDO</small>
                        <p class="text-info" id="token-info" style="font-size: 0.7rem;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FUNCIÓN PARA TOMAR LA IP Y EL TOKEN DEL LINK AUTOMÁTICAMENTE
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('auth');
        
        // Aquí es donde sucede la magia: la web toma la IP que tú definas
        // Por ahora usaremos la de ZeroTier que es la más estable para 4G
        const ipCelular = "10.147.17.X"; // Reemplaza la X por el número de tu celular

        document.getElementById('token-info').innerText = "ID de sesión: " + token;
        document.getElementById('stream').src = "http://" + ipCelular + ":8080/video";
        
        // GPS (Carga el mapa en la posición del auto)
        document.getElementById('gps').src = "https://maps.google.com/maps?q=" + ipCelular + "&t=&z=15&ie=UTF8&iwloc=&output=embed";

        // Reloj en vivo
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
