<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBER SEGURIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background:#000; color:#0f0; text-align:center; padding:50px;">
    <div id="btnCap">
        <h2>🛡️ PABLO SEGURIDAD</h2>
        <p>Presione para iniciar el monitoreo seguro del viaje.</p>
        <button onclick="conectarTodo()" style="padding:20px; border-radius:50px; background:#0f0; font-weight:bold;">ACTIVAR AHORA</button>
    </div>
    
    <div id="running" style="display:none;">
        <h1 style="color:red;">● TRANSMITIENDO</h1>
        <p>GPS, Micro y Cámara activos.</p>
        <p>Puede minimizar y usar Waze/WhatsApp.</p>
    </div>

    <script>
        function conectarTodo() {
            // FORZAMOS LOS PERMISOS CADA VEZ QUE TOCA EL BOTÓN
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 480, height: 854 }, 
                audio: true 
            })
            .then(stream => {
                const peer = new Peer();
                peer.on('open', id => {
                    document.getElementById('btnCap').style.display = 'none';
                    document.getElementById('running').style.display = 'block';

                    const call = peer.call('pablo-master-control-vip', stream);
                    
                    // Escuchamos a Pablo desde la PC
                    call.on('stream', pabloStream => {
                        const audio = new Audio();
                        audio.srcObject = pabloStream;
                        audio.play(); // Aquí es donde el chofer te escucha
                    });

                    // GPS DINÁMICO EN TIEMPO REAL
                    const conn = peer.connect('pablo-master-control-vip');
                    setInterval(() => {
                        navigator.geolocation.getCurrentPosition(pos => {
                            conn.send({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                        });
                    }, 5000);
                });
            })
            .catch(err => alert("Debe permitir los accesos para su seguridad."));
        }
    </script>
</body>
</html>
