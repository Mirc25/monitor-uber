<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL MAESTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .main-layout { display: flex; flex: 1; position: relative; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 12px; overflow-y: auto; margin-right: 400px; }
        .unit-card { background: #111; border: 1px solid #333; border-radius: 5px; height: 380px; display: flex; flex-direction: column; transition: 0.3s; }
        .video-box { height: 160px; background: #000; border-bottom: 1px solid #0f0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #mainMap { width: 400px; height: 100%; border-left: 2px solid #0f0; position: absolute; right: 0; }
        .sos-active { animation: blink-red 0.5s infinite; border: 3px solid red !important; box-shadow: 0 0 20px red; }
        @keyframes blink-red { 0% { background: #000; } 50% { background: #500; } }

        /* Estilos para el Modal de Agenda */
        #agendaModal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid #0f0; padding: 20px; z-index: 2000; width: 350px; border-radius: 10px;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; width: 100%; margin-bottom: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="overlay" id="modalOverlay" onclick="cerrarAgenda()"></div>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small>CENTRAL CHIMBAS</small></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="abrirAgenda()">📂 AGENDA Y TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <h5 class="text-center">REGISTRO DE UNIDADES</h5>
    <input type="text" id="regNombre" placeholder="Nombre Unidad (Ej: MOVIL 01)">
    <input type="text" id="regToken" placeholder="Token Secreto">
    <button class="btn btn-success btn-sm w-100 mb-2" onclick="guardarUnidad()">GUARDAR UNIDAD</button>
    <div id="listaAgendados" style="font-size: 11px; max-height: 150px; overflow-y: auto; border-top: 1px solid #0f0; padding-top: 10px;">
        </div>
    <button class="btn btn-danger btn-sm w-100 mt-2" onclick="cerrarAgenda()">CERRAR</button>
</div>

<script>
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    let peer, mainMap;
    const units = {};
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30] });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        
        peer = new Peer(CENTRAL_ID, {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login' || data.tipo === 'nombre') {
                    crearCelda(conn.peer, data.nombre || data.valor);
                }
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos' || data.tipo === 'alerta') {
                    document.getElementById('card-'+conn.peer)?.classList.add('sos-active');
                    alert("⚠️ ALERTA SOS RECIBIDA ⚠️");
                }
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function crearCelda(pid, nombre) {
        if(document.getElementById('card-'+pid)) return;
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.innerHTML = `
            <div style="padding:5px; font-size:12px; text-align:center; border-bottom:1px solid #0f0">${nombre}</div>
            <div class="video-box"><video id="v-${pid}" autoplay playsinline muted></video></div>
            <div id="m-i-${pid}" style="height:150px;"></div>
        `;
        document.getElementById('monitorGrid').prepend(card);
        
        const mi = L.map('m-i-' + pid, {zoomControl:false, attributionControl:false}).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { mi, mInd: L.marker([0,0]).addTo(mi), mGen: L.marker([0,0], {icon:carIcon}).addTo(mainMap) };
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].mInd.setLatLng([lat, lng]);
        units[id].mGen.setLatLng([lat, lng]);
    }

    // --- FUNCIONES DE AGENDA ---
    function abrirAgenda() {
        document.getElementById('agendaModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
        actualizarLista();
    }

    function cerrarAgenda() {
        document.getElementById('agendaModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function guardarUnidad() {
        const n = document.getElementById('regNombre').value.toUpperCase();
        const t = document.getElementById('regToken').value;
        if(!n || !t) return alert("Completá los campos");

        const tokens = JSON.parse(localStorage.getItem('pablo_security_tokens') || '{}');
        tokens[n] = t;
        localStorage.setItem('pablo_security_tokens', JSON.stringify(tokens));
        
        document.getElementById('regNombre').value = '';
        document.getElementById('regToken').value = '';
        actualizarLista();
        alert("Unidad agendada correctamente");
    }

    function actualizarLista() {
        const lista = document.getElementById('listaAgendados');
        const tokens = JSON.parse(localStorage.getItem('pablo_security_tokens') || '{}');
        lista.innerHTML = '<b>REGISTRADOS:</b><br>';
        for(let n in tokens) {
            lista.innerHTML += `● ${n} (Token: ${tokens[n]}) <br>`;
        }
    }

    window.onload = init;
</script>
</body>
</html>
