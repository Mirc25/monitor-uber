<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .main-layout { display: flex; flex: 1; position: relative; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; margin-right: 420px; }
        .unit-card { background: #111; border: 1px solid #333; border-radius: 8px; height: 380px; display: flex; flex-direction: column; overflow: hidden; }
        .video-box { height: 180px; background: #000; position: relative; border-bottom: 1px solid #0f0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #mainMap { width: 400px; height: 100%; border-left: 2px solid #0f0; position: absolute; right: 0; top: 0; z-index: 10; }
        .sos-alert { animation: blink 0.5s infinite; border: 2px solid red !important; }
        @keyframes blink { 0% { background: #000; } 50% { background: #500; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div><b>PABLO SECURITY</b> <small>CENTRAL MAESTRA</small></div>
    <button class="btn btn-sm btn-success fw-bold" onclick="alert('Usa la consola para gestionar tokens')">SISTEMA ACTIVO</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<script>
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    let peer, mainMap;
    const units = {};
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30] });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        
        peer = new Peer(CENTRAL_ID, {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearCelda(conn.peer, data.nombre);
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') document.getElementById('card-'+conn.peer).classList.add('sos-alert');
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = stream; v.play(); }
            });
        });
    }

    function crearCelda(pid, nombre) {
        if(document.getElementById('card-'+pid)) return;
        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + pid;
        card.innerHTML = `
            <div style="padding:5px; text-align:center; font-weight:bold; color:#0f0;">${nombre}</div>
            <div class="video-box"><video id="v-${pid}" autoplay playsinline muted></video></div>
            <div id="m-i-${pid}" style="height:150px;"></div>
        `;
        grid.prepend(card);
        
        const mi = L.map('m-i-' + pid, {zoomControl:false, attributionControl:false}).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mi);
        units[pid] = { mi, mI: L.marker([0,0]).addTo(mi), mG: L.marker([0,0], {icon:carIcon}).addTo(mainMap) };
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mi.setView([lat, lng]);
        units[id].mI.setLatLng([lat, lng]);
        units[id].mG.setLatLng([lat, lng]);
    }

    window.onload = init;
</script>
</body>
</html>
