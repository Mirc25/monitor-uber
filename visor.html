<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CENTRAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; flex: 1; position: relative; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; margin-right: 420px; }
        .unit-card { background: #111; border: 1px solid #333; border-radius: 8px; height: 400px; display: flex; flex-direction: column; position: relative; }
        .video-box { height: 180px; background: #000; border-bottom: 1px solid #0f0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #mainMap { width: 420px; height: 100%; border-left: 2px solid #0f0; position: absolute; right: 0; }
        .sos-active { animation: blink 0.5s infinite; border: 4px solid red !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; background: #400; } }
        .mini-map { height: 160px; }
        #agendaModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #0f0; padding: 20px; z-index: 2000; width: 350px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="top-bar">
    <h4 style="margin:0;">PABLO SECURITY <small style="font-size:12px; color:#555;">v3.0 PRO</small></h4>
    <button class="btn btn-sm btn-success" onclick="abrirAgenda()">📂 TOKENS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <h5>REGISTRO DE UNIDADES</h5>
    <input type="text" id="nomU" class="form-control bg-dark text-success mb-2" placeholder="NOMBRE">
    <input type="text" id="tokU" class="form-control bg-dark text-success mb-2" placeholder="TOKEN">
    <button class="btn btn-success w-100 mb-2" onclick="guardarU()">GUARDAR</button>
    <div id="lista" style="font-size:12px; max-height:150px; overflow-y:auto;"></div>
    <button class="btn btn-danger btn-sm w-100 mt-2" onclick="cerrarAgenda()">CERRAR</button>
</div>

<script>
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    let peer, mainMap;
    const units = {};
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [30, 30] });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        
        peer = new Peer(CENTRAL_ID, {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') crearUnidad(conn.peer, data.nombre);
                if(data.tipo === 'gps') moverUnidad(conn.peer, data.lat, data.lng);
                if(data.tipo === 'sos') alertar(conn.peer);
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function crearUnidad(id, nombre) {
        if(document.getElementById('card-'+id)) return;
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.id = 'card-' + id;
        card.innerHTML = `
            <div style="padding:5px; text-align:center; font-weight:bold; border-bottom:1px solid #0f0;">${nombre}</div>
            <div class="video-box"><video id="v-${id}" autoplay playsinline muted></video></div>
            <div id="map-${id}" class="mini-map"></div>
            <button class="btn btn-dark btn-sm" onclick="atender('${id}')">RESET SOS</button>
        `;
        document.getElementById('monitorGrid').appendChild(card);
        
        const m = L.map('map-'+id, {zoomControl:false, attributionControl:false}).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        units[id] = { m, markInd: L.marker([0,0]).addTo(m), markGen: L.marker([0,0], {icon:carIcon}).addTo(mainMap).bindPopup(nombre) };
    }

    function moverUnidad(id, lat, lng) {
        if(!units[id]) return;
        const p = [lat, lng];
        units[id].m.setView(p);
        units[id].markInd.setLatLng(p);
        units[id].markGen.setLatLng(p);
    }

    function alertar(id) {
        document.getElementById('card-'+id)?.classList.add('sos-active');
        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
    }

    function atender(id) {
        document.getElementById('card-'+id)?.classList.remove('sos-active');
    }

    // Funciones de Agenda
    function abrirAgenda() { document.getElementById('agendaModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; listar(); }
    function cerrarAgenda() { document.getElementById('agendaModal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function guardarU() {
        const n = document.getElementById('nomU').value.toUpperCase();
        const t = document.getElementById('tokU').value;
        let d = JSON.parse(localStorage.getItem('tokens_pablo') || '{}');
        d[n] = t;
        localStorage.setItem('tokens_pablo', JSON.stringify(d));
        listar();
    }
    function listar() {
        const c = document.getElementById('lista');
        let d = JSON.parse(localStorage.getItem('tokens_pablo') || '{}');
        c.innerHTML = "";
        for(let x in d) c.innerHTML += `<div>● ${x} (TK: ${d[x]})</div>`;
    }

    window.onload = init;
</script>
</body>
</html>
