<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSMISOR PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-panic { width: 150px; height: 150px; border-radius: 50%; background: red; border: 8px solid white; color: white; font-size: 30px; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="setup" class="text-center p-4">
        <h3>PABLO SECURITY</h3>
        <input type="text" id="nombreInput" class="form-control mb-3 text-center" placeholder="EJ: MOVIL 10">
        <button id="btnStart" class="btn btn-success btn-lg w-100">CONECTAR A CENTRAL</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center">
        <h2 id="dispNombre"></h2>
        <p class="text-success">🔴 TRANSMITIENDO VIVO</p>
        <video id="vLocal" autoplay playsinline muted style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid #00ff00;"></video>
        <br><br>
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id') || 'C' + Math.floor(Math.random()*1000);
        let peer, conn;

        document.getElementById('btnStart').onclick = () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Ingresa un nombre");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('transmision').style.display = 'block';
            document.getElementById('dispNombre').innerText = nombre;

            peer = new Peer(myId);

            peer.on('open', () => {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true })
                .then(stream => {
                    document.getElementById('vLocal').srcObject = stream;
                    
                    // Llamar a Central
                    peer.call('pablo-master-control-vip', stream);
                    
                    // Conexión de datos
                    conn = peer.connect('pablo-master-control-vip');
                    conn.on('open', () => {
                        conn.send({ tipo: 'nombre', valor: nombre });
                    });

                    // GPS
                    setInterval(() => {
                        navigator.geolocation.getCurrentPosition(p => {
                            if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        });
                    }, 5000);

                    // Pánico
                    document.getElementById('panicBtn').onclick = () => {
                        if(conn.open) conn.send({ tipo: 'alerta' });
                    };
                });
            });

            // Escuchar cuando PABLO le habla (desde la central)
            peer.on('call', incomingCall => {
                incomingCall.answer();
                incomingCall.on('stream', centralStream => {
                    document.getElementById('audioCentral').srcObject = centralStream;
                });
            });
        };
    </script>
</body>
</html>
