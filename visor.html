<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY - TRANSMISOR</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        
        /* CONTENEDOR FANTASMA: Mantiene el video activo pero fuera del área visible */
        .ghost-container {
            position: absolute;
            top: -1000px; 
            left: -1000px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        #setup { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #00ff00; }
        
        .btn-panic { 
            width: 200px; height: 200px; 
            border-radius: 50%; background: radial-gradient(#ff0000, #b30000); 
            border: 10px solid #fff; color: white; 
            font-size: 40px; font-weight: bold; 
            box-shadow: 0 0 50px rgba(255,0,0,0.7); 
            margin: 30px 0;
            cursor: pointer;
        }

        .status-box { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 10px; 
            color: #00ff00; 
            font-size: 13px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="ghost-container">
        <video id="vLocal" autoplay playsinline muted></video>
    </div>

    <div id="setup" class="text-center">
        <h2 style="color: #00ff00;">PABLO SECURITY</h2>
        <p class="text-muted small">CONEXIÓN DE SEGURIDAD OPERATIVA</p>
        <input type="text" id="nombreInput" class="form-control mb-4 text-center bg-dark text-white border-secondary" placeholder="ID DEL MÓVIL">
        <button id="btnStart" class="btn btn-success btn-lg w-100">INICIAR SERVICIO</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center w-100 p-3">
        <h3 id="dispNombre" class="mb-2" style="color: #00ff00; text-transform: uppercase;"></h3>
        
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        
        <div class="status-box">
            <div>🟢 TRANSMITIENDO EN VIVO</div>
            <div style="font-size: 10px; color: #666; margin-top: 5px;">PERSISTENCIA DE DATOS ACTIVADA</div>
        </div>
        
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id');
        const video = document.getElementById('vLocal');
        let miStream = null;

        document.getElementById('btnStart').onclick = async () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Ingresa el ID del móvil");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640 }, 
                    audio: true 
                });

                // Mantiene el procesador despierto
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen').catch(() => {});
                }

                document.getElementById('setup').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('dispNombre').innerText = nombre;
                video.srcObject = miStream;

                iniciarConexion(nombre);

            } catch (err) {
                alert("Error: Debes permitir cámara y GPS.");
            }
        };

        function iniciarConexion(nombreReal) {
            const peer = new Peer(myId);

            peer.on('open', () => {
                peer.call('pablo-master-control-vip', miStream);
                const conn = peer.connect('pablo-master-control-vip');
                
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    
                    navigator.geolocation.watchPosition(p => {
                        if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });

                document.getElementById('panicBtn').onclick = () => { 
                    if(conn.open) {
                        conn.send({ tipo: 'alerta' });
                        alert("SOS ENVIADO A CENTRAL");
                    }
                };
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });
        }
    </script>
</body>
</html>
