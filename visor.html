<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSMISOR PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #setup { width: 90%; max-width: 400px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .btn-panic { width: 140px; height: 140px; border-radius: 50%; background: #ff0000; border: 8px solid #fff; color: white; font-size: 24px; font-weight: bold; }
        #vLocal { width: 100%; height: 200px; background: #000; border-radius: 10px; margin-bottom: 15px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="setup" class="text-center">
        <h3 style="color: #00ff00;">PABLO SECURITY</h3>
        <input type="text" id="nombreInput" class="form-control mb-3 text-center" placeholder="NOMBRE DEL MÓVIL">
        <button id="btnStart" class="btn btn-success btn-lg w-100">INICIAR TRANSMISIÓN</button>
    </div>

    <div id="transmision" style="display:none;" class="text-center w-100">
        <h4 id="dispNombre"></h4>
        <video id="vLocal" autoplay playsinline muted></video>
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myId = urlParams.get('id');
        const video = document.getElementById('vLocal');
        let peer, conn, miStream;

        document.getElementById('btnStart').onclick = async () => {
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!nombre) return alert("Ingresa nombre");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: true 
                });
                
                document.getElementById('setup').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('dispNombre').innerText = nombre;
                video.srcObject = miStream;

                iniciarConexion(nombre);
                mantenerVivo();
            } catch (e) { alert("Error de cámara/audio"); }
        };

        function iniciarConexion(nombreReal) {
            peer = new Peer(myId);
            peer.on('open', () => {
                peer.call('pablo-master-control-vip', miStream);
                conn = peer.connect('pablo-master-control-vip');
                
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    // GPS de alta prioridad (watchPosition no se duerme tan fácil)
                    navigator.geolocation.watchPosition(p => {
                        if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });

                document.getElementById('panicBtn').onclick = () => { if(conn.open) conn.send({ tipo: 'alerta' }); };
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });
        }

        // --- TRUCO PARA NO CORTAR AL MINIMIZAR ---
        function mantenerVivo() {
            // 1. Bloqueo de suspensión de pantalla
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }

            // 2. Si el usuario minimiza, forzamos el modo "Cine/PiP"
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    if (video.requestPictureInPicture) {
                        video.requestPictureInPicture().catch(() => {});
                    }
                }
            });
        }
    </script>
</body>
</html>
