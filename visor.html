<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISOR - PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        #setup, #transmision { width: 90%; max-width: 400px; text-align: center; }
        #localVideo { width: 100%; border-radius: 15px; background: #000; margin-top: 15px; height: 60vh; object-fit: cover; }
        .btn-panic { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 100px; height: 100px; border-radius: 50%; 
            background: red; color: white; font-weight: bold; font-size: 20px;
            border: 6px solid white; box-shadow: 0 0 25px rgba(255,0,0,0.7); z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h2 class="mb-4">SISTEMA VIGILANCIA</h2>
        <input type="text" id="inputNombre" class="form-control form-control-lg mb-3" placeholder="Nombre del Chofer / Móvil">
        <button id="btnConectar" class="btn btn-success btn-lg w-100">INICIAR TRANSMISIÓN</button>
    </div>

    <div id="transmision" style="display:none;">
        <h4 id="txtNombreDisplay"></h4>
        <video id="localVideo" autoplay playsinline muted></video>
        <button class="btn-panic" id="panicBtn">ALERTA SOS</button>
    </div>

    <script>
        const video = document.getElementById('localVideo');
        const urlParams = new URLSearchParams(window.location.search);
        // Obtener el ID del link, si no existe genera uno
        const idDelLink = urlParams.get('id') || 'M' + Math.floor(Math.random() * 999);

        document.getElementById('btnConectar').onclick = () => {
            const nombreChofer = document.getElementById('inputNombre').value.trim();
            if (!nombreChofer) return alert("Por favor ingresa tu nombre");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('transmision').style.display = 'block';
            document.getElementById('txtNombreDisplay').innerText = "MÓVIL: " + nombreChofer;
            
            iniciarTransmision(nombreId, nombreChofer);
        };

        // El ID real de conexión es el del Link para que no choquen
        const nombreId = idDelLink;

        function iniciarTransmision(idParaConectar, nombreReal) {
            const peer = new Peer(idParaConectar);

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true })
            .then(stream => {
                video.srcObject = stream;
                const call = peer.call('pablo-master-control-vip', stream);
                const conn = peer.connect('pablo-master-control-vip');

                conn.on('open', () => {
                    // Enviamos el nombre real a la central para que lo muestre
                    conn.send({ nombreChofer: nombreReal });
                });

                // Enviar GPS cada 5 seg
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        if(conn && conn.open) conn.send({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    });
                }, 5000);

                // Botón Pánico
                document.getElementById('panicBtn').onclick = () => {
                    if(conn && conn.open) {
                        conn.send({ alerta: true });
                        alert("¡ALERTA SOS ENVIADA!");
                    }
                };
            });
        }

        // Evitar pausa al minimizar
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && video.srcObject) {
                video.requestPictureInPicture().catch(() => {});
            }
        });
    </script>
</body>
</html>
