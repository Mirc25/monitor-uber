<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL PABLO SECURITY - PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; }
        .panel-header { background: #111; padding: 10px 20px; border-bottom: 2px solid #00ff00; height: 70px; }
        
        /* Cuadrícula Fija */
        .grid-monitoreo { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 15px; 
            padding: 15px; 
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .cam-container { 
            border: 1px solid #00ff00; 
            background: #0a0a0a; 
            border-radius: 8px; 
            padding: 5px;
            display: flex;
            flex-direction: column;
        }

        .video-box { 
            width: 100%; 
            aspect-ratio: 9/16; /* Formato Vertical Fijo */
            background: #000;
            object-fit: cover;
            border-radius: 4px;
        }

        .controls { 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0;
            background: #111;
            margin-top: 5px;
        }

        .map-mini { width: 100%; height: 120px; border: none; filter: invert(90%) hue-rotate(180deg); }
        .btn-action { font-size: 0.7rem; font-weight: bold; }
    </script>
</head>
<body>
    <div class="panel-header d-flex justify-content-between align-items-center">
        <h4 class="m-0 text-uppercase">🛡️ Central Pablo Security</h4>
        <div class="d-flex gap-3">
            <button onclick="crearEnlace()" class="btn btn-sm btn-success">+ NUEVO MÓVIL</button>
            <div id="linkContainer" class="small text-white pt-1"></div>
        </div>
    </div>

    <div id="gridMonitoreo" class="grid-monitoreo"></div>

    <script>
        const peer = new Peer('pablo-master-control-vip', {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        let localStream;
        // Capturar micro de la PC para hablarle a los choferes
        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => localStream = s);

        peer.on('call', call => {
            call.answer(localStream); // Enviamos nuestro audio al contestar
            call.on('stream', remoteStream => gestionarCuadro(remoteStream, call.peer, call));
        });

        function gestionarCuadro(stream, peerId, call) {
            if (document.getElementById('div-' + peerId)) return;

            const col = document.createElement('div');
            col.id = 'div-' + peerId;
            col.className = 'cam-container';
            col.innerHTML = `
                <video id="video-${peerId}" class="video-box" autoplay playsinline></video>
                <div class="controls">
                    <button class="btn btn-outline-danger btn-action" id="mute-${peerId}" onclick="toggleMute('${peerId}')">MUTEAR</button>
                    <button class="btn btn-outline-info btn-action" onclick="hablar('${peerId}')">HABLAR</button>
                </div>
                <iframe id="map-${peerId}" class="map-mini"></iframe>
                <div class="text-center small py-1">ID: ${peerId.substring(0,6)}</div>
            `;
            document.getElementById('gridMonitoreo').appendChild(col);
            document.getElementById('video-' + peerId).srcObject = stream;
            
            // GPS DINÁMICO: Escuchamos datos de ubicación
            peer.on('connection', conn => {
                if(conn.peer === peerId) {
                    conn.on('data', data => {
                        document.getElementById(`map-${peerId}`).src = `https://maps.google.com/maps?q=${data.lat},${data.lng}&z=15&output=embed`;
                    });
                }
            });
        }

        function toggleMute(id) {
            const v = document.getElementById('video-' + id);
            v.muted = !v.muted;
            document.getElementById('mute-' + id).innerText = v.muted ? "ESCUCHAR" : "MUTEAR";
        }

        function crearEnlace() {
            const token = Math.random().toString(36).substring(7);
            const link = window.location.origin + "/visor.html?id=" + token;
            document.getElementById('linkContainer').innerHTML = `WhatsApp: <b>${link}</b>`;
            navigator.clipboard.writeText(link);
        }
    </script>
</body>
</html>
