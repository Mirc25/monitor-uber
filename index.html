<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOFER - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn-pablo { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; border-radius: 10px; font-size: 18px; margin-top: 10px; }
        .sos { background: #ff0000; color: white; height: 180px; width: 180px; border-radius: 50%; font-size: 30px; margin: 30px auto; border: 5px solid white; display: none; }
    </style>
</head>
<body>
    <div id="login">
        <h1>PABLO SECURITY</h1>
        <input type="text" id="nombre" placeholder="TU NOMBRE / MÓVIL" style="width:100%; padding:15px; border-radius:10px; border:1px solid #0f0; background:#111; color:#fff;">
        <button class="btn-pablo" onclick="conectar()">INICIAR SERVICIO</button>
    </div>
    <div id="app" style="display:none;">
        <h2 id="uNom"></h2>
        <div style="width:100%; height:200px; background:#111; border-radius:15px; overflow:hidden; margin-bottom:10px;">
            <video id="webcam" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
        </div>
        <button class="sos" id="sosBtn">S.O.S</button>
        <audio id="vozCentral" autoplay></audio>
    </div>

    <script>
        async function conectar() {
            const nombre = document.getElementById('nombre').value;
            if(!nombre) return alert("Pon tu nombre");

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('webcam').srcObject = stream;
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('sosBtn').style.display = 'block';
            document.getElementById('uNom').innerText = nombre;

            const peer = new Peer();
            peer.on('open', (id) => {
                const conn = peer.connect('PABLO-CENTRAL-2026');
                conn.on('open', () => {
                    conn.send({ tipo: 'login', nombre: nombre });
                    peer.call('PABLO-CENTRAL-2026', stream);
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                    document.getElementById('sosBtn').onclick = () => conn.send({ tipo: 'sos' });
                });
            });

            // Recibir voz de la central
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    document.getElementById('vozCentral').srcObject = remoteStream;
                });
            });
        }
    </script>
</body>
</html>
