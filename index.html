<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDAD - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #0f0; color: #fff; border-radius: 10px; }
        button { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; border-radius: 10px; font-size: 18px; }
        .sos { background: red; color: white; margin-top: 20px; height: 150px; border-radius: 50%; width: 150px; display: none; margin: 20px auto; }
    </style>
</head>
<body>
    <div id="login">
        <h1>PABLO SECURITY</h1>
        <input type="text" id="nombre" placeholder="TU NOMBRE / MÓVIL">
        <button onclick="conectar()">INICIAR SERVICIO</button>
    </div>
    <div id="app" style="display:none;">
        <h2 id="uNom"></h2>
        <p>TRANSMITIENDO...</p>
        <button class="sos" id="sosBtn" style="display:block;">S.O.S</button>
    </div>

    <script>
        async function conectar() {
            const nombre = document.getElementById('nombre').value;
            if(!nombre) return alert("Pon tu nombre");

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('uNom').innerText = nombre;

            const peer = new Peer();
            peer.on('open', (id) => {
                const conn = peer.connect('PABLO-CENTRAL-2026');
                conn.on('open', () => {
                    conn.send({ tipo: 'login', nombre: nombre });
                    peer.call('PABLO-CENTRAL-2026', stream);

                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });

                    document.getElementById('sosBtn').onclick = () => conn.send({ tipo: 'sos' });
                });
            });
        }
    </script>
</body>
</html>
