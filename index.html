<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOFER - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        video { width: 100%; border: 2px solid #0f0; border-radius: 10px; background: #111; height: 35vh; object-fit: cover; }
        .btn { background: #0f0; color: #000; padding: 20px; width: 100%; border: none; font-weight: bold; border-radius: 10px; margin: 10px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="idUnidad" placeholder="NOMBRE (Ej: MOVIL01)" style="padding:15px; width:80%;">
        <button class="btn" onclick="iniciar()">CONECTAR</button>
    </div>
    <div id="panel" style="display:none;">
        <video id="vLocal" autoplay muted playsinline></video>
        <button class="btn" onclick="copiar()">LINK PASAJERO</button>
    </div>
    <script>
        let peer, miStream, connCentral;
        async function iniciar() {
            const nom = document.getElementById('idUnidad').value.trim().toUpperCase();
            if(!nom) return;
            miStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('vLocal').srcObject = miStream;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('panel').style.display = 'block';

            peer = new Peer(nom, { config: {'iceServers': [{url:'stun:stun.l.google.com:19302'}]} });
            peer.on('open', (id) => {
                connCentral = peer.connect('PABLO-CENTRAL-MASTER-2026');
                connCentral.on('open', () => {
                    connCentral.send({tipo:'login', nombre:nom});
                    navigator.geolocation.watchPosition(p => {
                        if(connCentral.open) connCentral.send({tipo:'gps', lat:p.coords.latitude, lng:p.coords.longitude});
                    }, null, {enableHighAccuracy:true});
                });
            });
            // EL SECRETO: El chofer solo responde, no llama.
            peer.on('call', call => call.answer(miStream));
        }
        function copiar() {
            const url = window.location.href.replace('index.html', 'pasajero.html') + '?id=' + peer.id;
            navigator.clipboard.writeText(url);
            alert("Copiado");
        }
    </script>
</body>
</html>
