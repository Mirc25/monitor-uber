<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MÓVIL - PABLO SECURITY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .status { border: 1px solid #0f0; padding: 10px; margin: 20px 0; font-size: 0.8em; }
        #vLocal { width: 100%; max-width: 300px; border-radius: 10px; filter: grayscale(1); opacity: 0.3; }
        .btn-sos { width: 150px; height: 150px; border-radius: 50%; background: red; color: white; border: 5px solid white; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>
    <h2>UNIDAD DE VIGILANCIA</h2>
    <video id="vLocal" autoplay playsinline muted></video>

    <div id="setup">
        <input type="text" id="idPropio" class="form-control bg-dark text-success border-success text-center mb-2" placeholder="CÓDIGO (Ej: 123)">
        <button id="btnActivar" class="btn btn-success w-100">ACTIVAR TRANSMISIÓN</button>
    </div>

    <div id="activo" style="display:none;">
        <div class="status" id="estado">ESTADO: LISTO PARA ENLAZAR</div>
        <button class="btn-sos" id="sos">S.O.S</button>
        <p class="mt-3">GPS ACTIVO</p>
    </div>

    <script>
        let stream;
        const btn = document.getElementById('btnActivar');

        btn.onclick = async () => {
            const miId = document.getElementById('idPropio').value.trim().toLowerCase();
            if(!miId) return alert("Poné un código");

            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('vLocal').srcObject = stream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('activo').style.display = 'block';

                const peer = new Peer(miId);

                peer.on('open', () => {
                    document.getElementById('estado').innerText = "EN LÍNEA: ESPERANDO CENTRAL...";
                });

                // Cuando la central me llama para ver video
                peer.on('call', call => {
                    call.answer(stream);
                    document.getElementById('estado').innerText = "TRANSMITIENDO EN VIVO 🔴";
                });

                // Cuando la central se conecta para recibir datos (GPS/SOS)
                peer.on('connection', conn => {
                    document.getElementById('estado').innerText = "CONECTADO CON CENTRAL ✅";
                    
                    // Enviar GPS
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    });

                    document.getElementById('sos').onclick = () => {
                        conn.send({ tipo: 'alerta' });
                        alert("¡ALERTA ENVIADA!");
                    };
                });
            } catch (e) {
                alert("Error de permisos: " + e);
            }
        };
    </script>
</body>
</html>
