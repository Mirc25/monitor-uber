<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDUCTOR - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background:#000; color:#0f0; text-align:center;">
    <h2>SISTEMA ACTIVO</h2>
    <input type="text" id="idUnidad" placeholder="ID UNIDAD" style="padding:10px;">
    <button onclick="iniciar()" style="padding:10px; background:#0f0;">CONECTAR</button>
    <br><br>
    <video id="vLocal" autoplay muted playsinline style="width:80%; border:2px solid #0f0;"></video>

    <script>
        let miStream;
        async function iniciar() {
            const nom = document.getElementById('idUnidad').value.trim().toUpperCase();
            if(!nom) return alert("Pone un nombre");

            // 1. Abrir cámara primero
            miStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('vLocal').srcObject = miStream;

            // 2. Conectar Peer con el nombre de la unidad
            const peer = new Peer(nom);
            
            peer.on('open', (id) => {
                const conn = peer.connect('PABLO-CENTRAL-MASTER-2026');
                conn.on('open', () => {
                    conn.send({tipo: 'login', nombre: nom}); // Solo avisa que entró
                    
                    // Enviar GPS
                    navigator.geolocation.watchPosition(p => {
                        conn.send({tipo:'gps', lat:p.coords.latitude, lng:p.coords.longitude});
                    });
                });
            });

            // 3. ATENDER LLAMADAS (Esto es lo que faltaba)
            peer.on('call', call => {
                call.answer(miStream); // Envía el video a quien lo pida (Central o Pasajero)
            });
        }
    </script>
</body>
</html>
