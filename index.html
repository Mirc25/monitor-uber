<script>
    async function activarServicio() {
        const cod = document.getElementById('cod').value;
        const nom = document.getElementById('nom').value;
        if(!cod || !nom) return alert("Ingresa datos");

        try {
            // FORZAMOS MODO PANORÁMICO 16:9 PARA VER TODO EL ANCHO DEL AUTO
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 1280 }, // Resolución HD para captar más detalle
                    height: { ideal: 720 }, // Proporción 16:9 (alargada)
                    aspectRatio: 1.777777778 // Forzamos el formato panorámico
                }, 
                audio: true 
            });
            
            document.getElementById('hiddenV').srcObject = stream;
            const peer = new Peer();

            peer.on('open', (id) => {
                const centralID = 'PABLO-CENTRAL-' + cod;
                const conn = peer.connect(centralID);
                
                conn.on('open', () => {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    document.getElementById('sos').style.display = 'block';
                    document.getElementById('driver').innerText = nom.toUpperCase();
                    
                    conn.send({ tipo: 'login', nombre: nom });
                    peer.call(centralID, stream);

                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });

                    document.getElementById('sos').onclick = () => conn.send({ tipo: 'sos' });
                });
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', s => {
                    document.getElementById('audioCentral').srcObject = s;
                });
            });
        } catch(e) { alert("Error: Verifica los permisos de cámara"); }
    }
</script>
