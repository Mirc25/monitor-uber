<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        .container { max-width: 500px; margin-top: 20px; border: 2px solid #0f0; padding: 20px; border-radius: 15px; background: #111; }
        video { width: 100%; border-radius: 10px; border: 1px solid #0f0; transform: scaleX(-1); }
        .btn-pablo { background: #0f0; color: #000; font-weight: bold; border: none; }
        .status-dot { height: 10px; width: 10px; background: #f00; border-radius: 50%; display: inline-block; }
        .status-on { background: #0f0; }
        #pipBadge {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #pipBadge .pip-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
        }
        body.pip-hidden {
            background: #000;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        body.pip-hidden .container {
            display: none !important;
        }
        body.pip-hidden #pipBadge {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="pipBadge"><div class="pip-dot"></div></div>
    <div id="app-content" class="container text-center">
        <h2>PABLO SECURITY</h2>
        <div id="setup">
            <input type="text" id="unidadId" class="form-control bg-dark text-success mb-2" placeholder="ID UNIDAD">
            <input type="text" id="tokenAcceso" class="form-control bg-dark text-success mb-2" placeholder="TOKEN" maxlength="4">
            <button class="btn btn-pablo w-100" onclick="validarYActivar()">ACTIVAR</button>
        </div>
        <div id="monitor-activo" style="display:none;">
            <div><span id="dot" class="status-dot"></span> <span id="statusText">CONECTANDO...</span></div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>

    <script>
        let peer, miStream, connCentral, watchId, retryTimer, nombreActivo, tokenActivo;
        let viewerConns = [], lastLat = null, lastLng = null;
        let viajeTokenActivo = null;
        window.__unitPeerId = null;
        const CENTRAL_PEER_ID = 'PABLO-CENTRAL-MASTER-2026';
        const RETRY_DELAY = 5000;

        function setStatus(texto, online) {
            document.getElementById('statusText').innerText = texto;
            document.getElementById('dot').className = 'status-dot' + (online ? ' status-on' : '');
        }

        function syncUnitPeerIdToNative() {
            if (!peer || peer.destroyed || !peer.id) return;
            window.__unitPeerId = peer.id;
            if (window.Android && window.Android.setUnitPeerId) {
                window.Android.setUnitPeerId(peer.id);
            }
        }

        async function validarYActivar() {
            const nom = document.getElementById('unidadId').value.trim().toUpperCase();
            const tok = document.getElementById('tokenAcceso').value.trim();
            if (!nom || !tok) { alert('Completá ID y TOKEN'); return; }

            nombreActivo = nom;
            tokenActivo = tok;

            try {
                miStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            } catch(e) {
                alert('Sin acceso a cámara/micrófono: ' + e.message);
                return;
            }
            document.getElementById('localVideo').srcObject = miStream;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('monitor-activo').style.display = 'block';
            setStatus('CONECTANDO...', false);

            iniciarPeer();
        }

        function iniciarPeer() {
            clearTimeout(retryTimer);

            if (peer && !peer.destroyed) {
                peer.destroy();
            }

            // ID estable por sesión (no cambia en reconexiones de red)
            const peerId = 'PABLO-U-' + nombreActivo;
            peer = new Peer(peerId);

            peer.on('open', () => {
                syncUnitPeerIdToNative();
                conectar();
            });

            // Viewers se conectan al peer principal de la unidad
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (!data || data.tipo !== 'viewer_ready') return;

                    // Validar token de viaje antes de abrir stream
                    if (!viajeTokenActivo || data.token !== viajeTokenActivo) {
                        try { conn.send({ tipo: 'viewer_denied' }); } catch (e) {}
                        return;
                    }

                    try { conn.send({ tipo: 'viewer_ok' }); } catch (e) {}

                    if (!viewerConns.includes(conn)) viewerConns.push(conn);
                    if (lastLat !== null) {
                        try { conn.send({ tipo: 'gps', lat: lastLat, lng: lastLng }); } catch (e) {}
                    }

                    try {
                        peer.call(conn.peer, miStream);
                    } catch (e) {
                        console.error('No se pudo iniciar llamada al viewer:', e);
                    }
                });

                conn.on('close', () => {
                    viewerConns = viewerConns.filter(c => c !== conn);
                });
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    setStatus('CENTRAL OFFLINE - REINTENTANDO EN 5s...', false);
                    retryTimer = setTimeout(() => conectar(), RETRY_DELAY);
                } else if (err.type === 'unavailable-id') {
                    // ID ocupado por sesión anterior, usar timestamp esta vez
                    if (peer && !peer.destroyed) peer.destroy();
                    peer = new Peer('PABLO-U-' + nombreActivo + '-' + Date.now());
                    peer.on('open', () => {
                        syncUnitPeerIdToNative();
                        conectar();
                    });
                } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
                    setStatus('SIN RED - REINTENTANDO EN 5s...', false);
                    retryTimer = setTimeout(() => iniciarPeer(), RETRY_DELAY);
                } else {
                    setStatus('ERROR: ' + err.type + ' - REINTENTANDO...', false);
                    retryTimer = setTimeout(() => iniciarPeer(), RETRY_DELAY);
                }
            });

            peer.on('disconnected', () => {
                setStatus('DESCONECTADO - RECONECTANDO...', false);
                if (!peer.destroyed) {
                    peer.reconnect();
                } else {
                    retryTimer = setTimeout(() => iniciarPeer(), RETRY_DELAY);
                }
            });
        }

        function conectar() {
            clearTimeout(retryTimer);
            setStatus('CONECTANDO CON CENTRAL...', false);

            if (connCentral) {
                try { connCentral.close(); } catch(e) {}
            }

            connCentral = peer.connect(CENTRAL_PEER_ID, { reliable: true });

            connCentral.on('open', () => {
                connCentral.send({ tipo: 'login', nombre: nombreActivo, token: tokenActivo });
                iniciarGPS();
            });

            connCentral.on('data', (data) => {
                if (data.tipo === 'auth_ok') {
                    setStatus('EN LÍNEA', true);
                    syncUnitPeerIdToNative();
                    peer.call(CENTRAL_PEER_ID, miStream);
                } else if (data.tipo === 'auth_fail') {
                    setStatus('TOKEN INCORRECTO', false);
                }
            });

            connCentral.on('close', () => {
                setStatus('CONEXIÓN CERRADA - REINTENTANDO...', false);
                retryTimer = setTimeout(() => conectar(), RETRY_DELAY);
            });

            connCentral.on('error', (err) => {
                setStatus('ERROR CONEXIÓN - REINTENTANDO...', false);
                retryTimer = setTimeout(() => conectar(), RETRY_DELAY);
            });

            // Si en 10 segundos no hubo respuesta, reintentar
            retryTimer = setTimeout(() => {
                if (!connCentral || !connCentral.open) {
                    setStatus('SIN RESPUESTA - REINTENTANDO...', false);
                    conectar();
                }
            }, 10000);
        }

        function iniciarGPS() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => {
                lastLat = pos.coords.latitude;
                lastLng = pos.coords.longitude;
                if (connCentral && connCentral.open) {
                    connCentral.send({ tipo: 'gps', lat: lastLat, lng: lastLng });
                }
                // Enviar GPS a los viewers del link de viaje
                viewerConns.forEach(c => { try { if (c.open) c.send({ tipo: 'gps', lat: lastLat, lng: lastLng }); } catch(e) {} });
            }, (err) => console.error("Error GPS:", err), { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        // ── LINK DE VIAJE (presión larga en candado flotante) ──
        window.generarLinkViaje = function(tokenForzado) {
            // Token de 6 caracteres alfanuméricos
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            const token = tokenForzado || Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            viajeTokenActivo = token;
            viewerConns = [];

            // Usar peer activo o el último peer cacheado sincronizado a nativo
            const peerIdForLink = (peer && !peer.destroyed && peer.id) ? peer.id : window.__unitPeerId;
            if (!peerIdForLink) {
                return null;
            }

            const link = 'https://monitor-uber.vercel.app/viewer.html?u=' + encodeURIComponent(peerIdForLink) + '&v=' + token;

            // Fallback browser normal
            if (!window.Android) {
                navigator.clipboard && navigator.clipboard.writeText(link);
            }

            return link;
        };

        // MANTENER VIVO EN SEGUNDO PLANO
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                document.body.classList.add('pip-hidden');
                return;
            }

            document.body.classList.remove('pip-hidden');
            if (miStream) document.getElementById('localVideo').srcObject = miStream;
        });

        window.setHiddenPipMode = function(enabled) {
            document.body.classList.toggle('pip-hidden', !!enabled);
        };

        // Heartbeat de sincronización para nativo (evita null en PiP/background)
        setInterval(syncUnitPeerIdToNative, 2000);
    </script>
</body>
</html>
