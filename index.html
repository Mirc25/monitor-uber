<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; font-family: sans-serif; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container-app { width: 90%; max-width: 400px; padding: 30px; background: #111; border-radius: 25px; border: 1px solid #00ff00; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        #vLocal { position: absolute; top: -5000px; width: 1px; height: 1px; }
        input.form-control { background: #222; border: 1px solid #444; color: #00ff00; font-size: 24px; text-align: center; }
        .btn-panic { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(#ff0000, #800000); border: 8px solid #fff; color: white; font-size: 32px; font-weight: bold; margin: 20px 0; box-shadow: 0 0 40px rgba(255,0,0,0.5); }
        .status-led { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <video id="vLocal" autoplay playsinline muted></video>

    <div id="login-screen" class="container-app text-center">
        <h2 style="color: #00ff00; font-weight: 900;">PABLO SECURITY</h2>
        <div class="mb-4">
            <label class="small text-secondary">CÓDIGO DE ENLACE</label>
            <input type="text" id="codigoInput" class="form-control" maxlength="10" placeholder="Ej: 123">
        </div>
        <div class="mb-4">
            <label class="small text-secondary">ID DEL MÓVIL</label>
            <input type="text" id="nombreInput" class="form-control" style="font-size: 16px;" placeholder="MÓVIL 01">
        </div>
        <button id="btnConectar" class="btn btn-success btn-lg w-100 py-3">ACTIVAR SERVICIO</button>
    </div>

    <div id="op-screen" class="container-app text-center" style="display: none;">
        <div class="mb-3">
            <span class="status-led"></span>
            <span id="txtUnidad" style="color: #00ff00; font-weight: bold;"></span>
        </div>
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        <div class="p-3 bg-dark rounded border border-secondary">
            <p id="debug-status" style="color: #00ff00; font-size: 12px; margin: 0;">ESPERANDO CONEXIÓN CENTRAL...</p>
        </div>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const video = document.getElementById('vLocal');
        let miStream = null;

        document.getElementById('btnConectar').onclick = async () => {
            const codigo = document.getElementById('codigoInput').value.trim().toLowerCase();
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!codigo || !nombre) return alert("Completa todos los datos");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('op-screen').style.display = 'block';
                document.getElementById('txtUnidad').innerText = nombre.toUpperCase();
                video.srcObject = miStream;

                iniciarServidorChofer(codigo, nombre);
            } catch (e) {
                alert("Error de permisos.");
            }
        };

        function iniciarServidorChofer(idUnico, nombreReal) {
            // El celular se registra con el CÓDIGO que tú elegiste
            const peer = new Peer(idUnico);

            peer.on('open', () => {
                document.getElementById('debug-status').innerText = "LISTO: ESPERANDO A PABLO...";
            });

            // Cuando la Central llame al celular:
            peer.on('call', call => {
                call.answer(miStream); // El celular responde con su video
                document.getElementById('debug-status').innerText = "TRANSMITIENDO EN VIVO";
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });

            // Cuando la Central se conecte para datos:
            peer.on('connection', conn => {
                document.getElementById('debug-status').innerText = "CONECTADO A CENTRAL";
                
                // Enviar nombre y GPS automáticamente
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    });
                });

                document.getElementById('panicBtn').onclick = () => { conn.send({ tipo: 'alerta' }); };
            });
        }
    </script>
</body>
</html>
