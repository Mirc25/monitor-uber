<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .panel-header { background: #111; padding: 10px 20px; border-bottom: 2px solid #00ff00; height: 70px; display: flex; justify-content: space-between; align-items: center; }
        .grid-monitoreo { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .cam-container { border: 2px solid #333; background: #0a0a0a; border-radius: 12px; overflow: hidden; position: relative; }
        .video-box { width: 100%; height: 240px; background: #000; object-fit: cover; }
        .nombre-chofer { background: #00ff00; color: #000; font-weight: bold; padding: 5px 10px; font-size: 14px; }
        .alerta-activa { border: 5px solid #ff0000 !important; animation: parpadeo 0.6s infinite; }
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .map-mini { width: 100%; height: 150px; border: none; border-top: 1px solid #333; }
        #btnMiMic { transition: 0.2s; font-weight: bold; width: 250px; }
        .mic-off { background-color: #444 !important; border-color: #666 !important; color: #ccc !important; }
        .mic-on { background-color: #198754 !important; border-color: #198754 !important; color: #fff !important; box-shadow: 0 0 15px #198754; }
    </style>
</head>
<body>
    <div class="panel-header">
        <div class="d-flex align-items-center">
            <h4 class="m-0 me-3">🛡️ PABLO SECURITY</h4>
            <button id="btnMiMic" onmousedown="hablar(true)" onmouseup="hablar(false)" onmouseleave="hablar(false)" class="btn mic-off btn-sm">
                🎤 MANTENER PARA HABLAR
            </button>
        </div>
        <div id="status" class="badge bg-success">CENTRAL ACTIVA</div>
        <button onclick="generarLinkUnico()" class="btn btn-outline-success btn-sm">➕ GENERAR NUEVO LINK</button>
    </div>

    <div id="gridMonitoreo" class="grid-monitoreo"></div>

    <script>
        // ID fijo para la central
        const peer = new Peer('pablo-master-control-vip');
        let miStreamVoz;

        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { 
            miStreamVoz = s; 
            miStreamVoz.getAudioTracks()[0].enabled = false; 
        });

        function hablar(estado) {
            if (miStreamVoz) {
                miStreamVoz.getAudioTracks()[0].enabled = estado;
                const btn = document.getElementById('btnMiMic');
                if(estado) {
                    btn.innerText = "HABLANDO AL CHOFER...";
                    btn.classList.replace('mic-off', 'mic-on');
                } else {
                    btn.innerText = "🎤 MANTENER PARA HABLAR";
                    btn.classList.replace('mic-on', 'mic-off');
                }
            }
        }

        peer.on('call', call => {
            call.answer(miStreamVoz);
            call.on('stream', remoteStream => {
                crearCuadro(remoteStream, call.peer);
            });
        });

        function crearCuadro(stream, idConexion) {
            if (document.getElementById('div-' + idConexion)) return;

            const div = document.createElement('div');
            div.id = 'div-' + idConexion;
            div.className = 'cam-container';
            div.innerHTML = `
                <div class="nombre-chofer" id="tit-${idConexion}">🚀 CONECTANDO...</div>
                <video id="vid-${idConexion}" class="video-box" autoplay playsinline></video>
                <div class="p-2 d-flex gap-1">
                    <button class="btn btn-warning btn-sm w-100" onclick="toggleMute('${idConexion}')" id="btn-m-${idConexion}">SILENCIAR</button>
                    <button class="btn btn-dark btn-sm" onclick="cerrar('${idConexion}')">X</button>
                </div>
                <div id="info-${idConexion}" style="padding:5px; font-size:11px; color:#aaa;">Localizando...</div>
                <iframe id="map-${idConexion}" class="map-mini"></iframe>
            `;
            document.getElementById('gridMonitoreo').appendChild(div);
            document.getElementById('vid-' + idConexion).srcObject = stream;

            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(data.nombreChofer) {
                        document.getElementById('tit-' + idConexion).innerText = "🚖 " + data.nombreChofer;
                    }
                    if(data.alerta) {
                        document.getElementById('div-' + idConexion).classList.add('alerta-activa');
                        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
                    }
                    if(data.lat) {
                        document.getElementById('map-'+idConexion).src = `https://maps.google.com/maps?q=${data.lat},${data.lng}&z=15&output=embed`;
                        document.getElementById('info-'+idConexion).innerHTML = `📍 GPS: ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}`;
                    }
                });
            });
        }

        function toggleMute(id) {
            const v = document.getElementById('vid-' + id);
            v.muted = !v.muted;
            document.getElementById('btn-m-' + id).innerText = v.muted ? "ESCUCHAR" : "SILENCIAR";
        }

        function cerrar(id) { document.getElementById('div-' + id).remove(); }

        function generarLinkUnico() {
            // Genera un ID aleatorio para evitar que los links choquen
            const tokenUnico = 'M' + Math.floor(Math.random() * 999999);
            const urlBase = window.location.href.split('index.html')[0];
            const linkFinal = `${urlBase}visor.html?id=${tokenUnico}`;
            
            navigator.clipboard.writeText(linkFinal);
            alert("LINK ÚNICO GENERADO:\n" + linkFinal + "\n\nEnvíalo al chofer.");
        }
    </script>
</body>
</html>
