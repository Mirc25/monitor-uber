<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - CONDUCTOR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background: #000; color: #0f0; text-align: center; font-family: sans-serif;">
    <h2>UNIDAD DE CONTROL</h2>
    <input type="text" id="unidad" placeholder="NOMBRE UNIDAD" style="padding:10px; width:80%;">
    <button onclick="iniciar()" style="padding:15px; background:#0f0; width:85%; font-weight:bold; border-radius:10px;">ACTIVAR</button>
    
    <div id="cont" style="display:none;">
        <video id="v" autoplay muted playsinline style="width:95%; border:2px solid #0f0; margin-top:10px; border-radius:10px;"></video>
    </div>

    <script>
        let peer, stream, conn;
        async function iniciar() {
            const nom = document.getElementById('unidad').value.toUpperCase().trim();
            if(!nom) return alert("Pone el nombre del movil");

            try {
                // Captura de cámara y audio
                stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('v').srcObject = stream;
                document.getElementById('cont').style.display = 'block';

                // Usamos tu ID original: PABLO-U-NOMBRE
                peer = new Peer('PABLO-U-' + nom);

                peer.on('open', () => {
                    // Conexión a tu central maestra
                    conn = peer.connect('PABLO-CENTRAL-MASTER-2026');
                    
                    conn.on('open', () => {
                        // Login y GPS
                        conn.send({tipo: 'login', nombre: nom});
                        
                        // El chofer llama a la central para pasar el video
                        peer.call('PABLO-CENTRAL-MASTER-2026', stream);

                        navigator.geolocation.watchPosition(p => {
                            if(conn.open) conn.send({tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude});
                        }, null, {enableHighAccuracy: true});
                    });
                });

                // Permite que el pasajero también vea el video si llama
                peer.on('call', call => call.answer(stream));

            } catch (e) { alert("Error de cámara: " + e); }
        }
    </script>
</body>
</html>
