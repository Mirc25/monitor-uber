<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOFER - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; border: 2px solid #0f0; border-radius: 10px; background: #111; height: 40vh; object-fit: cover; }
        input { width: 80%; padding: 15px; background: #111; border: 1px solid #0f0; color: #0f0; margin-bottom: 15px; font-size: 18px; }
        .btn { background: #0f0; color: #000; padding: 20px; width: 100%; border: none; font-weight: bold; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="idUnidad" placeholder="NOMBRE (Ej: MOVIL01)">
        <button class="btn" onclick="iniciar()">CONECTAR UNIDAD</button>
    </div>

    <div id="control" style="display:none;">
        <video id="vLocal" autoplay muted playsinline></video>
        <button class="btn" onclick="copiarLink()">LINK PARA PASAJERO</button>
        <button class="btn" style="background:red; color:white; margin-top:10px;" onclick="enviarSOS()">B O T Ó N - S O S</button>
    </div>

    <script>
        let peer, miStream, connCentral;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function iniciar() {
            const nom = document.getElementById('idUnidad').value.trim().toUpperCase();
            if(!nom) return alert("Poné el nombre de la unidad");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('vLocal').srcObject = miStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('control').style.display = 'block';

                // IMPORTANTE: El ID debe ser el nombre exactO para que el Visor te encuentre
                peer = new Peer(nom, {
                    config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
                });

                peer.on('open', (id) => {
                    // 1. Conectar a la Central
                    connCentral = peer.connect(CENTRAL_ID);
                    connCentral.on('open', () => {
                        connCentral.send({ tipo: 'login', nombre: nom });
                        
                        // Enviar GPS
                        navigator.geolocation.watchPosition(p => {
                            connCentral.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }, null, { enableHighAccuracy: true });
                    });
                });

                // ESTO RESPONDE EL VIDEO A CENTRAL Y PASAJERO
                peer.on('call', (call) => call.answer(miStream));

            } catch (e) { alert("Error de cámara: " + e); }
        }

        function copiarLink() {
            const link = window.location.href.replace('index.html', 'pasajero.html') + '?id=' + document.getElementById('idUnidad').value.toUpperCase();
            navigator.clipboard.writeText(link);
            alert("Link copiado");
        }

        function enviarSOS() { if(connCentral) connCentral.send({ tipo: 'sos' }); }
    </script>
</body>
</html>
