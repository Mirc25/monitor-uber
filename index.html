<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOFER - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; }
        video { width: 90%; border: 2px solid #0f0; border-radius: 10px; margin-top: 10px; }
        .btn { background: #0f0; color: #000; padding: 20px; width: 90%; border: none; font-weight: bold; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>PABLO SECURITY</h2>
    <input type="text" id="idUnidad" placeholder="UNIDAD (Ej: 1234)" style="padding:15px; width:80%;">
    <button class="btn" onclick="iniciar()">ACTIVAR TRANSMISIÓN</button>
    <div id="panel" style="display:none;">
        <video id="vLocal" autoplay muted playsinline></video>
        <button class="btn" onclick="compartir()">COPIAR LINK PASAJERO</button>
    </div>

    <script>
        let peer, miStream;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function iniciar() {
            const nom = document.getElementById('idUnidad').value.trim();
            if(!nom) return alert("Pone el ID");

            miStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('vLocal').srcObject = miStream;
            document.getElementById('panel').style.display = 'block';

            // ID FIJO: Esto es lo que busca la central
            peer = new Peer('PABLO-U-' + nom, {
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
            });

            // RESPONDER AUTOMÁTICAMENTE A TODO
            peer.on('call', (call) => {
                console.log("Llamada entrante...");
                call.answer(miStream);
            });

            peer.on('open', () => {
                // Intentar conectar a la central para el GPS
                const conn = peer.connect(CENTRAL_ID);
                conn.on('open', () => {
                    conn.send({ tipo: 'login', nombre: nom });
                    peer.call(CENTRAL_ID, miStream); // Mandar video a central
                    
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    });
                });
            });
        }

        function compartir() {
            const url = window.location.href.replace('index.html', 'pasajero.html') + '?id=' + peer.id;
            navigator.clipboard.writeText(url);
            alert("Link copiado");
        }
    </script>
</body>
</html>
