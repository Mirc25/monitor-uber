<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MÓVIL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        #app { display: none; flex-direction: column; flex: 1; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; text-align: center; font-size: 16px; }
        button { width: 85%; padding: 18px; background: #008000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #sos { background: #f00; height: 80px; font-size: 25px; margin: auto 10px 20px 10px; box-shadow: 0 0 20px red; }
        video { width: 100%; background: #111; border-bottom: 2px solid #0f0; max-height: 30vh; object-fit: cover; }
        .panel { background: #111; border: 1px solid #0f0; margin: 10px; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="login" style="padding: 20px;">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="nom" placeholder="ID UNIDAD (Ej: MOVIL 01)">
        <input type="text" id="tok" placeholder="TOKEN">
        <button onclick="activar()">CONECTAR UNIDAD</button>
    </div>

    <div id="app">
        <video id="vLocal" autoplay muted playsinline></video>
        <div class="panel">
            <button style="background:#0f0; color:#000;" onclick="compartir()">COPIAR LINK PASAJERO</button>
        </div>
        <button id="sos" onclick="enviarSOS()">B O T Ó N - S O S</button>
    </div>

    <script>
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
        let miPeer, miStream, miConexion;

        async function activar() {
            const nombreUnidad = document.getElementById('nom').value.toUpperCase();
            if(!nombreUnidad) return alert("Pon el nombre de unidad");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('vLocal').srcObject = miStream;

                // ID simplificado para evitar errores de caracteres
                const fixedID = 'PABLO-' + nombreUnidad.replace(/\s+/g, '-');
                
                miPeer = new Peer(fixedID, {
                    config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
                });
                
                miPeer.on('open', (id) => {
                    miConexion = miPeer.connect(CENTRAL_ID);
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    
                    // Al abrir, llamar a central
                    miPeer.call(CENTRAL_ID, miStream);

                    navigator.geolocation.watchPosition(p => {
                        if(miConexion.open) miConexion.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });

                // ESTO ES CLAVE: Responder a CUALQUIER llamado (Central o Pasajero)
                miPeer.on('call', (call) => {
                    call.answer(miStream);
                });

            } catch(e) { alert("Error de cámara o GPS"); }
        }

        function compartir() {
            // Genera el link basado en la URL actual de tu servidor/GitHub
            const base = window.location.href.split('index.html')[0].split('?')[0];
            const link = `${base}pasajero.html?id=${miPeer.id}`;
            navigator.clipboard.writeText(link).then(() => alert("Link de pasajero copiado"));
        }

        function enviarSOS() { if(miConexion.open) miConexion.send({ tipo: 'sos' }); }
    </script>
</body>
</html>
