<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MÓVIL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #app { display: none; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; text-align: center; }
        button { width: 85%; padding: 18px; background: #008000; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        #sos { background: #f00; height: 80px; font-size: 25px; margin-top: 15px; }
        video { width: 100%; background: #111; border-top: 2px solid #0f0; }
        .panel { background: #111; border: 2px solid #0f0; margin: 15px; padding: 15px; border-radius: 10px; }
        select { width: 100%; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="nom" placeholder="ID UNIDAD">
        <input type="text" id="tok" placeholder="TOKEN">
        <button onclick="activarServicio()">CONECTAR</button>
    </div>

    <div id="app">
        <h3 id="displayNombre"></h3>
        <video id="vLocal" autoplay muted playsinline></video>
        
        <div class="panel">
            <h4>⭐ VIAJE 5 ESTRELLAS</h4>
            <select id="minutosViaje">
                <option value="6">6 MINUTOS</option>
                <option value="15">15 MINUTOS</option>
                <option value="30">30 MINUTOS</option>
            </select>
            <button style="background:#0f0; color:#000;" onclick="generarLinkPasajero()">COPIAR LINK PASAJERO</button>
        </div>

        <button id="sos" onclick="enviarSOS()">B O T Ó N - S O S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const CENTRAL_MASTER_ID = 'PABLO-CENTRAL-MASTER-2026';
        let miPeer, miStream, miConexion;
        let conexionesPasajeros = [];

        async function activarServicio() {
            const nom = document.getElementById('nom').value.trim().toUpperCase();
            const tok = document.getElementById('tok').value.trim();
            if(!nom || !tok) return alert("Completa los datos");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('vLocal').srcObject = miStream;

                miPeer = new Peer('ID-' + Math.floor(Math.random()*99999));

                miPeer.on('open', (id) => {
                    miConexion = miPeer.connect(CENTRAL_MASTER_ID);
                    miConexion.on('open', () => {
                        miConexion.send({ tipo: 'login', nombre: nom, token: tok });
                        miPeer.call(CENTRAL_MASTER_ID, miStream);
                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('displayNombre').innerText = nom;

                        navigator.geolocation.watchPosition(p => {
                            const gps = { tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude };
                            if(miConexion.open) miConexion.send(gps);
                            conexionesPasajeros.forEach(c => { if(c.open) c.send(gps); });
                        }, null, { enableHighAccuracy: true });
                    });
                });

                // Esta es la parte clave: Responder siempre con el video
                miPeer.on('call', call => {
                    call.answer(miStream); 
                    call.on('stream', s => { 
                        if(call.peer === CENTRAL_MASTER_ID) document.getElementById('audioCentral').srcObject = s;
                    });
                });

                miPeer.on('connection', conn => {
                    if(conn.peer !== CENTRAL_MASTER_ID) conexionesPasajeros.push(conn);
                });

            } catch(e) { alert("Error de permisos de cámara"); }
        }

        function enviarSOS() {
            if(miConexion && miConexion.open) {
                miConexion.send({ tipo: 'sos' });
                alert("SOS ENVIADO");
            }
        }

        function generarLinkPasajero() {
            const mins = document.getElementById('minutosViaje').value;
            const link = `${window.location.href.split('index.html')[0]}pasajero.html?id=${miPeer.id}&exp=${Date.now()+(mins*60000)}`;
            const msj = `Sigue tu viaje 5 estrellas en vivo aquí: ${link}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(msj).then(() => alert("¡Mensaje copiado!"));
            } else {
                prompt("Copia este mensaje:", msj);
            }
        }
    </script>
</body>
</html>
