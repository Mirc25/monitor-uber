<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - CONDUCTOR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background: #000; color: #0f0; text-align: center; font-family: sans-serif;">
    <h2>UNIDAD DE CONTROL</h2>
    <input type="text" id="unidad" placeholder="NOMBRE UNIDAD" style="padding:10px; width:80%;">
    <button onclick="iniciar()" style="padding:15px; background:#0f0; width:85%; font-weight:bold;">ACTIVAR</button>
    
    <div id="cont" style="display:none;">
        <video id="v" autoplay muted playsinline style="width:90%; border:2px solid #0f0; margin-top:10px;"></video>
    </div>

    <script>
        let peer, stream, conn;
        async function iniciar() {
            const nom = document.getElementById('unidad').value.toUpperCase().trim();
            if(!nom) return alert("Pone el nombre");

            // Captura de cámara
            stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('v').srcObject = stream;
            document.getElementById('cont').style.display = 'block';

            // ID original: PABLO-U-NOMBRE
            peer = new Peer('PABLO-U-' + nom);

            peer.on('open', () => {
                // Se conecta a la central maestra
                conn = peer.connect('PABLO-CENTRAL-MASTER-2026');
                
                conn.on('open', () => {
                    // Envía login y GPS como lo hacías antes
                    conn.send({tipo: 'login', nombre: nom});
                    
                    // LLAMA A LA CENTRAL (Lógica original)
                    peer.call('PABLO-CENTRAL-MASTER-2026', stream);

                    navigator.geolocation.watchPosition(p => {
                        conn.send({tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude});
                    });
                });
            });

            // Por si el pasajero llama
            peer.on('call', call => call.answer(stream));
        }
    </script>
</body>
</html>
