<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL PABLO SECURITY - V3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e11; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; }
        .panel-header { background: #1a1d21; padding: 15px; border-bottom: 2px solid #00ff00; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .grid-monitoreo { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; padding: 20px; }
        .cam-container { border: 1px solid #00ff00; background: #000; border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; }
        .video-box { width: 100%; height: 250px; background: #111; object-fit: cover; }
        .nombre-chofer { background: #00ff00; color: #000; font-weight: bold; padding: 8px; font-size: 16px; text-align: center; }
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #1a1d21; }
        .btn-talk { background: #444; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 5px; }
        .btn-talk:active { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .alerta-activa { border: 4px solid #ff0000 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .map-mini { width: 100%; height: 150px; border: none; border-top: 1px solid #333; filter: grayscale(1) invert(1); }
    </style>
</head>
<body>
    <div class="panel-header">
        <h4>📡 CENTRAL DE MONITOREO PROFESIONAL</h4>
        <div id="status" class="badge bg-success">SISTEMA ONLINE</div>
        <button onclick="generarLinkUnico()" class="btn btn-outline-success">➕ NUEVO LINK CHOFER</button>
    </div>

    <div id="gridMonitoreo" class="grid-monitoreo"></div>

    <script>
        const peer = new Peer('pablo-master-control-vip');
        let streamsChoferes = {};

        peer.on('call', call => {
            call.answer(); 
            call.on('stream', remoteStream => { crearCuadro(remoteStream, call.peer); });
        });

        peer.on('connection', conn => {
            conn.on('data', data => {
                const id = conn.peer;
                if(data.tipo === 'nombre') {
                    const el = document.getElementById('tit-' + id);
                    if(el) el.innerText = "🚖 " + data.valor;
                }
                if(data.tipo === 'alerta') {
                    document.getElementById('div-' + id).classList.add('alerta-activa');
                    new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
                }
                if(data.tipo === 'gps') {
                    document.getElementById('map-' + id).src = `https://maps.google.com/maps?q=${data.lat},${data.lng}&z=15&output=embed`;
                    document.getElementById('info-' + id).innerText = `📍 GPS: ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`;
                }
            });
        });

        function crearCuadro(stream, id) {
            if (document.getElementById('div-' + id)) return;
            const div = document.createElement('div');
            div.id = 'div-' + id;
            div.className = 'cam-container';
            div.innerHTML = `
                <div class="nombre-chofer" id="tit-${id}">CONECTANDO...</div>
                <video id="vid-${id}" class="video-box" autoplay playsinline></video>
                <div class="controls">
                    <div class="d-flex gap-1">
                        <button class="btn btn-primary btn-sm w-50" onclick="toggleMute('${id}')" id="btn-mute-${id}">🔇 ESCUCHAR: ON</button>
                        <button class="btn btn-success btn-sm w-50" onclick="detenerAlerta('${id}')">Desactivar Alerta</button>
                    </div>
                    <button class="btn-talk" onmousedown="hablarA('${id}', true)" onmouseup="hablarA('${id}', false)" onmouseleave="hablarA('${id}', false)">🎤 MANTENER PARA HABLAR</button>
                    <div id="info-${id}" style="font-size:12px; color:#00ff00;">Buscando GPS...</div>
                    <button class="btn btn-dark btn-sm mt-1" onclick="document.getElementById('div-${id}').remove()">DESCONECTAR</button>
                </div>
                <iframe id="map-${id}" class="map-mini"></iframe>
            `;
            document.getElementById('gridMonitoreo').appendChild(div);
            document.getElementById('vid-' + id).srcObject = stream;
        }

        function detenerAlerta(id) {
            const cuadro = document.getElementById('div-' + id);
            if(cuadro) cuadro.classList.remove('alerta-activa');
        }

        async function hablarA(idChofer, activo) {
            if (activo) {
                try {
                    const streamVoz = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamsChoferes[idChofer] = peer.call(idChofer, streamVoz);
                } catch (e) { console.error(e); }
            } else if (streamsChoferes[idChofer]) {
                streamsChoferes[idChofer].close();
                delete streamsChoferes[idChofer];
            }
        }

        function toggleMute(id) {
            const v = document.getElementById('vid-' + id);
            v.muted = !v.muted;
            document.getElementById('btn-mute-' + id).innerText = v.muted ? "🔇 ESCUCHAR: OFF" : "🔊 ESCUCHAR: ON";
        }

        function generarLinkUnico() {
            const token = 'M' + Math.floor(Math.random() * 9999);
            const link = `${window.location.origin}${window.location.pathname.replace('index.html','')}visor.html?id=${token}`;
            navigator.clipboard.writeText(link);
            alert("LINK COPIADO:\n" + link);
        }
    </script>
</body>
</html>
