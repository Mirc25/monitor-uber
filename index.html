<script>
    async function conectar() {
        const codigo = document.getElementById('cod').value.trim();
        const nombre = document.getElementById('nom').value.trim();
        if(!codigo || !nombre) return alert("Completa los datos");

        try {
            // Captura de video forzada
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 }, 
                audio: true 
            });

            document.getElementById('login').style.display = 'none';
            document.getElementById('transmision').style.display = 'block';
            document.getElementById('idDisplay').innerText = nombre.toUpperCase();

            const peer = new Peer();
            peer.on('open', (id) => {
                const centralID = 'pablo-' + codigo;
                
                // 1. Conectar Datos primero
                const conn = peer.connect(centralID);
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombre });
                    
                    // 2. Llamar inmediatamente con el video
                    const call = peer.call(centralID, stream);
                    
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });

                document.getElementById('panic').onclick = () => { conn.send({ tipo: 'alerta' }); };
            });
        } catch (e) {
            alert("ERROR: La cámara no arrancó. Revisa los permisos en Chrome.");
        }
    }
</script>
