<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>PABLO SECURITY APP</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: sans-serif; }
        .app-card { width: 90%; max-width: 400px; padding: 30px; background: #111; border-radius: 30px; border: 1px solid #0f0; text-align: center; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .form-control { background: #222 !important; border: 1px solid #444 !important; color: #0f0 !important; font-size: 1.2rem !important; text-align: center; margin-bottom: 15px; border-radius: 10px; }
        .btn-activate { background: #0f0; color: #000; font-weight: bold; border: none; border-radius: 15px; width: 100%; padding: 15px; font-size: 1.2rem; text-transform: uppercase; }
        .sos-btn { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(#f00, #600); color: #fff; font-size: 40px; font-weight: bold; border: 8px solid #fff; box-shadow: 0 0 30px rgba(255,0,0,0.6); margin: 20px 0; }
        .status-indicator { color: #0f0; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login" class="app-card">
        <h1 style="color:#0f0; font-weight:900; letter-spacing: -2px;">PABLO SECURITY</h1>
        <p class="text-secondary small mb-4">PROTECCIÓN ACTIVA 24/7</p>
        <input type="text" id="cod" class="form-control" placeholder="CÓDIGO DE ENLACE">
        <input type="text" id="nom" class="form-control" placeholder="NOMBRE DE UNIDAD">
        <button onclick="conectar()" class="btn-activate">ACTIVAR SERVICIO</button>
    </div>

    <div id="transmision" class="app-card" style="display:none;">
        <div class="status-indicator">● TRANSMITIENDO EN VIVO</div>
        <h4 id="idDisplay" style="color:#fff;">---</h4>
        <button class="sos-btn" id="panic">S.O.S</button>
        <div class="p-2 border border-secondary rounded bg-dark">
            <small class="text-secondary">GPS RASTREO ACTIVO</small>
        </div>
    </div>

    <script>
        async function conectar() {
            const codigo = document.getElementById('cod').value.trim();
            const nombre = document.getElementById('nom').value.trim();
            if(!codigo || !nombre) return alert("Faltan datos");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('login').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('idDisplay').innerText = nombre.toUpperCase();

                const peer = new Peer();
                peer.on('open', () => {
                    const centralID = 'pablo-' + codigo;
                    const conn = peer.connect(centralID);
                    
                    conn.on('open', () => {
                        conn.send({ tipo: 'nombre', valor: nombre });
                        peer.call(centralID, stream);
                        navigator.geolocation.watchPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        });
                    });

                    document.getElementById('panic').onclick = () => {
                        conn.send({ tipo: 'alerta' });
                        alert("¡SOS ENVIADO!");
                    };
                });
            } catch (e) {
                alert("Error: Acepta los permisos de cámara y GPS");
            }
        }
    </script>
</body>
</html>
