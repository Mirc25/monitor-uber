<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL PABLO SECURITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .panel-header { background: #111; padding: 10px 20px; border-bottom: 2px solid #00ff00; height: 70px; display: flex; justify-content: space-between; align-items: center; }
        .grid-monitoreo { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .cam-container { border: 2px solid #333; background: #0a0a0a; border-radius: 12px; overflow: hidden; }
        .video-box { width: 100%; height: 220px; background: #000; object-fit: cover; }
        .nombre-chofer { background: #00ff00; color: #000; font-weight: bold; padding: 5px 10px; font-size: 14px; text-transform: uppercase; }
        .alerta-activa { border: 5px solid #ff0000 !important; animation: parpadeo 0.6s infinite; }
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .map-mini { width: 100%; height: 150px; border: none; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="panel-header">
        <div class="d-flex align-items-center">
            <h4 class="m-0 me-3">🛡️ PABLO SECURITY</h4>
            <button id="btnMiMic" onclick="toggleMiMicro()" class="btn btn-primary btn-sm">🎤 MI MICRO: ON</button>
        </div>
        <div id="status" class="badge bg-danger">DESCONECTADO</div>
        <button onclick="copiarLink()" class="btn btn-outline-success btn-sm">COPIAR LINK CHOFER</button>
    </div>

    <div id="gridMonitoreo" class="grid-monitoreo"></div>

    <script>
        const peer = new Peer('pablo-master-control-vip');
        let miStreamVoz;
        let microZentralActivo = true;

        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { miStreamVoz = s; });

        function toggleMiMicro() {
            if (miStreamVoz) {
                microZentralActivo = !microZentralActivo;
                miStreamVoz.getAudioTracks()[0].enabled = microZentralActivo;
                const btn = document.getElementById('btnMiMic');
                btn.innerText = microZentralActivo ? "🎤 MI MICRO: ON" : "🚫 MI MICRO: OFF";
                btn.className = microZentralActivo ? "btn btn-primary btn-sm" : "btn btn-danger btn-sm";
            }
        }

        peer.on('open', () => {
            document.getElementById('status').innerText = "CENTRAL EN LÍNEA";
            document.getElementById('status').className = "badge bg-success";
        });

        peer.on('call', call => {
            call.answer(miStreamVoz);
            call.on('stream', remoteStream => {
                // El ID del peer ahora es el NOMBRE del chofer
                crearCuadro(remoteStream, call.peer);
            });
        });

        function crearCuadro(stream, nombre) {
            if (document.getElementById('div-' + nombre)) return;

            const div = document.createElement('div');
            div.id = 'div-' + nombre;
            div.className = 'cam-container';
            div.innerHTML = `
                <div class="nombre-chofer">🚖 ${nombre}</div>
                <video id="vid-${nombre}" class="video-box" autoplay playsinline></video>
                <div class="p-2 d-flex gap-1">
                    <button class="btn btn-warning btn-sm w-100" onclick="toggleMute('${nombre}')" id="btn-m-${nombre}">SILENCIAR</button>
                    <button class="btn btn-dark btn-sm" onclick="cerrar('${nombre}')">X</button>
                </div>
                <div id="info-${nombre}" style="padding:5px; font-size:11px; color:#aaa;">Esperando GPS...</div>
                <iframe id="map-${nombre}" class="map-mini"></iframe>
            `;
            document.getElementById('gridMonitoreo').appendChild(div);
            document.getElementById('vid-' + nombre).srcObject = stream;

            // Escuchar alertas y GPS
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(data.alerta) {
                        document.getElementById('div-' + nombre).classList.add('alerta-activa');
                        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
                    }
                    if(data.lat) {
                        document.getElementById('map-'+nombre).src = `https://maps.google.com/maps?q=${data.lat},${data.lng}&z=15&output=embed`;
                        document.getElementById('info-'+nombre).innerHTML = `<b>LAT:</b> ${data.lat.toFixed(4)} | <b>LNG:</b> ${data.lng.toFixed(4)}`;
                    }
                });
            });
        }

        function toggleMute(id) {
            const v = document.getElementById('vid-' + id);
            v.muted = !v.muted;
            document.getElementById('btn-m-' + id).innerText = v.muted ? "ESCUCHAR" : "SILENCIAR";
        }

        function cerrar(id) { document.getElementById('div-' + id).remove(); }

        function copiarLink() {
            const url = window.location.href.replace('index.html', 'visor.html');
            navigator.clipboard.writeText(url);
            alert("Link copiado para enviar a los choferes.");
        }
    </script>
</body>
</html>
