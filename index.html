<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - CONDUCTOR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; }
        .container { max-width: 500px; margin-top: 20px; border: 2px solid #0f0; padding: 20px; border-radius: 15px; background-color: #111; }
        video { width: 100%; border-radius: 10px; border: 1px solid #0f0; background-color: #222; }
        .btn-pablo { background-color: #0f0; color: #000; font-weight: bold; border: none; }
        .btn-pablo:hover { background-color: #0c0; }
        .status-dot { height: 10px; width: 10px; background-color: #f00; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-on { background-color: #0f0; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h2 class="mb-4">PABLO SECURITY</h2>
        <div id="setup">
            <input type="text" id="unidadId" class="form-control bg-dark text-success border-success mb-3" placeholder="ID DE UNIDAD (Ej: MOVIL-01)">
            <button class="btn btn-pablo w-100 py-3" onclick="iniciarServicio()">ACTIVAR UNIDAD</button>
        </div>
        <div id="monitor-activo" style="display:none;">
            <div class="mb-2">
                <span id="dot" class="status-dot"></span>
                <span id="statusText">CONECTANDO...</span>
            </div>
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="mt-3">
                <button class="btn btn-outline-success btn-sm w-100 mb-2" onclick="copiarLink()">COPIAR LINK PASAJERO</button>
                <button class="btn btn-danger w-100 py-2" onclick="enviarSOS()">B O T Ó N - S O S</button>
            </div>
        </div>
    </div>
    <script>
        let peer, miStream, connCentral;
        const CENTRAL_PEER_ID = 'PABLO-CENTRAL-MASTER-2026';
        async function iniciarServicio() {
            const idUnidad = document.getElementById('unidadId').value.trim().toUpperCase();
            if (!idUnidad) return alert("Ingrese el ID de la unidad.");
            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = miStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('monitor-activo').style.display = 'block';
                peer = new Peer('PABLO-U-' + idUnidad.replace(/\s+/g, '-'));
                peer.on('open', (id) => {
                    document.getElementById('dot').className = 'status-dot status-on';
                    document.getElementById('statusText').innerText = 'TRANSMITIENDO: ' + id;
                    conectarConCentral(idUnidad);
                });
                peer.on('call', (call) => call.answer(miStream));
            } catch (err) { alert("Error de cámara."); }
        }
        function conectarConCentral(nombre) {
            connCentral = peer.connect(CENTRAL_PEER_ID);
            connCentral.on('open', () => {
                connCentral.send({ tipo: 'login', nombre: nombre });
                peer.call(CENTRAL_PEER_ID, miStream);
                navigator.geolocation.watchPosition((pos) => {
                    if (connCentral.open) {
                        connCentral.send({ tipo: 'gps', lat: pos.coords.latitude, lng: pos.coords.longitude });
                    }
                }, null, { enableHighAccuracy: true });
            });
        }
        function enviarSOS() {
            if (connCentral && connCentral.open) {
                connCentral.send({ tipo: 'sos' });
                alert("¡ALERTA SOS ENVIADA!");
            }
        }
        function copiarLink() {
            const link = window.location.href.split('index.html')[0] + 'pasajero.html?id=' + peer.id;
            navigator.clipboard.writeText(link).then(() => alert("Link copiado"));
        }
    </script>
</body>
</html>
