<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOFER - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        video { width: 100%; border: 2px solid #0f0; border-radius: 10px; background: #111; height: 35vh; object-fit: cover; }
        input { width: 85%; padding: 15px; background: #111; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; border-radius: 5px; font-size: 16px; }
        .btn { background: #0f0; color: #000; padding: 20px; width: 100%; border: none; font-weight: bold; border-radius: 10px; margin: 10px 0; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="idUnidad" placeholder="NOMBRE UNIDAD (Ej: MOVIL01)">
        <button class="btn" onclick="iniciarServicio()">CONECTAR UNIDAD</button>
    </div>

    <div id="panel" style="display:none;">
        <video id="vLocal" autoplay muted playsinline></video>
        <p id="txtEstado" style="font-size: 12px; color: #555;">Transmitiendo...</p>
        <button class="btn" onclick="copiarLink()">LINK PARA PASAJERO</button>
        <button class="btn" style="background:red; color:white;" onclick="enviarSOS()">B O T Ó N - S O S</button>
    </div>

    <script>
        let peer, miStream, connCentral;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function iniciarServicio() {
            const nom = document.getElementById('idUnidad').value.trim().toUpperCase();
            if(!nom) return alert("Pone el nombre del móvil");

            try {
                // 1. CAPTURAR CÁMARA PRIMERO (Sin esto no hay Peer)
                miStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('vLocal').srcObject = miStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('panel').style.display = 'block';

                // 2. PEER con el nombre exacto
                peer = new Peer(nom, {
                    config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
                });

                peer.on('open', (id) => {
                    // Conectar a la central para el GPS
                    connCentral = peer.connect(CENTRAL_ID);
                    connCentral.on('open', () => {
                        connCentral.send({ tipo: 'login', nombre: nom });
                        
                        // ENVIAR VIDEO A CENTRAL DE UNA
                        peer.call(CENTRAL_ID, miStream);
                        
                        navigator.geolocation.watchPosition(p => {
                            if(connCentral.open) connCentral.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }, null, { enableHighAccuracy: true });
                    });
                });

                // ESTO ES LO QUE ESTABA FALLANDO: Responder a la llamada de video
                peer.on('call', (call) => {
                    console.log("Respondiendo llamada de video...");
                    call.answer(miStream);
                });

            } catch (err) { alert("ERROR: ¡Debes aceptar la cámara!"); }
        }

        function copiarLink() {
            const nom = document.getElementById('idUnidad').value.toUpperCase();
            const url = window.location.href.replace('index.html', 'pasajero.html') + '?id=' + nom;
            navigator.clipboard.writeText(url);
            alert("Link copiado");
        }

        function enviarSOS() { if(connCentral) connCentral.send({ tipo: 'sos' }); }
    </script>
</body>
</html>
