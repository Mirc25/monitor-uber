<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MÓVIL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        #app { display: none; flex-direction: column; flex: 1; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; text-align: center; font-size: 16px; }
        button { width: 85%; padding: 18px; background: #008000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
        #sos { background: #f00; height: 80px; font-size: 25px; margin: auto 10px 20px 10px; box-shadow: 0 0 20px red; }
        video { width: 100%; background: #111; border-bottom: 2px solid #0f0; }
        .panel { background: #111; border: 1px solid #0f0; margin: 10px; padding: 15px; border-radius: 10px; }
        select { width: 100%; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login" style="padding: 20px;">
        <h2>PABLO SECURITY</h2>
        <input type="text" id="nom" placeholder="ID UNIDAD (Ej: MOVIL 01)">
        <input type="text" id="tok" placeholder="TOKEN">
        <button onclick="activar()">CONECTAR</button>
    </div>

    <div id="app">
        <video id="vLocal" autoplay muted playsinline></video>
        <div id="status" style="font-size:12px; margin:5px;">● TRANSMITIENDO</div>
        
        <div class="panel">
            <h4 style="margin:0 0 10px 0;">⭐ VIAJE 5 ESTRELLAS</h4>
            <select id="mins">
                <option value="6">6 MINUTOS</option>
                <option value="15">15 MINUTOS</option>
                <option value="30">30 MINUTOS</option>
            </select>
            <button style="background:#0f0; color:#000;" onclick="compartir()">COPIAR LINK PASAJERO</button>
        </div>

        <button id="sos" onclick="enviarSOS()">B O T Ó N - S O S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
        let miPeer, miStream, miConexion, pasajeros = [];

        async function activar() {
            const nom = document.getElementById('nom').value.toUpperCase();
            const tok = document.getElementById('tok').value;
            if(!nom || !tok) return alert("Faltan datos");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}, audio:true});
                document.getElementById('vLocal').srcObject = miStream;

                miPeer = new Peer('ID-' + Math.floor(Math.random()*99999));
                
                miPeer.on('open', (id) => {
                    miConexion = miPeer.connect(CENTRAL_ID);
                    miConexion.on('open', () => {
                        miConexion.send({ tipo: 'login', nombre: nom, token: tok });
                        miPeer.call(CENTRAL_ID, miStream);
                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        
                        navigator.geolocation.watchPosition(p => {
                            const gps = { tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude };
                            if(miConexion.open) miConexion.send(gps);
                            pasajeros.forEach(c => { if(c.open) c.send(gps); });
                        }, null, { enableHighAccuracy: true });
                    });
                });

                miPeer.on('call', call => {
                    call.answer(miStream); // Siempre mandamos video
                    call.on('stream', s => {
                        if(call.peer === CENTRAL_ID) document.getElementById('audioCentral').srcObject = s;
                    });
                });

                miPeer.on('connection', conn => {
                    if(conn.peer !== CENTRAL_ID) {
                        pasajeros.push(conn);
                        // Mandar GPS actual apenas se conecta el pasajero
                        navigator.geolocation.getCurrentPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        });
                    }
                });

            } catch(e) { alert("Permiso de cámara denegado"); }
        }

        function enviarSOS() {
            if(miConexion && miConexion.open) {
                miConexion.send({ tipo: 'sos' });
                alert("ALERTA SOS ENVIADA");
            }
        }

        function compartir() {
            const link = `${window.location.href.split('index.html')[0]}pasajero.html?id=${miPeer.id}&exp=${Date.now()+(document.getElementById('mins').value*60000)}`;
            const msj = `Tu viaje 5 estrellas en vivo aquí: ${link}`;
            if(navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(msj).then(() => alert("Link copiado"));
            } else { prompt("Copia este mensaje:", msj); }
        }
    </script>
</body>
</html>
