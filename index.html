<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDUCTOR - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; }
        video { width: 90%; border: 2px solid #0f0; margin-top: 10px; background: #111; }
        .btn { background: #0f0; color: #000; padding: 15px; border: none; font-weight: bold; width: 80%; margin: 10px; border-radius: 10px; }
        #btnSOS { background: red; color: white; height: 80px; font-size: 20px; }
    </style>
</head>
<body>
    <h2>PABLO SECURITY</h2>
    <div id="setup">
        <input type="text" id="unidad" placeholder="NOMBRE UNIDAD" style="padding:10px; width:70%; margin-bottom:10px;"><br>
        <button class="btn" onclick="iniciarServicio()">1. INICIAR CÁMARA</button>
    </div>
    
    <div id="control" style="display:none;">
        <video id="localVideo" autoplay muted playsinline></video>
        <button class="btn" onclick="copiarLink()">2. COPIAR LINK PASAJERO</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="window.location.reload()">3. TERMINAR / NUEVO LINK</button>
        <button id="btnSOS" class="btn" onclick="enviarSOS()">B O T Ó N - S O S</button>
    </div>

    <script>
        let peer, miStream, connCentral;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function iniciarServicio() {
            const nombre = document.getElementById('unidad').value.toUpperCase();
            if(!nombre) return alert("Pone el nombre de la unidad");

            try {
                // Forzamos la captura de video
                miStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('localVideo').srcObject = miStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('control').style.display = 'block';

                // ID Único para esta sesión
                const sessionID = 'PABLO-' + nombre + '-' + Math.floor(Math.random()*999);
                peer = new Peer(sessionID);

                peer.on('open', (id) => {
                    console.log("Conectado con ID:", id);
                    // Conectar a la central
                    connCentral = peer.connect(CENTRAL_ID);
                });

                // ESTO ES LO QUE ESTABA FALLANDO: Responder siempre con el stream
                peer.on('call', (call) => {
                    call.answer(miStream);
                });

            } catch (err) {
                alert("Error al acceder a la cámara: " + err);
            }
        }

        function copiarLink() {
            const expira = Date.now() + (30 * 60000); // 30 min por defecto
            const url = window.location.href.replace('index.html', 'pasajero.html');
            const link = `${url}?id=${peer.id}&exp=${expira}`;
            
            navigator.clipboard.writeText(link);
            alert("Link copiado. Pasalo por WhatsApp.");
        }

        function enviarSOS() {
            if(connCentral) connCentral.send({ tipo: 'sos' });
        }
    </script>
</body>
</html>
