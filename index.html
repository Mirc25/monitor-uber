<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CONSOLA MAESTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* BARRA SUPERIOR */
        .top-bar { background: #0a0a0a; border-bottom: 2px solid #0f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; z-index: 10; }
        
        /* BOTÓN DE AGENDA PRINCIPAL */
        .btn-agenda-main { background: #0f0; color: #000; font-weight: bold; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); } }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        .grid-fleet { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; background: #050505; }
        
        /* MAPA GENERAL PEQUEÑO SIEMPRE VISIBLE */
        #mainMap { width: 300px; height: 200px; border: 1px solid #0f0; position: fixed; bottom: 20px; right: 20px; z-index: 5; border-radius: 10px; opacity: 0.8; }
        #mainMap:hover { opacity: 1; width: 500px; height: 400px; transition: 0.3s; }

        /* VENTANA DE AGENDA (PANTALLA COMPLETA) */
        #agendaModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px; overflow-y: auto;
        }
        .agenda-content { max-width: 1000px; margin: 0 auto; border: 2px solid #0f0; padding: 30px; border-radius: 15px; background: #0a0a0a; position: relative; }
        .btn-close-agenda { position: absolute; top: 20px; right: 20px; background: #f00; color: #fff; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        /* CARDS DE USUARIOS EN LA AGENDA */
        .user-list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .user-card-db { background: #111; border: 1px solid #0f0; padding: 15px; border-radius: 10px; }
        
        .unit-card { background: #000; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        .unit-header { background: #1a1a1a; color: #0f0; padding: 8px; text-align: center; font-weight: bold; border-bottom: 2px solid #0f0; }
        .fuchsia-car { filter: invert(19%) sepia(87%) saturate(6011%) hue-rotate(296deg) brightness(101%) contrast(110%); }
    </style>
</head>
<body>

<div class="top-bar">
    <div><h3 class="m-0">PABLO SECURITY</h3><small>CONTROL DE FLOTA V.4.0</small></div>
    <button class="btn-agenda-main" onclick="abrirAgenda()">📂 ABRIR AGENDA DE USUARIOS</button>
</div>

<div class="main-layout">
    <div class="grid-fleet" id="monitorGrid"></div>
    <div id="mainMap"></div>
</div>

<div id="agendaModal">
    <div class="agenda-content">
        <button class="btn-close-agenda" onclick="cerrarAgenda()">[ X ] MINIMIZAR / CERRAR</button>
        <h2 class="text-success border-bottom pb-2">ADMINISTRACIÓN DE ABONADOS</h2>
        
        <div class="row g-3 mt-3 align-items-center">
            <div class="col-md-5">
                <input type="text" id="regNombre" placeholder="NOMBRE O MÓVIL" class="form-control bg-black text-success border-success">
            </div>
            <div class="col-md-3">
                <select id="regTiempo" class="form-select bg-black text-success border-success">
                    <option value="12">12 HORAS</option>
                    <option value="24">24 HORAS</option>
                    <option value="720">30 DÍAS</option>
                </select>
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100 fw-bold" onclick="crearAbonado()">GENERAR ALTA Y TOKEN</button>
            </div>
        </div>

        <hr style="border-color: #0f0;">
        
        <div class="user-list-grid" id="agendaContenido">
            </div>
    </div>
</div>

<script>
    let peer, mainMap;
    const units = {};
    const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [36, 36], className: 'fuchsia-car' });

    function init() {
        mainMap = L.map('mainMap').setView([-31.5375, -68.5364], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mainMap);
        conectarCentral();
        renderAgenda();
    }

    // INTERFAZ AGENDA
    function abrirAgenda() { document.getElementById('agendaModal').style.display = 'block'; }
    function cerrarAgenda() { document.getElementById('agendaModal').style.display = 'none'; }

    // GESTIÓN DE DATOS
    function crearAbonado() {
        const nombre = document.getElementById('regNombre').value.trim().toUpperCase();
        const horas = parseInt(document.getElementById('regTiempo').value);
        if(!nombre) return alert("Falta el nombre.");

        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        if(db.find(u => u.nombre === nombre)) return alert("El nombre ya existe.");

        const nuevo = {
            nombre: nombre,
            token: Math.floor(1000 + Math.random() * 8999).toString(),
            vence: Date.now() + (horas * 60 * 60 * 1000),
            online: false
        };

        db.push(nuevo);
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
        alert(`REGISTRADO: ${nombre}\nTOKEN: ${nuevo.token}`);
    }

    function renderAgenda() {
        const contenedor = document.getElementById('agendaContenido');
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        contenedor.innerHTML = "";

        db.forEach((user, index) => {
            const horasRestantes = Math.max(0, Math.round((user.vence - Date.now()) / (1000 * 60 * 60)));
            const card = document.createElement('div');
            card.className = "user-card-db";
            card.innerHTML = `
                <div class="d-flex justify-content-between mb-2">
                    <b class="text-warning">${user.nombre}</b>
                    <span class="badge ${user.online ? 'bg-success' : 'bg-dark'}">${user.online ? 'ACTIVO' : 'OFFLINE'}</span>
                </div>
                <div>TOKEN: <span class="text-info font-monospace">${user.token}</span></div>
                <div>RESTA: ${horasRestantes}hs</div>
                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-sm btn-outline-success w-100" onclick="editarUser(${index})">EDITAR/HORAS</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="borrarUser(${index})">X</button>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    function editarUser(index) {
        let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
        const nuevoNombre = prompt("Nuevo nombre:", db[index].nombre);
        const masHoras = prompt("Sumar horas (ej: 12):", "0");
        if(nuevoNombre) db[index].nombre = nuevoNombre.toUpperCase();
        if(masHoras) db[index].vence += (parseInt(masHoras) * 60 * 60 * 1000);
        localStorage.setItem('pablo_agenda', JSON.stringify(db));
        renderAgenda();
    }

    function borrarUser(index) {
        if(confirm("¿Eliminar abonado?")) {
            let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
            db.splice(index, 1);
            localStorage.setItem('pablo_agenda', JSON.stringify(db));
            renderAgenda();
        }
    }

    // CONEXIÓN PEER
    function conectarCentral() {
        peer = new Peer(CENTRAL_ID);
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'login') {
                    let db = JSON.parse(localStorage.getItem('pablo_agenda') || '[]');
                    let user = db.find(u => u.nombre === data.nombre.toUpperCase() && u.token === data.token);
                    if(user && Date.now() < user.vence) {
                        user.online = true;
                        localStorage.setItem('pablo_agenda', JSON.stringify(db));
                        renderAgenda();
                        crearVentanaMonitor(conn.peer, user.nombre);
                    } else {
                        conn.send({ tipo: 'error', msg: 'DATOS INVÁLIDOS O VENCIDOS' });
                    }
                }
                if(data.tipo === 'gps') actualizarPosicion(conn.peer, data.lat, data.lng);
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => {
                const v = document.getElementById('v-' + call.peer);
                if(v) { v.srcObject = s; v.play(); }
            });
        });
    }

    function crearVentanaMonitor(peerID, nombre) {
        let existente = document.querySelector(`[data-chofer="${nombre}"]`);
        if(existente) {
            existente.id = 'card-' + peerID;
            existente.querySelector('video').id = 'v-' + peerID;
            return;
        }

        const grid = document.getElementById('monitorGrid');
        const card = document.createElement('div');
        card.className = 'unit-card'; card.id = 'card-' + peerID;
        card.setAttribute('data-chofer', nombre);
        card.innerHTML = `
            <div class="unit-header">${nombre}</div>
            <video id="v-${peerID}" autoplay playsinline muted style="width:100%;height:220px;object-fit:cover;"></video>
            <div id="map-ind-${peerID}" style="height:180px;"></div>
        `;
        grid.appendChild(card);
        
        const mInd = L.map('map-ind-' + peerID, { zoomControl: false, attributionControl: false }).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mInd);
        units[peerID] = { mInd, markerInd: L.marker([0,0]).addTo(mInd), markerGen: L.marker([0,0], {icon: carIcon}).addTo(mainMap).bindPopup(nombre) };
    }

    function actualizarPosicion(id, lat, lng) {
        if(!units[id]) return;
        units[id].mInd.setView([lat, lng]);
        units[id].markerInd.setLatLng([lat, lng]);
        units[id].markerGen.setLatLng([lat, lng]);
    }

    window.onload = init;
</script>
</body>
</html>
