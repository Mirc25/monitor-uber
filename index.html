<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>PABLO SECURITY - UNIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: sans-serif; }
        .app-card { width: 92%; max-width: 400px; padding: 25px; background: #111; border-radius: 25px; border: 1px solid #0f0; text-align: center; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        .form-control { background: #1a1a1a !important; border: 1px solid #333 !important; color: #0f0 !important; font-size: 1.1rem !important; text-align: center; margin-bottom: 15px; height: 50px; }
        .btn-activate { background: #0f0; color: #000; font-weight: bold; border: none; border-radius: 12px; width: 100%; padding: 15px; font-size: 1.1rem; }
        .sos-btn { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#f00, #800); color: #fff; font-size: 30px; font-weight: bold; border: 6px solid #fff; box-shadow: 0 0 20px red; margin: 20px 0; }
        .status-msg { font-size: 12px; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="app-card">
        <h2 style="color:#0f0; font-weight:900; margin-bottom: 20px;">PABLO SECURITY</h2>
        <input type="number" id="codInput" class="form-control" placeholder="CÓDIGO DE CENTRAL">
        <input type="text" id="nomInput" class="form-control" placeholder="NOMBRE / MÓVIL">
        <button id="startBtn" class="btn-activate">CONECTAR UNIDAD</button>
        <div id="error-log" style="color:red; font-size:10px; margin-top:10px;"></div>
    </div>

    <div id="active-screen" class="app-card" style="display:none;">
        <div class="status-msg">● TRANSMITIENDO VIVO</div>
        <h4 id="displayName" style="margin: 10px 0;">---</h4>
        <button id="sosBtn" class="sos-btn">S.O.S</button>
        <div style="background:#000; padding:10px; border-radius:10px; border:1px solid #222;">
            <small id="gps-status" style="color:#555;">GPS: BUSCANDO...</small>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const loginScreen = document.getElementById('login-screen');
        const activeScreen = document.getElementById('active-screen');
        const errorLog = document.getElementById('error-log');

        startBtn.addEventListener('click', async () => {
            const codigo = document.getElementById('codInput').value.trim();
            const nombre = document.getElementById('nomInput').value.trim();

            if (!codigo || !nombre) {
                alert("Completa el código y tu nombre.");
                return;
            }

            try {
                // Solicitar cámara y audio
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });

                // Cambiar de pantalla
                loginScreen.style.display = 'none';
                activeScreen.style.display = 'block';
                document.getElementById('displayName').innerText = nombre.toUpperCase();

                // Inicializar PeerJS
                const peer = new Peer();

                peer.on('open', (id) => {
                    const centralID = 'pablo-' + codigo;
                    const conn = peer.connect(centralID);

                    conn.on('open', () => {
                        // Enviar datos iniciales
                        conn.send({ tipo: 'nombre', valor: nombre });
                        
                        // Llamar con video
                        peer.call(centralID, stream);

                        // Enviar GPS
                        navigator.geolocation.watchPosition((pos) => {
                            conn.send({ tipo: 'gps', lat: pos.coords.latitude, lng: pos.coords.longitude });
                            document.getElementById('gps-status').innerText = "GPS: CONECTADO";
                            document.getElementById('gps-status').style.color = "#0f0";
                        }, (err) => {
                            console.error(err);
                        }, { enableHighAccuracy: true });
                    });

                    // Botón de Pánico
                    document.getElementById('sosBtn').onclick = () => {
                        conn.send({ tipo: 'alerta' });
                        alert("ALERTA ENVIADA A CENTRAL");
                    };
                });

                peer.on('error', (err) => {
                    errorLog.innerText = "Error de conexión: " + err.type;
                });

            } catch (err) {
                errorLog.innerText = "Error: Permisos de cámara denegados o sin HTTPS.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
