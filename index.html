<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - CHOFER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #app, #sos { display: none; }
        #login { padding-top: 50px; }
        h2 { color: #0f0; text-shadow: 0 0 10px #0f0; }
        input { 
            width: 80%; padding: 15px; margin: 10px; border-radius: 5px; 
            border: 1px solid #0f0; background: #111; color: #0f0; font-size: 16px; 
        }
        button { 
            width: 85%; padding: 15px; background: #008000; color: white; 
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        #sos { 
            background: #ff0000; position: fixed; bottom: 20px; left: 7.5%; 
            width: 85%; height: 80px; font-size: 24px; z-index: 100; color: white; border: none; border-radius: 10px; font-weight: bold;
        }
        #driver { font-size: 20px; color: #00ff00; margin-top: 20px; font-weight: bold; }
        video { width: 100%; height: auto; display: block; margin-top: 10px; border-top: 2px solid #333; }
    </style>
</head>
<body>

    <div id="login">
        <h2>PABLO SECURITY</h2>
        <p>CONTROL DE ACCESO</p>
        <input type="text" id="nom" placeholder="Tu Nombre o Móvil (Ej: MOVIL 01)">
        <input type="text" id="tok" placeholder="Token de Acceso (4 dígitos)">
        <button onclick="activarServicio()">ACTIVAR SERVICIO</button>
    </div>

    <div id="app">
        <div id="driver"></div>
        <p style="color: #0f0; font-size: 12px;">● TRANSMITIENDO EN VIVO</p>
        <video id="hiddenV" autoplay muted playsinline></video>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <button id="sos">BOTÓN S.O.S</button>

    <script>
        const CENTRAL_MASTER_ID = 'PABLO-CENTRAL-MASTER-2026';
        let miPeer, miStream;

        async function activarServicio() {
            const nom = document.getElementById('nom').value.trim().toUpperCase();
            const tok = document.getElementById('tok').value.trim();
            
            if(!nom || !tok) return alert("Ingresa tu Nombre y el Token");

            try {
                // Pedir permisos de cámara y audio
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                
                document.getElementById('hiddenV').srcObject = miStream;

                // Crear ID único para este chofer (basado en su nombre para que la PC lo reconozca)
                const idLimpio = nom.replace(/[^a-zA-Z0-9]/g, '_');
                miPeer = new Peer('CHOFER-' + idLimpio + '-' + Math.floor(Math.random()*999));

                miPeer.on('open', (id) => {
                    const conn = miPeer.connect(CENTRAL_MASTER_ID);
                    
                    conn.on('open', () => {
                        // Enviar credenciales a la central
                        conn.send({ tipo: 'login', nombre: nom, token: tok });

                        // Si la central nos manda un error (ej: token vencido)
                        conn.on('data', (data) => {
                            if(data.tipo === 'error') {
                                alert(data.msg);
                                location.reload();
                            }
                        });

                        // Cambiar interfaz
                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('sos').style.display = 'block';
                        document.getElementById('driver').innerText = nom;

                        // Enviar Video
                        miPeer.call(CENTRAL_MASTER_ID, miStream);

                        // Enviar GPS cada 5 segundos
                        navigator.geolocation.watchPosition(p => {
                            conn.send({ 
                                tipo: 'gps', 
                                lat: p.coords.latitude, 
                                lng: p.coords.longitude 
                            });
                        }, null, { enableHighAccuracy: true });

                        // Configurar botón SOS
                        document.getElementById('sos').onclick = () => {
                            conn.send({ tipo: 'sos', msg: '¡ALERTA SOS!' });
                            alert("¡SOS ENVIADO A CENTRAL!");
                        };
                    });
                });

                miPeer.on('error', (err) => {
                    console.error(err);
                    alert("Error de conexión: " + err.type);
                });

            } catch(e) {
                alert("Error: Debes permitir el acceso a la cámara y micrófono.");
            }
        }
    </script>
</body>
</html>
