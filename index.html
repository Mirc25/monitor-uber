<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDAD - PABLO SECURITY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        input { width: 90%; padding: 15px; margin: 15px 0; background: #111; border: 1px solid #0f0; color: #fff; border-radius: 10px; font-size: 18px; }
        .btn-p { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; border-radius: 10px; font-size: 18px; margin-top: 10px; }
        #videoBox { width: 100%; height: 280px; background: #111; border-radius: 15px; object-fit: cover; margin-top: 15px; border: 1px solid #333; display: none; }
        .sos { background: red; color: white; width: 160px; height: 160px; border-radius: 50%; font-size: 30px; border: 5px solid white; margin: 30px auto; display: none; }
    </style>
</head>
<body>
    <div id="login">
        <h1>PABLO SECURITY</h1>
        <input type="text" id="nom" placeholder="NOMBRE / MÓVIL">
        <button class="btn-p" onclick="activar()">ACTIVAR UNIDAD</button>
    </div>

    <div id="panel" style="display:none;">
        <h2 id="uNom"></h2>
        <video id="videoBox" autoplay playsinline muted></video>
        <button id="sosBtn" class="sos">S.O.S</button>
        <audio id="vozCentral" autoplay></audio>
        <p style="color: #444; margin-top: 20px;">ENLACE ACTIVO CON CENTRAL</p>
    </div>

    <script>
        let localStream;
        async function activar() {
            const n = document.getElementById('nom').value;
            if(!n) return alert("Ingresa nombre");
            
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('videoBox').srcObject = localStream;
            document.getElementById('videoBox').style.display = "block";
            document.getElementById('login').style.display = "none";
            document.getElementById('panel').style.display = "block";
            document.getElementById('uNom').innerText = n.toUpperCase();

            const peer = new Peer();
            peer.on('open', (id) => {
                const conn = peer.connect('PABLO-CENTRAL-2026');
                conn.on('open', () => {
                    document.getElementById('sosBtn').style.display = "block";
                    conn.send({ tipo: 'login', nombre: n });
                    peer.call('PABLO-CENTRAL-2026', localStream);
                    
                    // Enviar ubicación y señal de vida
                    navigator.geolocation.watchPosition(p => {
                        conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });

                    setInterval(() => conn.send({ tipo: 'ping' }), 3000);
                    document.getElementById('sosBtn').onclick = () => conn.send({ tipo: 'sos' });
                });
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', s => document.getElementById('vozCentral').srcObject = s);
            });
        }
    </script>
</body>
</html>
