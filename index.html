<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PABLO SECURITY - UNIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; height: 100vh; display: flex; align-items: center; }
        .app-box { width: 90%; margin: auto; padding: 25px; background: #111; border: 1px solid #0f0; border-radius: 20px; text-align: center; }
        input { background: #222 !important; border: 1px solid #444 !important; color: #0f0 !important; font-size: 20px !important; text-align: center; }
        .btn-panic { width: 140px; height: 140px; border-radius: 50%; background: red; color: white; border: 5px solid #fff; font-size: 24px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login" class="app-box">
        <h2 style="font-weight: 900;">PABLO SECURITY</h2>
        <p class="text-muted small mb-4">INGRESÁ EL CÓDIGO DE LA CENTRAL</p>
        <input type="text" id="codigoInput" class="form-control mb-3" placeholder="Ej: 654321">
        <input type="text" id="nombreInput" class="form-control mb-4" placeholder="TU NOMBRE / MÓVIL">
        <button id="btnActivar" class="btn btn-success btn-lg w-100 py-3">ACTIVAR SERVICIO</button>
    </div>

    <div id="activo" class="app-box" style="display:none;">
        <h4 id="unidadID"></h4>
        <div id="statusTxt" class="text-warning mb-3">ENLAZANDO...</div>
        <button id="sosBtn" class="btn-panic">S.O.S</button>
        <p class="mt-4 small text-secondary">TRANSMITIENDO EN SEGUNDO PLANO</p>
    </div>

    <script>
        let stream;
        document.getElementById('btnActivar').onclick = async () => {
            const codigo = document.getElementById('codigoInput').value.trim();
            const nombre = document.getElementById('nombreInput').value.trim();
            if(!codigo || !nombre) return alert("Completá los campos");

            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('login').style.display = 'none';
                document.getElementById('activo').style.display = 'block';
                document.getElementById('unidadID').innerText = nombre;

                const peer = new Peer(); // ID aleatorio para el móvil

                peer.on('open', () => {
                    // Llamar a la central usando el código que generó la PC
                    const call = peer.call('pablo-' + codigo, stream);
                    const conn = peer.connect('pablo-' + codigo);

                    conn.on('open', () => {
                        document.getElementById('statusTxt').innerText = "SERVICIO ACTIVO ✅";
                        document.getElementById('statusTxt').className = "text-success";
                        
                        conn.send({ tipo: 'nombre', valor: nombre });
                        
                        navigator.geolocation.watchPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }, null, { enableHighAccuracy: true });
                    });

                    document.getElementById('sosBtn').onclick = () => {
                        conn.send({ tipo: 'alerta' });
                        alert("ALERTA SOS ENVIADA");
                    };
                });

            } catch (e) {
                alert("Error de permisos: Asegurate de usar HTTPS");
            }
        };
    </script>
</body>
</html>
