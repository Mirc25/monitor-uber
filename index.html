<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - CHOFER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; border: 2px solid #0f0; border-radius: 10px; background: #111; margin: 10px 0; }
        input { width: 80%; padding: 15px; background: #111; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; }
        .btn { background: #0f0; color: #000; padding: 20px; border: none; font-weight: bold; width: 90%; border-radius: 10px; cursor: pointer; font-size: 16px; }
        #sos { background: red; color: white; margin-top: 20px; height: 80px; font-size: 20px; }
    </style>
</head>
<body>
    <h2>SISTEMA CHOFER</h2>
    <div id="setup">
        <input type="text" id="idUnidad" placeholder="EJ: MOVIL 01">
        <button class="btn" onclick="iniciarServicio()">CONECTAR Y ABRIR CÁMARA</button>
    </div>

    <div id="app" style="display:none;">
        <video id="localVideo" autoplay muted playsinline></video>
        <button class="btn" onclick="copiarLink()">COPIAR LINK PASAJERO</button>
        <button id="sos" class="btn" onclick="enviarSOS()">B O T Ó N - S O S</button>
    </div>

    <script>
        let peer, miStream, connCentral;
        const CENTRAL_ID = 'PABLO-CENTRAL-MASTER-2026';

        async function iniciarServicio() {
            const nom = document.getElementById('idUnidad').value.toUpperCase();
            if(!nom) return alert("Pone nombre a la unidad");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('localVideo').srcObject = miStream;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                // CONFIGURACIÓN DE SERVIDORES DE GOOGLE (Esto es lo que faltaba para que conecte en 4G)
                peer = new Peer('PABLO-' + nom.replace(/\s+/g, '-') + '-' + Math.floor(Math.random()*999), {
                    config: {
                        'iceServers': [
                            { url: 'stun:stun.l.google.com:19302' },
                            { url: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                peer.on('open', (id) => {
                    console.log("ID ACTIVO:", id);
                    conectarCentral(nom);
                });

                peer.on('call', (call) => {
                    call.answer(miStream); // Responde al pasajero
                });

            } catch (e) { alert("ERROR CÁMARA: " + e); }
        }

        function conectarCentral(nom) {
            connCentral = peer.connect(CENTRAL_ID);
            connCentral.on('open', () => {
                connCentral.send({ tipo: 'login', nombre: nom });
                peer.call(CENTRAL_ID, miStream);
                
                // GPS TRABAJANDO
                navigator.geolocation.watchPosition(pos => {
                    if(connCentral.open) connCentral.send({ tipo: 'gps', lat: pos.coords.latitude, lng: pos.coords.longitude });
                }, null, { enableHighAccuracy: true });
            });
        }

        function copiarLink() {
            const exp = Date.now() + (30 * 60000);
            const link = window.location.href.replace('index.html', 'pasajero.html') + `?id=${peer.id}&exp=${exp}`;
            navigator.clipboard.writeText(link);
            alert("LINK COPIADO. Pegalo en WhatsApp.");
        }

        function enviarSOS() { if(connCentral) connCentral.send({ tipo: 'sos' }); }
    </script>
</body>
</html>
