<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - MASTER CONTROL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: sans-serif; }
        .master-panel { border: 2px solid #333; padding: 30px; border-radius: 20px; background: #111; margin-top: 50px; }
        .btn-pablo { background: #00ff00; color: #000; font-weight: bold; border-radius: 50px; }
        .link-display { background: #222; padding: 15px; border-radius: 10px; border: 1px dashed #00ff00; color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 master-panel text-center">
                <h1 class="mb-4">🛡️ CENTRAL DE INTELIGENCIA PABLO</h1>
                <p class="text-secondary">Generador de Enlaces de Monitoreo en Tiempo Real</p>
                
                <button onclick="generarAcceso()" class="btn btn-pablo btn-lg px-5 mt-3">GENERAR LINK DE MONITOREO</button>

                <div id="seccion-link" class="mt-5 d-none">
                    <p>Link dinámico listo para seguimiento:</p>
                    <div class="link-display mb-3" id="link-final"></div>
                    <button class="btn btn-outline-light btn-sm" onclick="copiar()">Copiar Enlace</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generarAcceso() {
            // Genera un token aleatorio único
            const token = Math.random().toString(36).substring(2, 12);
            // Crea el link que apunta a la página de VISOR que haremos luego
            const urlBase = window.location.origin + "/visor.html";
            const linkCompleto = urlBase + "?auth=" + token;

            document.getElementById('link-final').innerText = linkCompleto;
            document.getElementById('seccion-link').classList.remove('d-none');
        }

        function copiar() {
            const el = document.getElementById('link-final');
            navigator.clipboard.writeText(el.innerText);
            alert("Enlace copiado. Listo para enviar.");
        }
    </script>
</body>
</html>
