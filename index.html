<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLO SECURITY - UNIDAD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { width: 90%; max-width: 350px; background: #111; border: 1px solid #0f0; border-radius: 20px; padding: 25px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #0f0; border-radius: 10px; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .sos-btn { width: 150px; height: 150px; border-radius: 50%; background: red; color: white; border: 5px solid white; font-size: 28px; font-weight: bold; box-shadow: 0 0 20px red; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h1>PABLO SECURITY</h1>
        <input type="number" id="cod" placeholder="CÓDIGO CENTRAL">
        <input type="text" id="nom" placeholder="MÓVIL / NOMBRE">
        <button onclick="conectar()">CONECTAR UNIDAD</button>
    </div>

    <div id="transmision" class="card" style="display:none;">
        <h2 id="nomUnidad">---</h2>
        <p style="color:#0f0">CAMARA FRONTAL ACTIVA</p>
        <button id="sos" class="sos-btn">S.O.S</button>
    </div>

    <script>
        async function conectar() {
            const codigo = document.getElementById('cod').value;
            const nombre = document.getElementById('nom').value;
            if(!codigo || !nombre) return alert("Faltan datos");

            try {
                // FORZAR CAMARA FRONTAL (user)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });

                document.getElementById('login').style.display = 'none';
                document.getElementById('transmision').style.display = 'block';
                document.getElementById('nomUnidad').innerText = nombre.toUpperCase();

                const peer = new Peer();
                peer.on('open', () => {
                    const centralID = 'pablo-' + codigo;
                    const conn = peer.connect(centralID);
                    conn.on('open', () => {
                        conn.send({ tipo: 'nombre', valor: nombre });
                        peer.call(centralID, stream);
                    });
                    document.getElementById('sos').onclick = () => { conn.send({ tipo: 'alerta' }); };
                });
            } catch (e) { alert("Error: Acepta permisos de cámara."); }
        }
    </script>
</body>
</html>
