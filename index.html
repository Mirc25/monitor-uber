<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CHOFER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 20px; border-radius: 15px; margin-top: 50px; }
        input { width: 90%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #444; color: #0f0; border-radius: 10px; font-size: 20px; text-align: center; }
        .btn-p { width: 100%; padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; border-radius: 10px; font-size: 18px; }
        #sos { width: 220px; height: 220px; background: #800; color: #fff; border-radius: 50%; font-size: 40px; border: 5px solid #fff; display: none; margin: 40px auto; }
        #status { color: #555; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h2>ACCESO SEGURIDAD</h2>
        <input type="number" id="cod" placeholder="CÓDIGO DE PAGO" inputmode="numeric">
        <input type="text" id="nom" placeholder="TU NOMBRE / MÓVIL">
        <button class="btn-p" onclick="validarYConectar()">INGRESAR AL SISTEMA</button>
    </div>

    <div id="app" style="display:none;">
        <h2 style="color: #222;">SISTEMA ACTIVO</h2>
        <button id="sos">S.O.S</button>
        <p id="status">Transmitiendo Video y GPS a Central...</p>
        <video id="hiddenV" autoplay playsinline muted style="width:1px; opacity:0;"></video>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        async function validarYConectar() {
            const cod = document.getElementById('cod').value;
            const nom = document.getElementById('nom').value;

            if(!cod || !nom) return alert("Debes ingresar CÓDIGO y NOMBRE");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('hiddenV').srcObject = stream;
                
                const peer = new Peer();
                
                peer.on('open', (id) => {
                    // Intenta conectar a la central usando el código ingresado
                    const conn = peer.connect('PABLO-CENTRAL-' + cod);
                    
                    conn.on('open', () => {
                        // Si la conexión abre, el código era correcto
                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('sos').style.display = 'block';
                        
                        conn.send({ tipo: 'login', nombre: nom });
                        peer.call('PABLO-CENTRAL-' + cod, stream);

                        navigator.geolocation.watchPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        }, null, { enableHighAccuracy: true });

                        document.getElementById('sos').onclick = () => conn.send({ tipo: 'sos' });
                    });

                    // Si en 5 segundos no conecta, el código está mal
                    setTimeout(() => {
                        if (document.getElementById('login').style.display !== 'none') {
                            alert("CÓDIGO INVÁLIDO O CENTRAL DESCONECTADA");
                            location.reload();
                        }
                    }, 5000);
                });

                peer.on('call', call => {
                    call.answer();
                    call.on('stream', s => document.getElementById('audioCentral').srcObject = s);
                });

            } catch(e) { alert("Error: Activa los permisos de cámara"); }
        }
    </script>
</body>
</html>
