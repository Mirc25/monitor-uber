<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PABLO SECURITY APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; height: 100vh; font-family: sans-serif; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container-app { width: 90%; max-width: 400px; padding: 30px; background: #111; border-radius: 25px; border: 1px solid #00ff00; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        
        /* Video oculto pero activo para el sistema */
        #vLocal { position: absolute; top: -5000px; width: 1px; height: 1px; }

        input.form-control { background: #222; border: 1px solid #444; color: #00ff00; font-size: 24px; letter-spacing: 5px; text-transform: uppercase; }
        .btn-panic { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(#ff0000, #800000); border: 8px solid #fff; color: white; font-size: 32px; font-weight: bold; margin: 20px 0; box-shadow: 0 0 40px rgba(255,0,0,0.5); }
        .status-led { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <video id="vLocal" autoplay playsinline muted></video>

    <div id="login-screen" class="container-app text-center">
        <h2 style="color: #00ff00; font-weight: 900;">PABLO SECURITY</h2>
        <p class="text-muted mb-4">SISTEMA PROFESIONAL DE VIGILANCIA</p>
        
        <div class="mb-4">
            <label class="small text-uppercase text-secondary">Código de Enlace</label>
            <input type="text" id="codigoInput" class="form-control text-center" maxlength="6" placeholder="000000">
        </div>
        
        <div class="mb-4">
            <label class="small text-uppercase text-secondary">Nombre de Unidad</label>
            <input type="text" id="nombreInput" class="form-control text-center" style="font-size: 16px; letter-spacing: 1px;" placeholder="MÓVIL 01">
        </div>

        <button id="btnConectar" class="btn btn-success btn-lg w-100 py-3">ACTIVAR SERVICIO</button>
    </div>

    <div id="op-screen" class="container-app text-center" style="display: none;">
        <div class="mb-3">
            <span class="status-led"></span>
            <span id="txtUnidad" style="color: #00ff00; font-weight: bold;"></span>
        </div>
        
        <button class="btn-panic" id="panicBtn">S.O.S</button>
        
        <div class="p-3 bg-dark rounded border border-secondary">
            <p style="color: #00ff00; font-size: 12px; margin: 0;">ESCUDO DE PROTECCIÓN ACTIVO</p>
            <p style="color: #666; font-size: 10px; margin: 0;">TRANSMITIENDO VIDEO Y GPS EN 2DO PLANO</p>
        </div>
        
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const video = document.getElementById('vLocal');
        let miStream = null;
        let peer = null;

        document.getElementById('btnConectar').onclick = async () => {
            const codigo = document.getElementById('codigoInput').value.trim().toLowerCase();
            const nombre = document.getElementById('nombreInput').value.trim();

            if(!codigo || !nombre) return alert("Completa todos los datos");

            try {
                // Pedir permisos de cámara y audio
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });

                // Mantener el procesador activo (WakeLock)
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');

                // Cambiar de pantalla
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('op-screen').style.display = 'block';
                document.getElementById('txtUnidad').innerText = "UNIDAD: " + nombre.toUpperCase();
                video.srcObject = miStream;

                iniciarPeer(codigo, nombre);
            } catch (e) {
                alert("Error: Debes aceptar los permisos de cámara/audio.");
            }
        };

        function iniciarPeer(idConexion, nombreReal) {
            peer = new Peer(idConexion); // El ID es el código que escribió el chofer

            peer.on('open', () => {
                // Llamar a la central automáticamente
                const call = peer.call('pablo-master-control-vip', miStream);
                const conn = peer.connect('pablo-master-control-vip');
                
                conn.on('open', () => {
                    conn.send({ tipo: 'nombre', valor: nombreReal });
                    
                    // GPS Constante
                    navigator.geolocation.watchPosition(p => {
                        if(conn.open) conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                    }, null, { enableHighAccuracy: true });
                });

                document.getElementById('panicBtn').onclick = () => { if(conn.open) conn.send({ tipo: 'alerta' }); };
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { document.getElementById('audioCentral').srcObject = s; });
            });
        }
    </script>
</body>
</html>
