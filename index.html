<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PABLO SECURITY - ACCESO MÓVIL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
        #app { display: none; padding-bottom: 30px; }
        .login-box { padding: 20px; }
        h2 { text-shadow: 0 0 10px #0f0; margin-bottom: 5px; }
        p { font-size: 0.8em; opacity: 0.7; margin-bottom: 25px; }
        input { 
            width: 85%; padding: 15px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #0f0; background: #111; color: #0f0; font-size: 18px; text-align: center;
        }
        button { 
            width: 85%; padding: 18px; background: #008000; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        #sos { 
            background: #f00; width: 90%; height: 80px; font-size: 25px; 
            color: #fff; border: none; border-radius: 15px; font-weight: bold; margin-top: 15px; box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        #status { font-size: 14px; color: #0f0; margin-top: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        video { width: 100%; height: auto; border-top: 2px solid #0f0; margin-top: 10px; background: #111; }

        .panel-viaje { background: #111; border: 2px solid #0f0; margin: 15px; padding: 15px; border-radius: 10px; }
        .sel-viaje { width: 100%; padding: 12px; background: #000; color: #0f0; border: 1px solid #0f0; font-weight: bold; margin-bottom: 10px; border-radius: 5px; }
        .btn-viaje { background: #0f0 !important; color: #000 !important; width: 100%; padding: 15px; border-radius: 5px; font-size: 14px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login" class="login-box">
        <h2>PABLO SECURITY</h2>
        <p>CONEXIÓN DE UNIDAD AL MONITOR</p>
        <input type="text" id="nom" placeholder="ID UNIDAD (Ej: MOVIL 01)">
        <input type="text" id="tok" placeholder="TOKEN DE ACCESO">
        <button onclick="activarServicio()">CONECTAR A CENTRAL</button>
    </div>

    <div id="app">
        <h3 id="displayNombre" style="margin: 10px 0 0 0;"></h3>
        <div id="status">● TRANSMITIENDO EN VIVO</div>
        <video id="vLocal" autoplay muted playsinline></video>
        
        <div class="panel-viaje">
            <h4 style="margin: 0 0 10px 0;">⭐ VIAJE 5 ESTRELLAS</h4>
            <select id="minutosViaje" class="sel-viaje">
                <option value="2">2 MINUTOS</option>
                <option value="4">4 MINUTOS</option>
                <option value="6" selected>6 MINUTOS</option>
                <option value="10">10 MINUTOS</option>
                <option value="15">15 MINUTOS</option>
                <option value="30">30 MINUTOS</option>
            </select>
            <button class="btn-viaje" onclick="generarLinkPasajero()">COPIAR LINK PARA EL CHAT</button>
        </div>

        <button id="sos" onclick="enviarSOS()">B O T Ó N - S O S</button>
        <audio id="audioCentral" autoplay></audio>
    </div>

    <script>
        const CENTRAL_MASTER_ID = 'PABLO-CENTRAL-MASTER-2026';
        let miPeer, miStream, miConexion;
        let conexionesPasajeros = []; 

        async function activarServicio() {
            const nom = document.getElementById('nom').value.trim().toUpperCase();
            const tok = document.getElementById('tok').value.trim();
            
            if(!nom || !tok) return alert("Ingresá nombre y token");

            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                document.getElementById('vLocal').srcObject = miStream;

                miPeer = new Peer('ID-' + Math.floor(Math.random()*99999));

                miPeer.on('open', (id) => {
                    miConexion = miPeer.connect(CENTRAL_MASTER_ID);
                    
                    miConexion.on('open', () => {
                        miConexion.send({ tipo: 'login', nombre: nom, token: tok });

                        miConexion.on('data', (data) => {
                            if(data.tipo === 'error') {
                                alert("CENTRAL DICE: " + data.msg);
                                location.reload();
                            }
                        });

                        document.getElementById('login').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('displayNombre').innerText = nom;

                        miPeer.call(CENTRAL_MASTER_ID, miStream);

                        navigator.geolocation.watchPosition(p => {
                            const datosGPS = { tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude };
                            if(miConexion.open) miConexion.send(datosGPS);
                            conexionesPasajeros.forEach(conn => { if(conn.open) conn.send(datosGPS); });
                        }, null, { enableHighAccuracy: true });
                    });
                });

                miPeer.on('call', call => {
                    call.answer(miStream); 
                    call.on('stream', s => { 
                        if(call.peer === CENTRAL_MASTER_ID) {
                            document.getElementById('audioCentral').srcObject = s;
                        }
                    });
                });

                miPeer.on('connection', conn => {
                    if(conn.peer !== CENTRAL_MASTER_ID) {
                        conexionesPasajeros.push(conn);
                        navigator.geolocation.getCurrentPosition(p => {
                            conn.send({ tipo: 'gps', lat: p.coords.latitude, lng: p.coords.longitude });
                        });
                    }
                });

            } catch(e) {
                alert("Error: Activa los permisos de cámara/micrófono");
            }
        }

        function enviarSOS() {
            if(miConexion && miConexion.open) {
                miConexion.send({ tipo: 'sos' });
                alert("¡ALERTA SOS ENVIADA!");
            }
        }

        function generarLinkPasajero() {
            try {
                const mins = document.getElementById('minutosViaje').value;
                if (!miPeer || !miPeer.id) return alert("Sistema conectando... reintenta en 2 segundos.");

                const miID = miPeer.id;
                const miNombre = document.getElementById('nom').value.trim().toUpperCase() || "CHOFER";
                const exp = Date.now() + (parseInt(mins) * 60000);
                
                let urlBase = window.location.href.split('index.html')[0];
                if (!urlBase.endsWith('/')) urlBase += '/';
                
                const linkFinal = `${urlBase}pasajero.html?id=${miID}&n=${encodeURIComponent(miNombre)}&exp=${exp}`;
                const msj = `¡Hola! Puedes seguir en tiempo real y monitorear el video de tu viaje para que sea un viaje 5 estrellas. Tu seguridad es primero: ${linkFinal}`;
                
                // Intento de copiado con respaldo
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(msj).then(() => {
                        alert("✅ MENSAJE COPIADO.\nPégalo en el chat del pasajero.");
                    }).catch(() => { prompt("Copia este mensaje:", msj); });
                } else {
                    prompt("Copia este mensaje:", msj);
                }
            } catch (e) { alert("Error al generar link."); }
        }
    </script>
</body>
</html>
